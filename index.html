function trimStr(v){
  return typeof v === "string" ? v.trim() : "";
}

function uniqueCaseInsensitive(arr=[]){
  const out = [];
  const seen = new Set();

  for(const item of arr){
    const clean = trimStr(item);
    if(!clean) continue;

    const key = clean.toLocaleLowerCase("pt-BR");
    if(seen.has(key)) continue;

    seen.add(key);
    out.push(clean);
  }
  return out;
}

function normalizeTagValue(tag=""){
  const clean = trimStr(tag).replace(/\s+/g, " ").toLocaleLowerCase("pt-BR");
  if(!clean) return "";
  return clean;
}

function normalizeTags(tags){
  if(!Array.isArray(tags)) return [];
  return uniqueCaseInsensitive(tags.map(normalizeTagValue));
}

function normalizeCategory(cat){
  if(!cat) return "";
  const clean = trimStr(cat);
  if(CATEGORY_FIX_MAP[clean]) return CATEGORY_FIX_MAP[clean];
  return clean;
}

function normalizeCategories(categories){
  if(!Array.isArray(categories) || !categories.length) return [...DEF_CATS];
  return uniqueCaseInsensitive(categories.map(normalizeCategory));
}

const VALID_STATUSES = ["pending", "processing", "done", "error"];

function normalizeStatus(val, orphanProcessing=false){
  if(VALID_STATUSES.includes(val)){
    if(orphanProcessing && val === "processing") return "error";
    return val;
  }
  return "pending";
}

function normalizeBooks(books, orphanProcessing=false){
  if(!Array.isArray(books)) return [];

  return books.map(book => ({
    id: book?.id || uid(),
    title: trimStr(book?.title),
    author: trimStr(book?.author),
    category: normalizeCategory(book?.category),
    tags: normalizeTags(book?.tags),
    pages: Number(book?.pages) || 0,
    synopsis: book?.synopsis ?? null,
    synopsisStatus:   normalizeStatus(book?.synopsisStatus,   orphanProcessing),
    embeddingsStatus: normalizeStatus(book?.embeddingsStatus, orphanProcessing),
    conceptsStatus:   normalizeStatus(book?.conceptsStatus,   orphanProcessing),
    addedAt: book?.addedAt || new Date().toISOString()
  }))
  .filter(b => b.title);
}

function normalizeWishlist(wishlist){
  if(!Array.isArray(wishlist)) return [];

  return wishlist.map(item => ({
    id: item?.id || uid(),
    title: trimStr(item?.title),
    author: trimStr(item?.author),
    link: trimStr(item?.link),
    addedAt: item?.addedAt || new Date().toISOString()
  }))
  .filter(i => i.title);
}

function truncateText(str="", max=70){
  if(str.length <= max) return str;
  return str.slice(0,max-1).trim() + "…";
}

function sanitizeSynopsisText(text=""){
  return text
    .replace(/^#+\s*/gm, "")
    .replace(/\*\*(.+?)\*\*/g, "$1")
    .replace(/\*(.+?)\*/g, "$1")
    .replace(/`(.+?)`/g, "$1")
    .replace(/\s+/g, " ")
    .replace(/\s+,/g, ",")
    .trim();
}

function sanitizeSynthesisText(text=""){
  return sanitizeSynopsisText(text);
}

function sanitizeSummaryText(text=""){
  return text
    .replace(/[,;]\s*$/, "")
    .trim();
}

function deriveInsightTitle(question=""){
  const clean = question.trim().replace(/[?!.]+$/, "").trim();
  const words = clean.split(/\s+/).slice(0, 5);
  const title = words.join(" ");
  return title.charAt(0).toUpperCase() + title.slice(1);
}

function renderSynopsis(text=""){
  const comma = text.indexOf(",");
  if(comma === -1 || comma > 120) return <span>{text}</span>;
  const title = text.slice(0, comma).trim();
  const rest  = text.slice(comma);
  return (
    <>
      <strong>{title}</strong>
      <span>{rest}</span>
    </>
  );
}

function joinTags(tags=[]){
  return tags.length ? tags.join(", ") : "—";
}

function debounceValue(value, delay, setter){
  return setTimeout(()=>setter(value), delay);
}

function migrateIndexData(raw, orphanProcessing=false){
  return {
    schemaVersion: CURRENT_SCHEMA_VERSION,
    books: normalizeBooks(raw?.books, orphanProcessing),
    categories: normalizeCategories(raw?.categories),
    wishlist: normalizeWishlist(raw?.wishlist),
    profiles: uniqueCaseInsensitive(raw?.profiles || [])
  };
}

function escapeRegExp(str=""){
  return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function tokenizeQuery(query=""){
  return trimStr(query)
    .toLocaleLowerCase("pt-BR")
    .replace(/[^\p{L}\p{N}\s]+/gu, " ")
    .split(/\s+/)
    .filter(w => w && w.length > 2);
}

function splitTextIntoChunks(text="", size=CHUNK_SIZE, overlap=CHUNK_OVERLAP){
  const clean = trimStr(text);
  if(!clean) return [];

  const chunks = [];
  let start = 0;
  let idx = 0;

  while(start < clean.length){
    const end = Math.min(start + size, clean.length);
    const content = clean.slice(start, end).trim();
    if(content){
      chunks.push({
        id:`chunk_${idx}`,
        index: idx,
        start,
        end,
        content
      });
      idx += 1;
    }
    if(end >= clean.length) break;
    start = Math.max(end - overlap, start + 1);
  }

  return chunks;
}

function scoreChunkAgainstQuery(query="", text=""){
  const q = trimStr(query);
  const body = trimStr(text);
  if(!q || !body) return 0;

  const lowerText = body.toLocaleLowerCase("pt-BR");
  const tokens = uniqueCaseInsensitive(tokenizeQuery(q));
  if(!tokens.length) return 0;

  let score = 0;

  for(const token of tokens){
    const re = new RegExp(`\\b${escapeRegExp(token)}\\b`, "giu");
    const matches = lowerText.match(re);
    if(matches) score += matches.length * 4;
    else if(lowerText.includes(token)) score += 1.5;
  }

  const phrase = q.toLocaleLowerCase("pt-BR");
  if(lowerText.includes(phrase)) score += 10;

  return score;
}

function selectRelevantChunks(text="", query="", maxChunks=MAX_BOOK_CONTEXT_CHUNKS){
  const chunks = splitTextIntoChunks(text);
  if(!chunks.length) return [];

  const q = trimStr(query);
  if(!q){
    return chunks.slice(0, maxChunks);
  }

  const scored = chunks
    .map(chunk=>({
      ...chunk,
      score: scoreChunkAgainstQuery(q, chunk.content)
    }))
    .sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return a.index - b.index;
    });

  const best = scored.slice(0, maxChunks).sort((a,b)=>a.index - b.index);
  return best.length ? best : chunks.slice(0, maxChunks);
}

function selectRelevantBooks(query="", books=[], texts={}, limit=MAX_GLOBAL_BOOKS){
  const q = trimStr(query);
  if(!books.length) return [];

  const scored = books.map(book=>{
    const haystack = [
      book.title || "",
      book.author || "",
      book.category || "",
      (book.tags || []).join(" "),
      book.synopsis || "",
      (texts[book.id] || "").slice(0, 12000)
    ].join("\n");

    return {
      book,
      score: q ? scoreChunkAgainstQuery(q, haystack) : 0
    };
  });

  scored.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;
    return (a.book.title || "").localeCompare(b.book.title || "", "pt-BR");
  });

  const top = scored.slice(0, limit).map(x=>x.book);
  return top.length ? top : books.slice(0, limit);
}

// Seleciona livros relevantes usando embeddings já salvos.
// Para cada livro, calcula o melhor score de chunk contra a query.
// Retorna os livros ordenados por relevância semântica + os chunks já pontuados.
function selectRelevantBooksSemantic(queryEmbedding, books=[], embeddingsMap={}, texts={}, limit=MAX_GLOBAL_BOOKS){
  if(!books.length) return [];

  const scored = books.map(book=>{
    const embs = embeddingsMap[book.id];
    if(!embs || !embs.length){
      return { book, score: 0, scoredChunks: [] };
    }

    const allChunks = splitTextIntoChunks(texts[book.id] || "");
    const contentMap = {};
    for(const c of allChunks) contentMap[c.index] = c;

    const scoredChunks = embs
      .map(e => ({
        ...contentMap[e.index],
        score: cosineSimilarity(queryEmbedding, e.embedding)
      }))
      .filter(c => c.content)
      .sort((a,b) => b.score - a.score);

    // Score do livro = média dos top 3 chunks (melhor ancoragem)
    const top3 = scoredChunks.slice(0, 3);
    const bookScore = top3.length
      ? top3.reduce((s,c)=>s+c.score,0) / top3.length
      : 0;

    return { book, score: bookScore, scoredChunks };
  });

  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, limit);
}

function detectPdfQuality(text="", pages=0){
  const clean = trimStr(text);
  const compact = clean.replace(/\s+/g, " ");
  const chars = compact.length;
  const weirdMatches = compact.match(/[â€œÃ¢â‚¬□■▪◆◼◻]+/g) || [];
  const weirdRatio = chars ? weirdMatches.join("").length / chars : 0;
  const avgCharsPerPage = pages ? chars / pages : chars;

  const flags = [];
  if(chars < 1200) flags.push("Texto extraído muito curto");
  if(pages >= 8 && avgCharsPerPage < 250) flags.push("Baixa densidade de texto por página");
  if(weirdRatio > 0.015) flags.push("Caracteres estranhos detectados");

  return {
    isSuspect: flags.length > 0,
    flags,
    stats: {
      chars,
      avgCharsPerPage: Math.round(avgCharsPerPage),
      weirdRatio
    }
  };
}

// Converte ArrayBuffer para base64 sem usar spread (evita stack overflow em PDFs grandes)
function arrayBufferToBase64(buffer){
  const bytes = new Uint8Array(buffer);
  const chunkSize = 8192;
  let binary = "";
  for(let i = 0; i < bytes.length; i += chunkSize){
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

// ─── Semantic Search (OpenAI Embeddings) ──────────────

// Gera embedding de um texto via OpenAI API
async function generateEmbedding(text, openaiKey){
  let r;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 8000); // 8s timeout
    r = await fetch("https://api.openai.com/v1/embeddings", {
      method: "POST",
      signal: controller.signal,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${openaiKey}`
      },
      body: JSON.stringify({
        model: "text-embedding-3-small",
        input: text.slice(0, 8000)
      })
    });
    clearTimeout(timeout);
  }catch(err){
    if(err.name === "AbortError"){
      throw new Error("Sem conexão com a API. Verifique sua internet ou se há saldo disponível na conta Anthropic.");
    }
    throw new Error("Sem conexão com a API. Verifique sua internet ou se há saldo disponível na conta Anthropic.");
  }
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    const msg = e?.error?.message || "";
    if(r.status === 401) throw new Error("Chave OpenAI inválida. Verifique sua chave nas configurações.");
    if(r.status === 429) throw new Error("Limite de requisições OpenAI atingido. Aguarde e tente novamente.");
    if(msg.toLowerCase().includes("billing") || msg.toLowerCase().includes("quota")){
      throw new Error("Saldo insuficiente na conta OpenAI. Verifique em platform.openai.com/account/billing.");
    }
    throw new Error(msg || `Erro OpenAI (HTTP ${r.status}).`);
  }
  const data = await r.json();
  return data.data[0].embedding;
}

// Similaridade coseno entre dois vetores
function cosineSimilarity(a, b){
  let dot = 0, normA = 0, normB = 0;
  for(let i = 0; i < a.length; i++){
    dot   += a[i] * b[i];
    normA += a[i] * a[i];
    normB += b[i] * b[i];
  }
  if(!normA || !normB) return 0;
  return dot / (Math.sqrt(normA) * Math.sqrt(normB));
}

// Gera embeddings de todos os chunks de um livro e salva na pasta
// Formato salvo: [ { id, index, start, end, embedding: float[] }, ... ]
async function generateAndSaveEmbeddings(bookId, chunks, dirHandle, openaiKey, onProgress){
  const results = [];
  for(let i = 0; i < chunks.length; i++){
    const chunk = chunks[i];
    const embedding = await generateEmbedding(chunk.content, openaiKey);
    results.push({
      id: chunk.id,
      index: chunk.index,
      start: chunk.start,
      end: chunk.end,
      embedding
    });
    onProgress?.(Math.round(((i + 1) / chunks.length) * 100));
    // pausa mínima para não travar a UI em livros grandes
    if(i % 10 === 0) await new Promise(r => setTimeout(r, 0));
  }
  await wf(dirHandle, embeddingsFileName(bookId), JSON.stringify(results));
  return results;
}

  try{
    return JSON.parse(txt);

// Seleciona os chunks mais relevantes usando similaridade semântica.
// embeddings: resultado de loadEmbeddings (array com { index, start, end, embedding })
// chunks: resultado de splitTextIntoChunks (para reconstruir o content)
// queryEmbedding: embedding da pergunta do usuário
async function semanticSelectChunks(chunks, embeddings, queryEmbedding, maxChunks=MAX_BOOK_CONTEXT_CHUNKS){
  // Mapeia index -> content para reconstituir os chunks com content
  const contentMap = {};
  for(const c of chunks) contentMap[c.index] = c;

  const scored = embeddings
    .map(e => ({
      ...contentMap[e.index],
      embedding: e.embedding,
      score: cosineSimilarity(queryEmbedding, e.embedding)
    }))
    .filter(e => e.content) // segurança: ignora se não achou o chunk
    .sort((a, b) => b.score - a.score);

  // Pega os melhores e reordena por posição no livro (para contexto contínuo)
  return scored
    .slice(0, maxChunks)
    .sort((a, b) => a.index - b.index);
}

// ─── Distributed Deep Mode ────────────────────────────

// Combina chunks semânticos (65%) com chunks distribuídos pelo livro (35%).
// Garante cobertura de início, meio e fim, reduzindo viés de relevância.
function buildDistributedChunks(allChunks=[], semanticChunks=[], maxTotal=MAX_DEEP_CHUNKS){
  if(!allChunks.length) return semanticChunks.slice(0, maxTotal);

  const semanticCount    = Math.round(maxTotal * DEEP_SEMANTIC_RATIO);
  const distributedCount = maxTotal - semanticCount;

  // Top chunks semânticos
  const topSemantic = semanticChunks.slice(0, semanticCount);
  const semanticIds = new Set(topSemantic.map(c => c.index));

  // Chunks distribuídos — amostragem uniforme excluindo os já selecionados
  const remaining = allChunks.filter(c => !semanticIds.has(c.index));
  const distributed = [];
  if(remaining.length > 0){
    const step = Math.max(1, Math.floor(remaining.length / distributedCount));
    for(let i = 0; i < remaining.length && distributed.length < distributedCount; i += step){
      distributed.push(remaining[i]);
    }
  }

  // Merge e reordena por posição no livro
  const merged = [...topSemantic, ...distributed];
  const seen = new Set();
  return merged
    .filter(c => { if(seen.has(c.index)) return false; seen.add(c.index); return true; })
    .sort((a,b) => a.index - b.index);
}

// Extrai conceitos de um livro via Claude usando blocos distribuídos
async function extractConceptsForBook(bookId, bookText, bookTitle, apiKey){
  const clean = trimStr(bookText);
  if(!clean) return [];

  // Divide o texto em CONCEPT_EXTRACT_BLOCKS blocos distribuídos
  const blockSize = Math.max(CONCEPT_BLOCK_CHARS, Math.floor(clean.length / CONCEPT_EXTRACT_BLOCKS));
  const blocks = [];
  for(let i = 0; i < CONCEPT_EXTRACT_BLOCKS; i++){
    const start = Math.floor((i / CONCEPT_EXTRACT_BLOCKS) * clean.length);
    const end   = Math.min(start + blockSize, clean.length);
    const block = clean.slice(start, end).trim();
    if(block) blocks.push(block);
  }

  const combinedText = blocks.join("\n\n---\n\n").slice(0, 28000); // limite seguro de tokens

  const system = `Você é um assistente especializado em análise conceitual de livros. Extraia conceitos abstratos, reutilizáveis e transferíveis do texto fornecido.

REGRAS OBRIGATÓRIAS:
- Retorne entre ${CONCEPTS_PER_BOOK_MIN} e ${CONCEPTS_PER_BOOK_MAX} conceitos
- Extraia apenas conceitos abstratos que façam sentido FORA do contexto específico deste livro
- O conceito deve ser transferível: deve poder aparecer em outros livros de temas diferentes
- Prefira substantivos ou expressões conceituais curtas (1 a 3 palavras)
- Aceite 2 ou 3 palavras apenas quando formarem um conceito real e reconhecível: "viés cognitivo", "controle civil", "poder simbólico"
- Evite palavras genéricas: "história", "pessoas", "coisas", "mundo", "situação"
- Evite nomes próprios, cargos, países ou eventos específicos
- Evite formulações narrativas, descritivas ou situacionais: não extraia conclusões de caso, manchetes, problemas pontuais ou acontecimentos
- Rejeite qualquer item que pareça um insight, uma frase de efeito ou uma descrição de episódio
- Evite duplicações e variações do mesmo conceito
- Use SEMPRE português (PT-BR), mesmo que o texto esteja em outro idioma
- Use lowercase, evite plural desnecessário
- Unifique variações: "political propaganda" → "propaganda"

EXEMPLOS ACEITOS: liderança, poder, controle civil, transparência, governança, legitimidade, autoconsciência, viés cognitivo, influência, poder simbólico
EXEMPLOS REJEITADOS: avisos ignorados, risco não comunicado, preparação presidencial, falha de liderança, resposta à emergência

Retorne APENAS um array JSON válido de strings. Exemplo: ["poder", "liderança", "governança"]
Nenhum texto adicional, nenhum markdown.`;

  const response = await callClaude(
    apiKey,
    system,
    [{ role:"user", content:`Livro: "${bookTitle}"\n\nTrechos distribuídos do livro:\n\n${combinedText}` }],
    600
  );

  try{
    const clean2 = response.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(clean2);
    if(!Array.isArray(parsed)) return [];
    return parsed
      .map(c => trimStr(c).toLowerCase())
      .filter(c => c && c.length > 1 && c.length < 50)
      .slice(0, CONCEPTS_PER_BOOK_MAX);
  }catch{
    // Tenta extrair array do texto se vier com lixo ao redor
    const match = response.match(/\[[\s\S]*\]/);
    if(match){
      try{
        const arr = JSON.parse(match[0]);
        return Array.isArray(arr) ? arr.map(c=>trimStr(c).toLowerCase()).filter(Boolean) : [];
      }catch{ return []; }
    }
    return [];
  }
}

// Reconstrói o índice global a partir dos _concepts.json de todos os livros
// Preserva sínteses existentes. Marca synthesisStale quando a lista de livros muda.
async function rebuildConceptsIndex(dirHandle, books, apiKey, existingIndex={}){
  const newIndex = {};

  for(const book of books){
    const concepts = await loadBookConcepts(dirHandle, book.id);
    for(const concept of concepts){
      if(!newIndex[concept]){
        newIndex[concept] = {
          books: [],
          summary: existingIndex[concept]?.summary || null,
          synthesis: existingIndex[concept]?.synthesis || null,
          synthesisUpdatedAt: existingIndex[concept]?.synthesisUpdatedAt || null,
          synthesisStale: existingIndex[concept]?.synthesisStale ?? true
        };
      }
      if(!newIndex[concept].books.includes(book.id)){
        newIndex[concept].books.push(book.id);
      }
    }
  }

  // Marca synthesisStale quando a composição de livros mudou (qualquer alteração)
  for(const [concept, entry] of Object.entries(newIndex)){
    const prevBooks = existingIndex[concept]?.books || [];
    const newBooks  = entry.books;
    const prevSorted = [...prevBooks].sort().join(",");
    const newSorted  = [...newBooks].sort().join(",");
    if(prevSorted !== newSorted){
      newIndex[concept].synthesisStale = true;
    }
  }

  // Gera resumo para conceitos sem summary ou com summary malformado (termina com , ou ;)
  const needsSummary = Object.entries(newIndex).filter(([c, v]) =>
    !v.summary || /[,;]\s*$/.test(v.summary)
  );
  if(needsSummary.length > 0 && apiKey){
    // Processa em lotes de 20 para evitar resposta muito longa do modelo
    const BATCH = 20;
    for(let i = 0; i < needsSummary.length; i += BATCH){
      const batch = needsSummary.slice(i, i + BATCH);
      const conceptList = batch.map(([c]) => c).join(", ");
      try{
        const resp = await callClaude(
          apiKey,
          `Para cada conceito listado, escreva uma frase curta (máx 10 palavras) em português descrevendo o que é. A frase deve ser completa, sem terminar com vírgula, ponto e vírgula ou texto cortado. Retorne APENAS JSON válido no formato: {"conceito": "resumo"}. Sem markdown, sem texto extra, sem comentários.`,
          [{ role:"user", content:conceptList }],
          800
        );
        const clean = resp.replace(/```json|```/g,"").trim();
        const summaries = JSON.parse(clean);
        for(const [concept, summary] of Object.entries(summaries)){
          const key = concept.toLowerCase().trim();
          if(newIndex[key]) newIndex[key].summary = sanitizeSummaryText(String(summary||""));
        }
      }catch(e){
        console.warn("Summaries batch falhou:", e.message);
      }
    }
  }

  await saveConceptsIndex(dirHandle, newIndex);
  return newIndex;
}

  if(!q) return insights;
  return insights.filter(ins =>
    (ins.answerText||"").toLocaleLowerCase("pt-BR").includes(q) ||

// Reordena insights filtrados por relevância semântica
function reorderInsightsBySemantic(filtered=[], embeddings={}, queryEmbedding){
  if(!queryEmbedding || !filtered.length) return filtered;
  return [...filtered]
    .map(ins => ({
      ins,
      score: embeddings[ins.id] ? cosineSimilarity(queryEmbedding, embeddings[ins.id]) : 0
    }))
    .sort((a,b) => b.score - a.score)
    .map(x => x.ins);
}

// Classifica a intenção da pergunta em 3 estados.
// "global"    → exige visão ampla do livro (tese, síntese, comparação, evolução)
// "local"     → pergunta pontual, factual, conceitual
// "ambiguous" → não é possível determinar com segurança
function classifyQueryIntent(query=""){
  const q = query.toLocaleLowerCase("pt-BR").trim();

  const globalSignals = [
    // síntese e visão geral
    /\btese\b/, /\bargumento\b/, /\bproposta\b/, /\bideia central\b/, /\btema central\b/,
    /\btodo o livro\b/, /\bao longo\b/, /\bpercurso\b/, /\btrajetória\b/,
    /\bdo início ao fim\b/, /\bdo começo ao fim\b/,
    // comparação e estrutura
    /\bcompare\b/, /\bcompar[aeo]\b/, /\bcontraste\b/, /\bdiferença entre\b/,
    /\bsemelhanç\b/, /\brelação entre\b/, /\bcomo evolui\b/, /\bevolução\b/,
    // temas e padrões
    /\btemas recorrentes\b/, /\bpadrões\b/, /\bcontradição\b/, /\bparadoxo\b/,
    /\bestilo do autor\b/, /\bvoz do autor\b/, /\bnarrativa\b/,
    // resumo / síntese explícita
    /\bfaça um resumo\b/, /\bresuma o livro\b/, /\bsíntese\b/, /\bvisão geral\b/,
    /\bprincipais mensagens\b/, /\bprincipais aprendizados\b/, /\bprincipais lições\b/,
    /\bde que trata\b/, /\bdo que trata\b/, /\bsobre o que é\b/,
    // estrutura narrativa
    /\barcos\b/, /\barco narrativo\b/, /\bestrutura do livro\b/, /\bcapítulos\b/
  ];

  const localSignals = [
    /\bo que (é|significa|define)\b/, /\bquem (é|foi|são)\b/,
    /\bonde\b/, /\bquando\b/, /\bcomo funciona\b/, /\bcomo se chama\b/,
    /\bexplique\b/, /\bdefin[ae]\b/, /\bcite\b/, /\bexemplo de\b/,
    /\bquanto\b/, /\bquantos\b/, /\bpor que\b/, /\bpor quê\b/
  ];

  const globalScore = globalSignals.filter(re => re.test(q)).length;
  const localScore  = localSignals.filter(re => re.test(q)).length;

  if(globalScore >= 2) return "global";
  if(globalScore === 1 && localScore === 0) return "global";
  if(localScore >= 1 && globalScore === 0) return "local";
  return "ambiguous";
}

// Analisa a qualidade do retrieval semântico.
// Recebe chunks já ordenados por score decrescente (top N).
// Retorna quality: "high" | "borderline" | "low" + métricas para debug.
function analyzeRetrievalQuality(scoredChunks=[], totalChunks=1){
  if(!scoredChunks.length){
    return {
      quality:"low", avgTop5:0, strongChunkCount:0,
      scoreDropRatio:0, positionSpread:0, topScores:[], reason:"sem chunks"
    };
  }

  const top5 = scoredChunks.slice(0, 5);
  const topScores = top5.map(c => parseFloat((c.score||0).toFixed(4)));

  // 1. Média dos top 5
  const avgTop5 = topScores.reduce((s,v)=>s+v, 0) / topScores.length;

  // 2. Chunks fortes (score >= threshold)
  const strongChunkCount = topScores.filter(s => s >= AUTO_CONFIDENCE_THRESHOLD).length;

  // 3. Queda brusca entre chunk[0] e chunk[1]
  const scoreDropRatio = topScores.length >= 2 && topScores[0] > 0
    ? topScores[1] / topScores[0]
    : 1;

  // 4. Dispersão de posição: (posMax - posMin) / totalChunks
  const positions = scoredChunks.slice(0, 5).map(c => c.index || 0);
  const positionSpread = totalChunks > 1
    ? (Math.max(...positions) - Math.min(...positions)) / totalChunks
    : 0;

  // ── Classificar qualidade ──────────────────────────
  // "high": média boa E chunks fortes suficientes
  const isHigh = avgTop5 >= AUTO_CONFIDENCE_THRESHOLD
    && strongChunkCount >= AUTO_MIN_STRONG_CHUNKS;

  // "low": média ruim E poucos chunks fortes
  const isLow = avgTop5 < AUTO_CONFIDENCE_THRESHOLD
    && strongChunkCount < AUTO_MIN_STRONG_CHUNKS;

  // scoreDropRatio baixo é agravante para borderline → low
  // (só pesa combinado com outros sinais fracos, nunca sozinho)
  const hasAbruptDrop = scoreDropRatio < AUTO_SCORE_DROP_RATIO;

  let quality, reason;
  if(isHigh){
    quality = "high";
    reason = `avg=${avgTop5.toFixed(3)}, strong=${strongChunkCount}`;
  } else if(isLow){
    quality = "low";
    reason = `avg=${avgTop5.toFixed(3)}, strong=${strongChunkCount}`;
  } else {
    // borderline — pode ser promovido a low por queda brusca combinada
    if(hasAbruptDrop && avgTop5 < AUTO_CONFIDENCE_THRESHOLD){
      quality = "low";
      reason = `borderline→low: drop=${scoreDropRatio.toFixed(2)}, avg=${avgTop5.toFixed(3)}`;
    } else {
      quality = "borderline";
      reason = `avg=${avgTop5.toFixed(3)}, strong=${strongChunkCount}, drop=${scoreDropRatio.toFixed(2)}`;
    }
  }

  return { quality, avgTop5, strongChunkCount, scoreDropRatio, positionSpread, topScores, reason };
}

// Orquestra a decisão de modo no Automático.
// Retorna { mode: "basic"|"deep", intent, quality, uiLabel, reason }
// uiLabel é o texto curto para o badge na UI.
async function decideAutoMode(query, bookText, bookEmbeddings, openaiKey, bookCanUseDeep){
  const intent = classifyQueryIntent(query);
  const canDeep = bookCanUseDeep; // extensível: aqui entra qualidade do texto no futuro

  // ── Passo 1: intenção global ──────────────────────
  if(intent === "global"){
    if(canDeep){
      const result = { mode:"deep", intent, quality:null, uiLabel:"visão global", reason:"intenção global detectada" };
      console.log("[Automático]", { query, ...result });
      return result;
    } else {
      const result = { mode:"basic", intent, quality:null, uiLabel:"visão global indisponível", reason:"intenção global mas visão global indisponível" };
      console.log("[Automático]", { query, ...result });
      return result;
    }
  }

  // ── Passo 2: tenta básico e avalia qualidade ──────
  let scoredChunks = [];
  let allChunks = [];
  let queryEmbedding = null;
  let totalChunks = 1;

  if(bookEmbeddings && openaiKey){
    try{
      queryEmbedding = await generateEmbedding(query, openaiKey);
      allChunks = splitTextIntoChunks(bookText);
      totalChunks = allChunks.length || 1;

      const contentMap = {};
      for(const c of allChunks) contentMap[c.index] = c;

      scoredChunks = bookEmbeddings
        .map(e => ({
          ...contentMap[e.index],
          score: cosineSimilarity(queryEmbedding, e.embedding)
        }))
        .filter(c => c.content)
        .sort((a,b) => b.score - a.score);
    }catch(err){
      console.warn("[Automático] Erro ao gerar embedding:", err.message);
    }
  }

  const analysis = analyzeRetrievalQuality(scoredChunks, totalChunks);

  // Log completo para calibração
  console.log("[Automático]", {
    query, intent,
    avgTop5: analysis.avgTop5,
    strongChunkCount: analysis.strongChunkCount,
    scoreDropRatio: analysis.scoreDropRatio,
    positionSpread: analysis.positionSpread,
    topScores: analysis.topScores,
    quality: analysis.quality,
    qualityReason: analysis.reason
  });

  // Helper: adiciona queryEmbedding, scoredChunks e allChunks ao resultado
  // para evitar recalcular em sendBook
  const withCache = (r) => ({ ...r, queryEmbedding, scoredChunks, allChunks });

  // ── Passo 3: decisão por intent + qualidade ───────
  if(intent === "local"){
    if(analysis.quality === "low" && canDeep){
      const result = { mode:"deep", intent, quality:analysis.quality, uiLabel:"visão global", reason:`local mas retrieval fraco: ${analysis.reason}` };
      console.log("[Automático] decisão:", result.mode, result.reason);
      return withCache(result);
    }
    const result = { mode:"basic", intent, quality:analysis.quality, uiLabel:"trechos relevantes", reason:`local, qualidade ${analysis.quality}` };
    console.log("[Automático] decisão:", result.mode, result.reason);
    return withCache(result);
  }

  if(intent === "ambiguous"){
    if(analysis.quality === "high"){
      const result = { mode:"basic", intent, quality:analysis.quality, uiLabel:"trechos relevantes", reason:`ambíguo, qualidade alta` };
      console.log("[Automático] decisão:", result.mode, result.reason);
      return withCache(result);
    }
    if(analysis.quality === "low" && canDeep){
      const result = { mode:"deep", intent, quality:analysis.quality, uiLabel:"visão global", reason:`ambíguo, retrieval fraco: ${analysis.reason}` };
      console.log("[Automático] decisão:", result.mode, result.reason);
      return withCache(result);
    }
    if(analysis.quality === "borderline" && analysis.positionSpread > AUTO_MAX_POSITION_SPREAD && canDeep){
      const result = { mode:"deep", intent, quality:analysis.quality, uiLabel:"visão global", reason:`ambíguo, borderline + fragmentado (spread=${analysis.positionSpread.toFixed(2)})` };
      console.log("[Automático] decisão:", result.mode, result.reason);
      return withCache(result);
    }
    const result = { mode:"basic", intent, quality:analysis.quality, uiLabel:"trechos relevantes", reason:`ambíguo, borderline sem spread decisivo` };
    console.log("[Automático] decisão:", result.mode, result.reason);
    return withCache(result);
  }

  // fallback seguro
  const result = { mode:"basic", intent, quality:analysis.quality, uiLabel:"trechos relevantes", reason:"fallback" };
  console.log("[Automático] decisão:", result.mode, result.reason);
  return withCache(result);
}

function openIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("mynd_library_v5",1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore("s");
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}

async function idbGet(k){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const r=db.transaction("s","readonly").objectStore("s").get(k);
    r.onsuccess=()=>res(r.result ?? null);
    r.onerror=()=>rej(r.error);
  });
}

async function idbSet(k,v){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction("s","readwrite");
    tx.objectStore("s").put(v,k);
    tx.oncomplete=res;
    tx.onerror=()=>rej(tx.error);
  });
}

// ─── File System ──────────────────────────────────────

async function wf(dir,name,txt){
  const MAX_TRIES = 3;
  const DELAY_MS  = 350;
  let lastErr;
  for(let attempt = 1; attempt <= MAX_TRIES; attempt++){
    try{
      const fh = await dir.getFileHandle(name, { create: true });
      const w  = await fh.createWritable();
      await w.write(txt);
      await w.close();
      return;
    }catch(e){
      lastErr = e;
      const isPermission = e.name === "InvalidStateError" || e.name === "AbortError" || e.name === "NotAllowedError";
      if(isPermission && attempt < MAX_TRIES){
        try{ await dir.requestPermission({ mode:"readwrite" }); }catch{}
        await new Promise(r => setTimeout(r, DELAY_MS));
        continue;
      }
      if(attempt < MAX_TRIES){
        await new Promise(r => setTimeout(r, DELAY_MS));
        continue;
      }
    }
  }
  throw new Error(`Falha ao salvar "${name}" após ${MAX_TRIES} tentativas: ${lastErr?.message || "erro desconhecido"}`);
}

async function rf(dir,name){
  try{
    return await (await (await dir.getFileHandle(name)).getFile()).text();
  }catch{
    return null;
  }
}

async function rmf(dir,name){
  try{
    await dir.removeEntry(name);
  }catch{}
}

async function listDirFiles(dir){
  const names=[];
  try{
    for await (const [name] of dir.entries()) names.push(name);
  }catch{}
  return names;
}

async function loadIdx(dir){
  const txt = await rf(dir,"index.json");

  if(!txt){
    const fresh = {
      schemaVersion: CURRENT_SCHEMA_VERSION,
      books: [],
      categories: [...DEF_CATS],
      wishlist: [],
      profiles: []
    };
    await saveIdx(dir, fresh);
    return fresh;
  }

  try{
    const parsed = JSON.parse(txt);
    const migrated = migrateIndexData(parsed, true);

    const validCats = new Set(migrated.categories);
    const fixedBooks = migrated.books.map(book=>{
      const normalizedCat = normalizeCategory(book.category);
      return {
        ...book,
        category: validCats.has(normalizedCat) ? normalizedCat : ""
      };
    });

    const fullyMigrated = {
      ...migrated,
      books: fixedBooks
    };

    if(JSON.stringify(parsed) !== JSON.stringify(fullyMigrated)){
      await saveIdx(dir, fullyMigrated);
    }

    return fullyMigrated;
  }catch{
    const fresh = {
      schemaVersion: CURRENT_SCHEMA_VERSION,
      books: [],
      categories: [...DEF_CATS],
      wishlist: [],
      profiles: []
    };
    await saveIdx(dir, fresh);
    return fresh;
  }
}

let pdfjsOk=false;

async function loadPdfLib(){
  if(pdfjsOk || window.pdfjsLib){
    pdfjsOk=true;
    return;
  }
  await new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=res;
    s.onerror=rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  pdfjsOk=true;
}

async function extractPdf(file){
  await loadPdfLib();
  const pdf=await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let t="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    t += c.items.map(x=>x.str).join(" ") + "\n";
    if(i % 2 === 0) await new Promise(r=>setTimeout(r,0));
  }
  return { text:t.trim(), pages:pdf.numPages };
}

async function callClaude(apiKey,system,messages,maxTok=1200){
  let r;
  try{
    r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:maxTok,
        system,
        messages:messages.map(m=>({ role:m.role, content:m.content }))
      })
    });
  }catch(fetchErr){
    throw new Error("Sem conexão com a API. Verifique sua internet ou se há saldo disponível na sua conta Anthropic.");
  }
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    const msg = e?.error?.message || "";
    if(r.status===401) throw new Error("Chave de API inválida. Verifique sua chave Anthropic nas configurações.");
    if(r.status===403) throw new Error("Acesso negado. Verifique se sua chave Anthropic tem permissão para usar este modelo.");
    if(r.status===429) throw new Error("Limite de requisições atingido. Aguarde alguns segundos e tente novamente.");
    if(r.status===529 || msg.toLowerCase().includes("credit") || msg.toLowerCase().includes("billing")){
      throw new Error("Saldo insuficiente na conta Anthropic. Adicione créditos em console.anthropic.com/settings/billing.");
    }
    throw new Error(msg || `Erro na API (HTTP ${r.status}). Tente novamente.`);
  }
  return (await r.json()).content?.[0]?.text || "Sem resposta.";
}

function buildBookContextPrompt(title, query, chunks){

function buildGlobalContextPrompt(query, entries){

// Busca sinopse externa via Claude (título + autor, sem usar o texto do PDF)
async function fetchBookSynopsis(apiKey, title, author){
  const query = author ? `${title} — ${author}` : title;
  const r = await callClaude(
    apiKey,
    `Você é um assistente literário. Baseado no seu conhecimento geral, escreva uma sinopse concisa do livro em português (3 frases no máximo): do que trata e para quem é indicado. Comece OBRIGATORIAMENTE com o formato: "{Título}, de {Autor}, ..." — por exemplo: "War, de Bob Woodward, é um livro que...". Seja direto e breve. Não use markdown, não use títulos, não use negrito, não use #, não use * ou **. Texto corrido simples. Não repita o título em formato diferente ao longo do texto.`,

// ─── Markdown Renderer (React controlado, sem dangerouslySetInnerHTML) ────────
// Suporta: parágrafos, listas simples (- item), negrito (**texto**).
// Remove ## títulos (converte em parágrafo normal).

function renderInline(text){
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if(part.startsWith("**") && part.endsWith("**")){
      return <strong key={i}>{part.slice(2,-2)}</strong>;
    }
    return part;
  });
}

function MarkdownText({ text, style={} }){
  if(!text) return null;
  const normalized = text
    .replace(/\r\n/g,"\n")
    .replace(/^#{1,6}\s+/gm,"")
    .trim();
  const blocks = normalized.split(/\n{2,}/);
  const elements = [];
  let listBuffer = [];
  const flushList = (key) => {
    if(!listBuffer.length) return;
    elements.push(
      <ul key={`ul_${key}`} style={{paddingLeft:20,margin:"4px 0",display:"flex",flexDirection:"column",gap:2}}>
        {listBuffer.map((item,i)=>(
          <li key={i} style={{fontSize:14,color:"#3d3530",lineHeight:1.7}}>{renderInline(item)}</li>
        ))}
      </ul>
    );
    listBuffer = [];
  };
  blocks.forEach((block, i)=>{
    const lines = block.split("\n");
    const listItems = lines.filter(l=>/^[-•*]\s/.test(l.trim()));
    if(listItems.length === lines.filter(l=>l.trim()).length && listItems.length > 0){
      listBuffer.push(...listItems.map(l=>l.replace(/^[-•*]\s+/,"").trim()));
    } else {
      flushList(i);
      const clean = block.trim();
      if(clean){
        elements.push(
          <p key={i} style={{fontSize:14,color:"#3d3530",lineHeight:1.75,margin:0}}>
            {renderInline(clean)}
          </p>
        );
      }
    }
  });
  flushList("end");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10,...style}}>
      {elements}
    </div>
  );
}

// ─── BookProcessingStatus ─────────────────────────────
// Deriva um único estado visível do livro a partir dos campos internos.
// Prioridade: erro > preparando > pronto.

const ERROR_MESSAGES = {
  synopsisStatus:   "Não foi possível gerar a sinopse",
  embeddingsStatus: "Não foi possível preparar a busca inteligente",
  conceptsStatus:   "Não foi possível preparar as ideias principais",
};

function deriveBookStatus(book){
  const fields = ["synopsisStatus", "embeddingsStatus", "conceptsStatus"];

  // 1. Prioridade: qualquer erro
  const errorField = fields.find(f => book[f] === "error");
  if(errorField) return { state:"atencao", errorKey: errorField };

  // 2. Qualquer campo ainda processando
  const processing = fields.some(f => book[f] === "processing");
  if(processing) return { state:"preparando" };

  // 3. Verificar se todos os campos estão "done"
  const allDone = fields.every(f => book[f] === "done");
  if(!allDone) return { state:"atencao", errorKey: fields.find(f => book[f] !== "done") };

  // 4. Verificar dado real de synopsis (único dado inline no objeto book)
  if(!book.synopsis || !book.synopsis.trim())
    return { state:"atencao", errorKey: "synopsisStatus" };

  // 5. Tudo válido
  return { state:"pronto" };
}

function BookProcessingStatus({ book, onRetry }){
  const status = deriveBookStatus(book);

  const isError = status.state === "atencao";
  const isPrep  = status.state === "preparando";
  const isDone  = status.state === "pronto";

  const bg    = isError ? "rgba(122,30,30,.08)"
              : isPrep  ? "rgba(122,90,26,.08)"
              :            "rgba(30,116,76,.07)";
  const color = isError ? "#7a1e1e"
              : isPrep  ? "#7a5a1a"
              :            "#1a6b42";
  const brd   = isError ? "rgba(122,30,30,.28)"
              : isPrep  ? "rgba(122,90,26,.25)"
              :            "rgba(30,116,76,.25)";

  const errorMsg = isError
    ? (ERROR_MESSAGES[status.errorKey] || "Não foi possível preparar este livro")
    : null;

  return(
    <span style={{
      display:"inline-flex", alignItems:"center", gap:5,
      fontSize:11, padding:"2px 9px", borderRadius:10, fontWeight:600,
      background:bg, color, border:`1px solid ${brd}`,
      whiteSpace:"nowrap"
    }}>
      {isPrep && <span style={{animation:"bob .9s infinite"}}>⟳</span>}
      {isPrep && "Preparando o livro"}
      {isDone && "Livro pronto para perguntas"}
      {isError && (
        <>
          {errorMsg}
          {" · "}
          <button
            onClick={()=>onRetry(status.errorKey)}
            style={{background:"none",border:"none",cursor:"pointer",color:"#2d6be4",fontSize:11,fontWeight:700,padding:0,textDecoration:"underline"}}
          >
            Tentar novamente
          </button>
        </>
      )}
    </span>
  );
}

function TagInput({tags,onChange}){
  const [draft,setDraft]=useState("");
  const ref=useRef();

  const commit=useCallback(()=>{
    const normalized = normalizeTagValue(draft);
    if(!normalized){
      setDraft("");
      return;
    }
    const existing = (tags || []).some(
      t => t.toLocaleLowerCase("pt-BR") === normalized.toLocaleLowerCase("pt-BR")
    );
    if(existing){
      setDraft("");
      return;
    }
    onChange(normalizeTags([...(tags || []), normalized]));
    setDraft("");
    setTimeout(()=>ref.current?.focus(),0);
  },[draft,tags,onChange]);

  return(
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",minHeight:44}}>

        <input
          ref={ref}
          value={draft}
          onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); commit(); } }}
          placeholder="Escreva e pressione Enter ou +"
          style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:14}}

// ─── Category Modal ───────────────────────────────────

function CatModal({categories,onSave,onClose}){
  const [cats,setCats]=useState([...categories]);
  const [nv,setNv]=useState("");
  const [ed,setEd]=useState(null);
  const [renameMap,setRenameMap]=useState({});
  const [selectedIdx,setSelectedIdx]=useState(null);

  const add=()=>{
    const v=normalizeCategory(nv);
    if(!trimStr(v)) return;
    const next = uniqueCaseInsensitive([...cats, v]);
    setCats(next);
    setNv("");
  };

  const saveEdit=(i)=>{
    const oldValue = cats[i];
    const val = normalizeCategory(ed?.v);
    if(!val){
      setEd(null);
      return;
    }

    const updated=[...cats];
    updated[i]=val;
    const deduped=uniqueCaseInsensitive(updated);

    if(trimStr(oldValue) !== trimStr(val)){
      setRenameMap(prev=>({
        ...prev,
        [oldValue]: val
      }));
    }

    const newIndex = deduped.findIndex(x=>x===val);
    setCats(deduped);
    setSelectedIdx(newIndex >= 0 ? newIndex : null);
    setEd(null);
  };

  const moveSelected=(dir)=>{
    if(selectedIdx===null) return;
    const target = dir === "up" ? selectedIdx - 1 : selectedIdx + 1;
    if(target < 0 || target >= cats.length) return;
    const next=[...cats];
    const [item]=next.splice(selectedIdx,1);
    next.splice(target,0,item);
    setCats(next);
    setSelectedIdx(target);
  };

  const canMoveUp = selectedIdx !== null && selectedIdx > 0;
  const canMoveDown = selectedIdx !== null && selectedIdx < cats.length - 1;

  return(
    <div style={ov} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{...mb,width:450}}>
        <div style={{fontSize:22,fontWeight:600,color:C.ink,marginBottom:18}}>Gerenciar categorias</div>

        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
          {cats.map((c,i)=>(
            <div
              key={i}
              style={{
                display:"flex",
                alignItems:"center",
                gap:8,
                background:selectedIdx===i?C.accentBg:C.card,
                border:`1px solid ${selectedIdx===i?C.accentBrd:C.border}`,
                borderRadius:7,
                padding:"8px 10px",
                cursor:"pointer"
              }}
              onClick={()=>setSelectedIdx(i)}
            >
              {ed?.i===i ? (
                <>
                  <input
                    autoFocus
                    value={ed.v}
                    onChange={e=>setEd(p=>({...p,v:e.target.value}))}
                    onKeyDown={e=>{
                      if(e.key==="Enter") saveEdit(i);
                      if(e.key==="Escape") setEd(null);
                    }}
                    style={{...fi,padding:"4px 8px",fontSize:14,flex:1}}
                    onClick={e=>e.stopPropagation()}
                  />
                  <button
                    style={{...bI,borderColor:C.accentBrd,color:C.accent}}
                    onClick={(e)=>{ e.stopPropagation(); saveEdit(i); }}
                  >
                    <Ico d={D.check} sz={14}/>
                  </button>
                  <button style={bI} onClick={(e)=>{ e.stopPropagation(); setEd(null); }}>
                    <Ico d={D.close} sz={13}/>
                  </button>
                </>
              ) : (
                <>
                  <span style={{flex:1,fontSize:15,color:C.ink}}>{c}</span>
                  <button style={bI} onClick={(e)=>{ e.stopPropagation(); setEd({i,v:c}); }}>
                    <Ico d={D.edit} sz={13}/>
                  </button>
                  <button
                    style={{...bI,color:C.red,borderColor:C.red+"44"}}
                    onClick={(e)=>{
                      e.stopPropagation();
                      setCats(p=>p.filter((_,j)=>j!==i));
                      setSelectedIdx(prev=>{
                        if(prev===null) return null;
                        if(prev===i) return null;
                        if(prev>i) return prev-1;
                        return prev;
                      });
                    }}
                  >
                    <Ico d={D.trash} sz={13}/>
                  </button>
                </>
              )}
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:22}}>
          <input
            value={nv}
            onChange={e=>setNv(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") add(); }}
            placeholder="Nova categoria…"
            style={{...fi,flex:1}}
          />
          <button style={bP(!nv.trim())} disabled={!nv.trim()} onClick={add}>
            <Ico d={D.plus} sz={16}/>
          </button>
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button
            style={{
              ...bI,
              padding:"8px 10px",
              cursor:canMoveUp?"pointer":"not-allowed",
              opacity:canMoveUp?1:.45
            }}
            disabled={!canMoveUp}
            onClick={()=>moveSelected("up")}
          >
            <Ico d={D.arrowUp} sz={15}/>
          </button>

          <button
            style={{
              ...bI,
              padding:"8px 10px",
              cursor:canMoveDown?"pointer":"not-allowed",
              opacity:canMoveDown?1:.45
            }}
            disabled={!canMoveDown}
            onClick={()=>moveSelected("down")}
          >
            <Ico d={D.arrowDown} sz={15}/>
          </button>

          <button style={bG} onClick={onClose}>Cancelar</button>
          <button
            style={bP(false)}
            onClick={()=>{
              onSave({
                categories: normalizeCategories(cats),
                renameMap
              });
            }}
          >
            Salvar
          </button>
        </div>
      </div>
    </div>
  );
}

function SavedNotesModal({myNotes, otherNotes, profileId, onClose, onEdit, onDelete}){

    const mine = myNotes.map(n => ({ ...n, owner: profileId, isMine: true }));

      notes.map(n => ({ ...n, owner: p, isMine: false }))
    );
    return [...mine, ...others].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  }, [myNotes, otherNotes, profileId]);

  const ITEM_HEIGHT = 72; // altura aproximada de cada item

        {allNotes.length === 0 ? (

          <div style={{display:"flex", gap:12, flex:1, overflow:"hidden", minHeight:0}}>
            {/* Lista — máx 6 itens visíveis, scroll se mais */}
            <div
              className="inner-scroll"
              style={{width:210, minWidth:210, overflowY:"auto", display:"flex", flexDirection:"column", gap:4, maxHeight: listHeight || 400}}
            >
              {allNotes.map(note=>(
                <button
                  key={`${note.owner}_${note.id}`}

                    {note.text}

// ─── Notes Panel (50/50 layout) ───────────────────────

function NotesPanel({dirHandle,bookId,profileId,otherProfiles,synopsis,synopsisStatus,onNotesPresenceChange,onToast,onRegenerateSynopsis}){
  const [myNotes,setMyNotes]=useState([]);
  const [saveState,setSaveState]=useState(null);
  const [ready,setReady]=useState(false);
  const [viewMode,setViewMode]=useState(profileId);
  const [otherNotes,setOtherNotes]=useState({});
  const [draft,setDraft]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [showSavedModal,setShowSavedModal]=useState(false);

  const tabs = useMemo(()=>[profileId, ...otherProfiles], [profileId,otherProfiles]);

  const refreshMine=useCallback(async()=>{
    const notes=await loadNotes(dirHandle,bookId,profileId);
    setMyNotes(notes);
    onNotesPresenceChange?.(notes.length > 0);
    setReady(true);
  },[dirHandle,bookId,profileId,onNotesPresenceChange]);

  useEffect(()=>{ refreshMine(); },[refreshMine]);

  useEffect(()=>{
    const loadOthers=async()=>{
      const result={};
      for(const p of otherProfiles){
        const notes=await loadNotes(dirHandle,bookId,p);
        if(notes.length) result[p]=notes;
      }
      setOtherNotes(result);
    };
    loadOthers();
  },[bookId,otherProfiles,dirHandle]);

  useEffect(()=>{
    setViewMode(profileId);
    setDraft("");
    setEditingId(null);
    setSaveState(null);
  },[bookId,profileId]);

  const saveList=async(next)=>{
    setMyNotes(next);
    setSaveState("saving");
    await saveNotes(dirHandle,bookId,profileId,next);
    onNotesPresenceChange?.(next.length > 0);
    setSaveState("saved");
    setTimeout(()=>setSaveState(c=>c==="saved"?null:c),1200);
  };

  const addOrUpdate=async()=>{
    const text=draft.trim();
    if(!text) return;
    if(editingId){
      const next=myNotes.map(n=>n.id===editingId?{...n,text,updatedAt:new Date().toISOString()}:n);
      await saveList(next);
      setEditingId(null);
      setDraft("");
      onToast?.("Nota atualizada com sucesso");
    }else{
      const next=[{id:uid(),text,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()},...myNotes];
      await saveList(next);
      setDraft("");
      onToast?.("Nota salva com sucesso");
    }
  };

  const startEdit=(note)=>{ setDraft(note.text); setEditingId(note.id); };

  const removeNote=async(id)=>{
    const next=myNotes.filter(n=>n.id!==id);
    await saveList(next);
    if(editingId===id){ setEditingId(null); setDraft(""); }
    onToast?.("Nota excluída");
  };

  const exportNotes=()=>{
    if(!myNotes.length) return;
    const txt=myNotes.map((n,i)=>`Nota ${i+1} — ${new Date(n.updatedAt).toLocaleString("pt-BR")}\n${"─".repeat(40)}\n${n.text}`).join("\n\n");
    const blob=new Blob([`Notas — ${profileId}\n${"═".repeat(40)}\n\n${txt}`],{type:"text/plain"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`notas_${bookId}_${profileId}.txt`; a.click();
    onToast?.("Notas exportadas");
  };

  if(!ready) return null;

  const totalNotes = myNotes.length + Object.values(otherNotes).reduce((s,n)=>s+n.length,0);

  const notesInView = viewMode === profileId ? myNotes : (otherNotes[viewMode] || []);
  const isOwn = viewMode === profileId;

  return(
    <div style={{padding:"10px 28px 8px", display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, alignItems:"stretch"}}>

      {/* ── Lado esquerdo: Sinopse ── */}
      <div style={{flex:1, minWidth:0, display:"flex", flexDirection:"column"}}>
        <div style={{...lb, marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <span style={{display:"flex", alignItems:"center", gap:5}}>
            <Ico d={D.book} sz={11}/> Sinopse
          </span>
          {synopsis && synopsisStatus === "done" && onRegenerateSynopsis && (
            <button
              onClick={onRegenerateSynopsis}
              title="Regenerar sinopse"
              style={{background:"none", border:"none", cursor:"pointer", color:C.inkF, display:"flex", alignItems:"center", gap:3, fontSize:11, padding:0}}
              onMouseEnter={e=>e.currentTarget.style.color=C.accent}
              onMouseLeave={e=>e.currentTarget.style.color=C.inkF}
            >
              <Ico d={D.arrowUp} sz={11}/> Regenerar
            </button>
          )}
        </div>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:"12px 14px", flex:1}}>
          {synopsis ? (
            <p style={{fontSize:13.5, color:C.inkD, lineHeight:1.75}}>{renderSynopsis(synopsis)}</p>
          ) : synopsisStatus === "pending" || synopsisStatus === "processing" ? (
            <p style={{fontSize:13, color:C.inkF, fontStyle:"italic", lineHeight:1.6}}>
              {synopsisStatus === "processing" ? "Gerando sinopse…" : "Sinopse ainda não gerada."}
            </p>
          ) : synopsisStatus === "error" ? (
            <p style={{fontSize:13, color:"#7a1e1e", fontStyle:"italic"}}>Erro ao gerar sinopse.</p>
          ) : (
            <p style={{fontSize:13, color:C.inkF, fontStyle:"italic"}}>Sinopse indisponível.</p>
          )}
        </div>
      </div>

      {/* ── Lado direito: Notas ── */}
      <div style={{flex:1, minWidth:0, display:"flex", flexDirection:"column"}}>
        {/* Header */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8, gap:8, flexWrap:"wrap"}}>
          <div style={{display:"flex", alignItems:"center", gap:6}}>
            <div style={{...lb, display:"flex", alignItems:"center", gap:5}}>
              <Ico d={D.note} sz={11}/> Notas
            </div>
            {myNotes.length > 0 && (
              <button onClick={exportNotes} title="Exportar" style={{...bI,padding:"2px 6px",display:"flex",alignItems:"center",gap:3,fontSize:11}}>
                <Ico d={D.dl} sz={11}/> Exportar
              </button>
            )}
            <button
              onClick={()=>setShowSavedModal(true)}
              style={{...bI, padding:"2px 8px", display:"flex", alignItems:"center", gap:4, fontSize:11,
                background: totalNotes > 0 ? C.goldBg : "none",
                borderColor: totalNotes > 0 ? C.goldBrd : C.border,
                color: totalNotes > 0 ? C.gold : C.inkF
              }}
            >
              <Ico d={D.list} sz={11}/> Notas Salvas {totalNotes > 0 && `(${totalNotes})`}
            </button>
          </div>

          <div style={{display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
            <div style={{display:"flex", gap:3}}>
              {tabs.map(label=>(
                <button key={label} onClick={()=>setViewMode(label)} style={{
                  fontSize:11, padding:"2px 8px", borderRadius:5, cursor:"pointer",
                  border:`1px solid ${viewMode===label?C.accentBrd:C.border}`,
                  background:viewMode===label?C.accentBg:"none",
                  color:viewMode===label?C.accent:C.inkF, fontWeight:500
                }}>{label}</button>
              ))}
            </div>
            {saveState && (
              <span style={{fontSize:11, color:saveState==="saved"?C.green:C.inkF}}>
                {saveState==="saved" ? "✓ salvo" : "salvando…"}
              </span>
            )}
          </div>
        </div>

        {/* Editor (só para próprias notas) */}
        {isOwn && (
          <div style={{background:C.surf, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 10px", flex:1, display:"flex", flexDirection:"column"}}>
            <textarea
              value={draft}
              onChange={e=>setDraft(e.target.value)}
              placeholder="Escreva uma nota"
              style={{...fi, resize:"none", flex:1, minHeight:58, lineHeight:1.6, fontSize:13, border:"none", background:"transparent", padding:0}}
            />
            <div style={{display:"flex", justifyContent:"flex-end", gap:7, marginTop:6}}>
              {editingId && <button onClick={()=>{setEditingId(null); setDraft("");}} style={bG}>Cancelar</button>}
              <button onClick={addOrUpdate} style={bP(!draft.trim())} disabled={!draft.trim()}>
                <Ico d={editingId?D.check:D.save} sz={13} col={draft.trim()?C.surf:"#999"} style={{marginRight:6}}/>
                {editingId ? "Salvar edição" : "Salvar nota"}
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Modal de notas salvas */}
      {showSavedModal && (
        <SavedNotesModal
          myNotes={myNotes}
          otherNotes={otherNotes}
          profileId={profileId}
          onClose={()=>setShowSavedModal(false)}
          onEdit={note=>{ startEdit(note); setShowSavedModal(false); }}
          onDelete={removeNote}
        />
      )}
    </div>
  );
}

function ModeToggle({mode, setMode, deepDisabled}){
  const [tooltip,setTooltip]=useState(null);

  const modes = [
    {id:"auto",  label:"✦ Automático"},

    <div style={{display:"flex",gap:4,alignItems:"center",marginBottom:8,position:"relative",zIndex:10}}>
      {modes.map(({id,label,disabled})=>(
        <div key={id} style={{position:"relative"}}>
          <button
            disabled={disabled}
            onClick={()=>!disabled && setMode(id)}
            onMouseEnter={()=>setTooltip(id)}
            onMouseLeave={()=>setTooltip(null)}
            style={{
              fontSize:12,
              fontWeight:600,
              padding:"4px 12px",
              borderRadius:6,
              border:`1px solid ${mode===id ? "rgba(26,45,69,.4)" : C.border}`,
              background:mode===id ? C.sb : "none",

              cursor:disabled ? "not-allowed" : "pointer",
              opacity:disabled ? 0.4 : 1,
              transition:"background .15s, color .15s, border-color .15s"
            }}
          >
            {label}
          </button>
          {tooltip===id && (
            <div style={{
              position:"fixed",
              bottom:"auto",
              left:"auto",
              background:"#223858",
              border:"1px solid #2d4a6e",
              color:"#fff",
              fontSize:12,
              lineHeight:1.5,
              padding:"7px 11px",
              borderRadius:7,
              whiteSpace:"nowrap",

              boxShadow:"0 4px 16px rgba(0,0,0,.28)",

              transform:"translateY(-8px)",

            }}

                const btn = el.previousSibling;
                if(btn){

                  el.style.top = (r.top - el.offsetHeight - 10) + "px";
                  el.style.left = (r.left + r.width/2 - el.offsetWidth/2) + "px";
                }

              {disabled ? "Visão global indisponível para este livro" : MODE_TOOLTIPS[id]}

      ))}

  );
}

function ChatArea({messages,loading,onSend,placeholder,emptyNode,onExport,mode,setMode,deepDisabled,onToggleInsight,savedMessageIds=new Set(),apiKey=""}){
  const [input,setInput]=useState("");
  const [pendingInsightMsg,setPendingInsightMsg]=useState(null);
  const endRef=useRef();
  const lastAssistantRef=useRef();
  const inputRef=useRef();
  const prevMsgCountRef=useRef(0);

  useEffect(()=>{
    const msgs = messages;
    const prev = prevMsgCountRef.current;
    prevMsgCountRef.current = msgs.length;

    if(msgs.length === 0) return;

    // Nova mensagem adicionada
    if(msgs.length > prev){
      const last = msgs[msgs.length - 1];
      if(last.role === "assistant" && lastAssistantRef.current){
        // Scroll para o início da resposta do assistente
        lastAssistantRef.current.scrollIntoView({ block:"start", behavior:"smooth" });
      } else {
        endRef.current?.scrollIntoView({ behavior:"smooth" });
      }
    }
  },[messages]);

  useEffect(()=>{
    if(loading) endRef.current?.scrollIntoView({ behavior:"smooth" });
  },[loading]);

  useEffect(()=>{
    setInput("");
  },[placeholder]);

  const send=()=>{
    const t=input.trim();
    if(!t || loading) return;
    onSend(t);
    setInput("");
    setTimeout(()=>inputRef.current?.focus(),0);
  };

  const onKey=e=>{
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  };

  return(
    <>
      <div
        className="inner-scroll"
        style={{flex:1,overflowY:"auto",padding:"24px 28px",display:"flex",flexDirection:"column",gap:16}}
      >
        {messages.length===0 && emptyNode}

        {messages.map((m,i)=>{
          const isLastAssistant = m.role==="assistant" && i===messages.map(x=>x.role).lastIndexOf("assistant");
          return(
          <div
            key={i}
            ref={isLastAssistant ? lastAssistantRef : null}
            style={{
              display:"flex",
              gap:10,
              flexDirection:m.role==="user" ? "row-reverse" : "row",
              alignSelf:m.role==="user" ? "flex-end" : "flex-start",
              maxWidth:720
            }}
          >
            <div
              style={{
                width:28,height:28,minWidth:28,borderRadius:"50%",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:11,marginTop:2,
                background:m.role==="user"?"rgba(45,107,228,.12)":"rgba(122,90,26,.1)",
                color:m.role==="user"?C.accent:C.gold,fontWeight:700
              }}
            >
              {m.role==="user" ? m.av : "✦"}
            </div>

            <div style={{position:"relative",maxWidth:"100%"}}>
              {/* Coração — canto inferior direito, só em mensagens do assistente com id */}
              {m.role==="assistant" && m.id && onToggleInsight && (
                <button
                  onClick={()=>{
                    if(savedMessageIds.has(m.id)){
                      onToggleInsight(m, null);
                    } else {
                      // Pega a pergunta anterior (mensagem user imediatamente antes)
                      const prevUser = messages.slice(0,i).reverse().find(x=>x.role==="user");
                      setPendingInsightMsg({...m, questionText: prevUser?.content || ""});
                    }
                  }}
                  title={savedMessageIds.has(m.id) ? "Remover insight" : "Salvar como insight"}
                  style={{
                    position:"absolute",bottom:6,right:6,
                    background:"none",border:"none",cursor:"pointer",
                    fontSize:14,lineHeight:1,padding:2,zIndex:1,
                    color: savedMessageIds.has(m.id) ? "#e05c7a" : C.inkF,
                    transition:"color .15s, transform .15s"
                  }}
                  onMouseEnter={e=>{ e.currentTarget.style.transform="scale(1.2)"; e.currentTarget.style.color="#e05c7a"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.color=savedMessageIds.has(m.id)?"#e05c7a":C.inkF; }}
                >
                  {savedMessageIds.has(m.id) ? "♥" : "♡"}
                </button>
              )}

              <div
                style={{
                  padding:"10px 36px 10px 14px",
                  borderRadius:8,
                  background:m.role==="user" ? "#eaf0fb" : C.card,
                  border:`1px solid ${m.role==="user"?C.accentBrd:C.border}`,
                  color:C.ink,
                }}
              >
                {m.role==="assistant"
                  ? <MarkdownText text={m.content}/>
                  : <span style={{fontSize:14,lineHeight:1.65}}>{m.content}</span>
                }
              </div>
            </div>
          </div>
        );
        })}

        {loading && (
          <div style={{display:"flex",gap:10,alignSelf:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(122,90,26,.1)",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontSize:14}}>
              ✦
            </div>
            <div style={{padding:"10px 14px",borderRadius:8,background:C.card,border:`1px solid ${C.border}`,display:"flex",gap:6,alignItems:"center"}}>
              {[0,1,2].map(i=>(
                <span key={i} style={{width:7,height:7,borderRadius:"50%",background:C.gold,display:"inline-block",animation:`bob .9s ${i*.2}s infinite`}}/>
              ))}
            </div>
          </div>
        )}

        <div ref={endRef}/>
      </div>

      <div style={{padding:"14px 28px 20px",borderTop:`1px solid ${C.border}`,background:C.surf}}>
        {messages.length>0 && onExport && (
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:9}}>
            <button onClick={onExport} style={{...bI,gap:5,fontSize:13,padding:"5px 12px"}}>
              <Ico d={D.dl} sz={13}/> Exportar conversa
            </button>
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 14px"}}>
          {mode !== undefined && (
            <ModeToggle mode={mode} setMode={setMode} deepDisabled={deepDisabled}/>
          )}
          <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
            <textarea
              ref={inputRef}
              rows={3}
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={onKey}
              placeholder={placeholder}
              style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:15,resize:"none",maxHeight:160,lineHeight:1.6,minHeight:52}}
            />
            <button
              onClick={send}
              disabled={!input.trim() || loading}
              style={{
                background:input.trim() && !loading ? C.accent : "#d0ccc8",
                border:"none", borderRadius:6,
                color:input.trim() && !loading ? C.surf : "#999",
                padding:"8px 12px",
                cursor:input.trim() && !loading ? "pointer" : "not-allowed",
                display:"flex",
                alignSelf:"flex-end"
              }}
            >
              <Ico d={D.send} sz={16}/>
            </button>
          </div>
        </div>
      </div>

      {pendingInsightMsg && (
        <SaveInsightModal
          msg={pendingInsightMsg}
          apiKey={apiKey}
          onSave={(name)=>{
            onToggleInsight(pendingInsightMsg, name);
            setPendingInsightMsg(null);
          }}
          onClose={()=>setPendingInsightMsg(null)}
        />
      )}
    </>
  );
}

// ─── SaveInsightModal ─────────────────────────────────

function SaveInsightModal({ onSave, onClose, msg, apiKey }){
  const [name, setName] = useState("");
  const [generating, setGenerating] = useState(true);
  const userEditedRef = useRef(false);
  const inputRef = useRef();

  useEffect(()=>{
    if(!apiKey || !msg?.questionText){ setGenerating(false); setTimeout(()=>inputRef.current?.focus(), 50); return; }
    let cancelled = false;
    callClaude(
      apiKey,
      `Gere um título curto (máx 5 palavras) em português baseado nesta pergunta. Direto ao ponto, sem pontuação no final. Retorne APENAS o título.`,
      [{ role:"user", content: msg.questionText.slice(0, 200) }],
      30
    ).then(title=>{
      if(!cancelled && title?.trim()){
        setGenerating(false);
        if(!userEditedRef.current){
          setName(title.trim());
          setTimeout(()=>{ if(inputRef.current){ inputRef.current.focus(); inputRef.current.select(); }}, 30);
        }
      }
    }).catch(()=>{ if(!cancelled) setGenerating(false); });
    return ()=>{ cancelled=true; };
  },[]);

  return(
    <div style={ov} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{...mb, width:400, maxHeight:"none"}}>
        <div style={{fontSize:17, fontWeight:700, color:C.ink, marginBottom:16, display:"flex", alignItems:"center", gap:8}}>
          ♥ Salvar insight
        </div>
        <div style={{...lb, marginBottom:6}}>Nome do insight</div>
        <input
          ref={inputRef}
          value={name}
          onChange={e=>{ userEditedRef.current=true; setName(e.target.value); }}
          onKeyDown={e=>{ if(e.key==="Enter" && name.trim()) onSave(name.trim()); }}
          placeholder={generating ? "Gerando sugestão…" : "Nome do insight"}
          style={{...fi, marginBottom:18}}
          autoFocus
        />
        <div style={{display:"flex", gap:10, justifyContent:"flex-end"}}>
          <button style={bG} onClick={onClose}>Cancelar</button>
          <button style={bP(!name.trim())} disabled={!name.trim()} onClick={()=>onSave(name.trim())}>
            Salvar
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ChatHistory ──────────────────────────────────────

function ChatHistory({sessions,otherSessions,activeId,onSelect,onNew,onDelete,otherProfileNames=[], title="Conversas anteriores"}){
  const [tab,setTab]=useState("mine");
  const [hoveredId,setHoveredId]=useState(null);
  const allOther=Object.entries(otherSessions || {}).flatMap(([p,ss])=>ss.map(s=>({...s,_profile:p})));
  const hasOther=allOther.length>0;
  const otherTabLabel=otherProfileNames.length===1 ? otherProfileNames[0] : "Outros perfis";

  useEffect(()=>{
    setTab("mine");
  },[sessions, otherSessions]);

  if(!sessions.length && !hasOther) return null;

  const renderSession=(s,showProfile=false)=>{
    const isActive = s.id===activeId;
    const isHovered = hoveredId===s.id;
    const canDelete = !s._profile && onDelete;

    return(
      <div
        key={`${s.id}_${showProfile?s._profile||"":""}`}
        style={{position:"relative",display:"flex",alignItems:"center"}}
        onMouseEnter={()=>setHoveredId(s.id)}
        onMouseLeave={()=>setHoveredId(null)}
      >
        <button
          onClick={()=>onSelect(s)}
          style={{
            flex:1,
            textAlign:"left",
            padding:"7px 10px",
            paddingRight: canDelete ? 28 : 10,
            borderRadius:6,
            border:`1px solid ${isActive ? C.accentBrd : isHovered ? C.border : "transparent"}`,
            background: isActive ? C.accentBg : isHovered ? C.card : "none",
            cursor:"pointer",
            width:"100%",
            transition:"background .12s, border-color .12s"
          }}
        >
          <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
            <Ico d={D.chat} sz={11} col={isActive?C.accent:C.inkF}/>
            <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13,color:isActive?C.accent:C.inkD,fontWeight:isActive?600:400}}>
              {s.title || "Sem título"}
            </span>
            {showProfile && <span style={{fontSize:10,color:C.gold,flexShrink:0,fontStyle:"italic"}}>{s._profile}</span>}
          </div>
          <div style={{fontSize:10,color:C.inkF,marginTop:2,paddingLeft:17}}>{s.date}</div>
        </button>

        {canDelete && isHovered && (
          <button
            onClick={e=>{ e.stopPropagation(); onDelete(s.id); }}
            style={{
              position:"absolute",right:4,
              background:"none",border:"none",cursor:"pointer",
              color:C.inkF,display:"flex",alignItems:"center",padding:4,borderRadius:4,
              transition:"color .12s"
            }}
            onMouseEnter={e=>e.currentTarget.style.color=C.red}
            onMouseLeave={e=>e.currentTarget.style.color=C.inkF}
            title="Excluir conversa"
          >
            <Ico d={D.trash} sz={14} col="currentColor"/>
          </button>
        )}
      </div>
    );
  };

  return(
    <div style={{padding:"8px 28px 0",borderTop:`1px solid ${C.border}`}}>
      <div style={{width:"calc(50% - 8px)"}}>
      <div style={{...lb,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Ico d={D.chat} sz={11}/>
          {hasOther ? (
            <div style={{display:"flex",gap:4}}>
              {[["mine","Minhas"],["other",otherTabLabel]].map(([t,label])=>(
                <button
                  key={t}
                  onClick={()=>setTab(t)}
                  style={{
                    fontSize:11,padding:"2px 8px",borderRadius:4,
                    border:`1px solid ${tab===t?C.accentBrd:C.border}`,
                    background:tab===t?C.accentBg:"none",
                    cursor:"pointer",color:tab===t?C.accent:C.inkF,
                    letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
          ) : (
            <span>{title}</span>
          )}
        </div>

        <button onClick={onNew} style={{background:"none",border:"none",cursor:"pointer",color:C.accent,fontSize:12,display:"flex",alignItems:"center",gap:4,fontWeight:600}}>
          <Ico d={D.plus} sz={11}/> Nova
        </button>
      </div>

      <div className="inner-scroll" style={{display:"flex",flexDirection:"column",gap:1,maxHeight:140,overflowY:"auto"}}>
        {tab==="mine" && sessions.map(s=>renderSession(s,false))}
        {tab==="other" && (
          allOther.length===0
            ? <p style={{fontSize:13,color:C.inkF,fontStyle:"italic",padding:"4px 0"}}>Nenhuma conversa de outros perfis.</p>
            : allOther.map(s=>renderSession(s,true))
        )}
      </div>
      </div>
    </div>
  );
}
