// ─── IndexedDB ────────────────────────────────────────────────────────────────
function openIDB(){return new Promise((res,rej)=>{const r=indexedDB.open("bib_v4",1);r.onupgradeneeded=e=>e.target.result.createObjectStore("s");r.onsuccess=e=>res(e.target.result);r.onerror=()=>rej(r.error);});}
async function idbGet(k){const db=await openIDB();return new Promise((res,rej)=>{const r=db.transaction("s","readonly").objectStore("s").get(k);r.onsuccess=()=>res(r.result??null);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){const db=await openIDB();return new Promise((res,rej)=>{const tx=db.transaction("s","readwrite");tx.objectStore("s").put(v,k);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}

// ─── FS ───────────────────────────────────────────────────────────────────────
async function wf(dir,name,txt){const fh=await dir.getFileHandle(name,{create:true});const w=await fh.createWritable();await w.write(txt);await w.close();}
async function rf(dir,name){try{return await (await (await dir.getFileHandle(name)).getFile()).text();}catch{return null;}}
async function rmf(dir,name){try{await dir.removeEntry(name);}catch{}}

// ─── Index ────────────────────────────────────────────────────────────────────
const DEF_CATS=["Ficção","Não-Ficção","Negócios","Marketing","Ciência","História","Filosofia","Técnico","Outros"];
async function loadIdx(dir){const txt=await rf(dir,"index.json");if(!txt)return{books:[],categories:[...DEF_CATS],wishlist:[]};try{const d=JSON.parse(txt);return{books:d.books||[],categories:d.categories||[...DEF_CATS],wishlist:d.wishlist||[]};}catch{return{books:[],categories:[...DEF_CATS],wishlist:[]};}}
async function saveIdx(dir,data){await wf(dir,"index.json",JSON.stringify(data,null,2));}

// ─── Chat history ─────────────────────────────────────────────────────────────
async function loadChats(dir,bookId,profileId){const txt=await rf(dir,`${bookId}_chats_${profileId}.json`);if(!txt)return[];try{return JSON.parse(txt);}catch{return[];}}
async function saveChats(dir,bookId,profileId,chats){await wf(dir,`${bookId}_chats_${profileId}.json`,JSON.stringify(chats));}

// ─── Stats ────────────────────────────────────────────────────────────────────
async function loadStats(dir){const txt=await rf(dir,"stats.json");if(!txt)return{consultations:{}};try{return JSON.parse(txt);}catch{return{consultations:{}};}}
async function saveStats(dir,stats){await wf(dir,"stats.json",JSON.stringify(stats));}

// ─── PDF.js ───────────────────────────────────────────────────────────────────
let pdfjsOk=false;
async function loadPdfLib(){if(pdfjsOk||window.pdfjsLib){pdfjsOk=true;return;}await new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";s.onload=res;s.onerror=rej;document.head.appendChild(s);});window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";pdfjsOk=true;}
async function extractPdf(file){await loadPdfLib();const pdf=await window.pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;let t="";for(let i=1;i<=pdf.numPages;i++){const c=await (await pdf.getPage(i)).getTextContent();t+=c.items.map(x=>x.str).join(" ")+"\n";if(t.length>130000)break;}return{text:t.slice(0,130000),pages:pdf.numPages};}

// ─── Claude ───────────────────────────────────────────────────────────────────
async function callClaude(apiKey,system,messages,maxTok=1200){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-3-5-haiku-20241022",max_tokens:maxTok,system,messages:messages.map(m=>({role:m.role,content:m.content}))})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return (await r.json()).content?.[0]?.text||"Sem resposta.";
}
const sysBook=(title,text)=>`Você é um assistente literário especializado no livro "${title}". Responda APENAS com base no conteúdo abaixo. Não use conhecimento externo. Se não encontrar, diga claramente. Responda em português, cite trechos quando útil.\n\nCONTEÚDO:\n${text.slice(0,85000)}`;
const sysGlobal=(books,texts)=>{const per=books.length?Math.floor(74000/books.length):0;let s=`Você é assistente com acesso à biblioteca completa (${books.length} livros). Sempre indique de qual livro vem a informação. Use APENAS o conteúdo abaixo. Responda em português.\n\nBIBLIOTECA:`;for(const b of books)s+=`\n\n${"─".repeat(48)}\n📖 ${b.title}${b.author?` — ${b.author}`:""}${b.category?` [${b.category}]`:""}\n${"─".repeat(48)}\n${(texts[b.id]||"").slice(0,Math.max(per,1500))}`;return s;};
const sysSummary=title=>`Leia o trecho do livro "${title}" e escreva um resumo em 3 frases em português: (1) do que trata, (2) para quem é ideal, (3) principal aprendizado. Apenas as 3 frases, sem introdução.`;

// ─── TagInput ─────────────────────────────────────────────────────────────────
function TagInput({tags,onChange}){
  const [draft,setDraft]=useState("");
  const ref=useRef();
  const commit=useCallback(()=>{
    const t=draft.trim();
    if(!t||tags.includes(t)){setDraft("");return;}
    onChange([...tags,t]);
    setDraft("");
    setTimeout(()=>ref.current?.focus(),0);
  },[draft,tags,onChange]);
  return(
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 11px",minHeight:46}}>
      {tags.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {tags.map(t=>(
            <span key={t} style={{...tp,display:"flex",alignItems:"center",gap:5}}>
              {t}
              <button type="button" onClick={e=>{e.preventDefault();onChange(tags.filter(x=>x!==t));}} style={{background:"none",border:"none",cursor:"pointer",color:C.accent,padding:0,lineHeight:1,display:"flex"}}><Ico d={D.close} sz={11}/></button>
            </span>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:7,alignItems:"center"}}>
        <input ref={ref} value={draft} onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();commit();}}}
          placeholder="Escreva e pressione Enter ou +"
          style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:17}}/>
        <button type="button" onClick={e=>{e.preventDefault();commit();}} disabled={!draft.trim()}
          style={{background:draft.trim()?C.accentBg:"none",border:`1px solid ${draft.trim()?C.accentBrd:C.border}`,borderRadius:5,padding:"4px 10px",cursor:draft.trim()?"pointer":"default",color:draft.trim()?C.accent:C.inkF,display:"flex",alignItems:"center"}}>
          <Ico d={D.plus} sz={15}/>
        </button>
      </div>
    </div>
  );
}

// ─── BookModal ────────────────────────────────────────────────────────────────
function BookModal({mode,initial,categories,onSave,onClose,uploading,prog,err}){
  const [d,setD]=useState({title:"",author:"",category:categories[0]||"",tags:[],...initial});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  return(
    <div style={ov} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={mb}>
        <div style={{fontSize:24,fontWeight:500,color:C.ink,marginBottom:20}}>{mode==="add"?"Adicionar ao Acervo":"Editar Livro"}</div>
        <div style={{marginBottom:14}}><div style={{...lb,marginBottom:6}}>Título *</div><input style={fi} value={d.title} onChange={e=>set("title",e.target.value)} placeholder="Título do livro"/></div>
        <div style={{marginBottom:14}}><div style={{...lb,marginBottom:6}}>Autor</div><input style={fi} value={d.author} onChange={e=>set("author",e.target.value)} placeholder="Nome do autor"/></div>
        <div style={{marginBottom:14}}><div style={{...lb,marginBottom:6}}>Categoria</div><select style={{...fi}} value={d.category} onChange={e=>set("category",e.target.value)}>{categories.map(c=><option key={c} style={{background:C.surf}}>{c}</option>)}</select></div>
        <div style={{marginBottom:20}}><div style={{...lb,marginBottom:6}}>Tags</div><TagInput tags={d.tags} onChange={t=>set("tags",t)}/></div>
        {uploading&&(<div style={{marginBottom:12}}><div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:C.accent,width:`${prog}%`,transition:"width .3s",borderRadius:2}}/></div><p style={{fontSize:15,color:C.inkF,marginTop:5}}>Processando PDF e gerando resumo…</p></div>)}
        {err&&<p style={{fontSize:15,color:C.red,marginBottom:12}}>{err}</p>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button style={bG} onClick={onClose}>Cancelar</button>
          <button style={bP(!d.title.trim()||uploading)} disabled={!d.title.trim()||uploading} onClick={()=>onSave(d)}>{uploading?"Processando…":mode==="add"?"Adicionar":"Salvar"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── CatModal ─────────────────────────────────────────────────────────────────
function CatModal({categories,onSave,onClose}){
  const [cats,setCats]=useState([...categories]);
  const [nv,setNv]=useState("");
  const [ed,setEd]=useState(null);
  const add=()=>{const v=nv.trim();if(!v||cats.includes(v)){setNv("");return;}setCats(p=>[...p,v]);setNv("");};
  return(
    <div style={ov} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{...mb,width:430}}>
        <div style={{fontSize:24,fontWeight:500,color:C.ink,marginBottom:18}}>Gerenciar Categorias</div>
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
          {cats.map((c,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px"}}>
              {ed?.i===i
                ?<><input autoFocus value={ed.v} onChange={e=>setEd(p=>({...p,v:e.target.value}))} onKeyDown={e=>{if(e.key==="Enter"){setCats(p=>p.map((x,j)=>j===i?ed.v.trim():x));setEd(null);}if(e.key==="Escape")setEd(null);}} style={{...fi,padding:"4px 8px",fontSize:16,flex:1}}/>
                  <button style={{...bI,borderColor:C.accentBrd,color:C.accent}} onClick={()=>{setCats(p=>p.map((x,j)=>j===i?ed.v.trim():x));setEd(null);}}><Ico d={D.check} sz={14}/></button>
                  <button style={bI} onClick={()=>setEd(null)}><Ico d={D.close} sz={13}/></button>
                </>
                :<><span style={{flex:1,fontSize:18,color:C.ink}}>{c}</span>
                  <button style={bI} onClick={()=>setEd({i,v:c})}><Ico d={D.edit} sz={13}/></button>
                  <button style={{...bI,color:C.red,borderColor:C.red+"44"}} onClick={()=>setCats(p=>p.filter((_,j)=>j!==i))}><Ico d={D.trash} sz={13}/></button>
                </>
              }
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:22}}>
          <input value={nv} onChange={e=>setNv(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}} placeholder="Nova categoria…" style={{...fi,flex:1}}/>
          <button style={bP(!nv.trim())} disabled={!nv.trim()} onClick={add}><Ico d={D.plus} sz={16}/></button>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button style={bG} onClick={onClose}>Cancelar</button>
          <button style={bP(false)} onClick={()=>onSave(cats)}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

// ─── NotesPanel — visualização cruzada ────────────────────────────────────────
function NotesPanel({dirHandle,bookId,profileId,otherProfiles}){
  const [myNotes,setMyNotes]=useState("");
  const [saved,setSaved]=useState(true);
  const [ready,setReady]=useState(false);
  const [viewMode,setViewMode]=useState("mine");
  const [otherNotes,setOtherNotes]=useState({});
  const timer=useRef();

  useEffect(()=>{
    rf(dirHandle,`${bookId}_notes_${profileId}.txt`).then(t=>{setMyNotes(t||"");setReady(true);});
  },[bookId,profileId]);

  useEffect(()=>{
    if(viewMode==="other"||viewMode==="both"){
      const load=async()=>{
        const result={};
        for(const p of otherProfiles){
          const t=await rf(dirHandle,`${bookId}_notes_${p}.txt`);
          if(t?.trim())result[p]=t;
        }
        setOtherNotes(result);
      };
      load();
    }
  },[viewMode,bookId,otherProfiles]);

  const onChange=v=>{
    setMyNotes(v);setSaved(false);
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      await wf(dirHandle,`${bookId}_notes_${profileId}.txt`,v);
      setSaved(true);
    },1200);
  };

  if(!ready)return null;
  const hasOther=otherProfiles.length>0;

  return(
    <div style={{padding:"12px 28px 0"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{...lb,display:"flex",alignItems:"center",gap:6}}><Ico d={D.note} sz={11}/> Notas</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {hasOther&&(
            <div style={{display:"flex",gap:4}}>
              {[["mine","Minhas"],["other","Delas"],["both","Ambas"]].map(([m,label])=>(
                <button key={m} onClick={()=>setViewMode(m)}
                  style={{fontSize:13,padding:"2px 9px",borderRadius:5,border:`1px solid ${viewMode===m?C.accentBrd:C.border}`,background:viewMode===m?C.accentBg:"none",cursor:"pointer",color:viewMode===m?C.accent:C.inkF}}>
                  {label}
                </button>
              ))}
            </div>
          )}
          <span style={{fontSize:13,color:saved?C.green:C.inkF,transition:"color .3s"}}>{saved?"✓ salvo":"salvando…"}</span>
        </div>
      </div>

      {(viewMode==="mine"||viewMode==="both")&&(
        <div style={{marginBottom:viewMode==="both"?12:0}}>
          {viewMode==="both"&&<div style={{...lb,marginBottom:5,color:C.accent,fontSize:11}}>{profileId}</div>}
          <textarea value={myNotes} onChange={e=>onChange(e.target.value)}
            placeholder="Anotações, citações favoritas, reflexões…"
            style={{...fi,resize:"vertical",minHeight:100,lineHeight:1.7,fontSize:17}}/>
        </div>
      )}

      {(viewMode==="other"||viewMode==="both")&&(
        <div>
          {Object.entries(otherNotes).length===0
            ?<p style={{fontSize:16,color:C.inkF,fontStyle:"italic",padding:"8px 0"}}>Nenhuma nota de outros perfis para este livro.</p>

              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ─── ChatArea ─────────────────────────────────────────────────────────────────
function ChatArea({messages,loading,onSend,placeholder,emptyNode,onExport}){
  const [input,setInput]=useState("");
  const endRef=useRef();
  const inputRef=useRef();
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);
  const send=()=>{
    const t=input.trim();
    if(!t||loading)return;
    onSend(t);setInput("");
    setTimeout(()=>inputRef.current?.focus(),0);
  };
  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
  return(
    <>
      <div style={{flex:1,overflowY:"auto",padding:"24px 28px",display:"flex",flexDirection:"column",gap:16}}>
        {messages.length===0&&emptyNode}
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:12,flexDirection:m.role==="user"?"row-reverse":"row",alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:780}}>
            <div style={{width:34,height:34,minWidth:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,marginTop:3,background:m.role==="user"?"rgba(45,107,228,.12)":"rgba(122,90,26,.1)",color:m.role==="user"?C.accent:C.gold,fontWeight:600}}>
              {m.role==="user"?m.av||"?":"✦"}
            </div>
            <div style={{padding:"13px 18px",borderRadius:9,fontSize:18,lineHeight:1.75,whiteSpace:"pre-wrap",background:m.role==="user"?"#eaf0fb":C.card,border:`1px solid ${m.role==="user"?C.accentBrd:C.border}`,color:C.ink}}>
              {m.content}
            </div>
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",gap:12,alignSelf:"flex-start"}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:"rgba(122,90,26,.1)",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontSize:17}}>✦</div>
            <div style={{padding:"16px 20px",borderRadius:9,background:C.card,border:`1px solid ${C.border}`,display:"flex",gap:6,alignItems:"center"}}>
              {[0,1,2].map(i=><span key={i} style={{width:8,height:8,borderRadius:"50%",background:C.gold,display:"inline-block",animation:`bob .9s ${i*.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"14px 28px 20px",borderTop:`1px solid ${C.border}`,background:C.surf}}>
        {messages.length>0&&onExport&&(
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:9}}>
            <button onClick={onExport} style={{...bI,gap:5,fontSize:15,padding:"5px 12px"}}><Ico d={D.dl} sz={13}/> Exportar conversa</button>
          </div>
        )}
        <div style={{display:"flex",gap:10,alignItems:"flex-end",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:"11px 15px"}}>
          <textarea ref={inputRef} rows={1} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={onKey} placeholder={placeholder}
            style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:18,resize:"none",maxHeight:120,lineHeight:1.6}}/>
          <button onClick={send} disabled={!input.trim()||loading}
            style={{background:input.trim()&&!loading?C.accent:"#d0ccc8",border:"none",borderRadius:6,color:input.trim()&&!loading?C.surf:"#999",padding:"8px 12px",cursor:input.trim()&&!loading?"pointer":"not-allowed",display:"flex"}}>
            <Ico d={D.send} sz={16}/>
          </button>
        </div>
      </div>
    </>
  );
}

// ─── ChatHistory — visualização cruzada ──────────────────────────────────────
function ChatHistory({sessions,otherSessions,activeId,onSelect,onNew}){
  const [tab,setTab]=useState("mine");

  const renderSession=(s,showProfile=false)=>(
    <button key={s.id} onClick={()=>onSelect(s)}
      style={{textAlign:"left",padding:"7px 10px",borderRadius:6,border:`1px solid ${s.id===activeId?C.accentBrd:"transparent"}`,background:s.id===activeId?C.accentBg:"none",cursor:"pointer",color:s.id===activeId?C.accent:C.inkD,fontSize:16,display:"flex",alignItems:"center",gap:7,width:"100%"}}>
      <Ico d={D.chat} sz={13} col={s.id===activeId?C.accent:C.inkF}/>
      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title||"Sem título"}</span>

      <div style={{...lb,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Ico d={D.chat} sz={11}/>
          {hasOther?(
            <div style={{display:"flex",gap:4}}>
              {[["mine","Minhas"],["other","Delas"]].map(([t,label])=>(
                <button key={t} onClick={()=>setTab(t)}
                  style={{fontSize:12,padding:"2px 8px",borderRadius:4,border:`1px solid ${tab===t?C.accentBrd:C.border}`,background:tab===t?C.accentBg:"none",cursor:"pointer",color:tab===t?C.accent:C.inkF,letterSpacing:"0.1em",textTransform:"uppercase"}}>
                  {label}

              ))}

        <button onClick={onNew} style={{background:"none",border:"none",cursor:"pointer",color:C.accent,fontSize:13,display:"flex",alignItems:"center",gap:4}}>
          <Ico d={D.plus} sz={11}/> Nova

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:3,maxHeight:140,overflowY:"auto"}}>
        {tab==="mine"&&sessions.map(s=>renderSession(s,false))}

// ─── HomePage ─────────────────────────────────────────────────────────────────
function HomePage({books,wishlist,onAddWish,onEditWish,onDeleteWish,lastBook,onContinue,stats}){
  const [sortCol,setSortCol]=useState("addedAt");
  const [sortAsc,setSortAsc]=useState(false);

  const totalPages=useMemo(()=>books.reduce((s,b)=>s+(b.pages||0),0),[books]);
  const withChats=useMemo(()=>books.filter(b=>b._hasChats).length,[books]);
  const totalInteractions=useMemo(()=>Object.values(stats?.consultations||{}).reduce((s,v)=>s+v,0),[stats]);
  const mostConsulted=useMemo(()=>{
    const c=stats?.consultations||{};
    const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
    return top?books.find(b=>b.id===top[0]):null;
  },[stats,books]);

  const sorted=useMemo(()=>{
    const arr=[...books];
    arr.sort((a,b)=>{
      let av=a[sortCol]||"",bv=b[sortCol]||"";
      if(typeof av==="string")av=av.toLowerCase();
      if(typeof bv==="string")bv=bv.toLowerCase();
      return sortAsc?(av>bv?1:-1):(av<bv?1:-1);
    });
    return arr;
  },[books,sortCol,sortAsc]);

  const toggleSort=col=>{if(sortCol===col)setSortAsc(a=>!a);else{setSortCol(col);setSortAsc(true);}};
  const SortIcon=({col})=>{
    if(sortCol!==col)return<span style={{color:C.border,marginLeft:3}}>↕</span>;
    return<span style={{color:C.accent,marginLeft:3}}>{sortAsc?"↑":"↓"}</span>;
  };

  const KCard=({label,value,sub,col,large})=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 20px",flex:1,minWidth:140}}>
      <div style={{...lb,marginBottom:8}}>{label}</div>
      <div style={{fontSize:large?20:36,fontWeight:large?500:600,color:col||C.ink,lineHeight:1.2}}>{value!==null&&value!==undefined&&value!==""?value:"—"}</div>
      {sub&&<div style={{fontSize:14,color:C.inkF,marginTop:5,lineHeight:1.4}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{flex:1,overflowY:"auto",padding:"36px 40px"}}>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:40,fontWeight:400,color:C.ink,lineHeight:1}}>Minha Biblioteca</h1>
        <p style={{fontSize:19,color:C.inkF,marginTop:7}}>Bem-vinda ao seu acervo pessoal.</p>
      </div>

      {/* Card continuar leitura */}
      {lastBook&&(
        <div style={{background:`linear-gradient(135deg,${C.sb} 0%,#223858 100%)`,borderRadius:12,padding:"20px 24px",marginBottom:28,display:"flex",alignItems:"center",gap:18}}>
          <div style={{width:5,minWidth:5,height:50,borderRadius:3,background:spineC(lastBook.id)}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,letterSpacing:"0.13em",textTransform:"uppercase",color:C.sbInkD,marginBottom:4}}>Continuar leitura</div>
            <div style={{fontSize:21,fontWeight:500,color:C.sbInk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{lastBook.title}</div>
            {lastBook.author&&<div style={{fontSize:16,color:C.sbInkD,marginTop:2}}>{lastBook.author}</div>}
          </div>
          <button onClick={onContinue}
            style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.18)",borderRadius:8,padding:"10px 20px",cursor:"pointer",color:C.sbInk,fontSize:17,flexShrink:0,whiteSpace:"nowrap"}}>
            <Ico d={D.play} sz={14} col={C.sbInk}/> Retomar
          </button>
        </div>
      )}

      {/* KPIs */}
      <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap"}}>
        <KCard label="Total de Livros" value={books.length} col={C.accent}/>
        <KCard label="Total de Páginas" value={totalPages>0?totalPages.toLocaleString("pt-BR"):null}/>
        <KCard label="Com Conversas" value={withChats||null}/>
        <KCard label="Interações" value={totalInteractions||null}/>
        {mostConsulted&&<KCard label="Mais Consultado" value={mostConsulted.title} sub={mostConsulted.author} col={C.gold} large/>}
      </div>

      {/* Tabela de livros */}
      {books.length>0&&(
        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px 24px",marginBottom:28}}>
          <div style={{fontSize:20,fontWeight:500,color:C.ink,marginBottom:16}}>Acervo</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:17}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {[["title","Nome"],["author","Autor"],["category","Categoria"],["addedAt","Data"]].map(([col,label])=>(
                    <th key={col} onClick={()=>toggleSort(col)} style={{textAlign:"left",padding:"8px 12px",cursor:"pointer",color:C.inkD,fontWeight:500,fontSize:14,letterSpacing:"0.05em",userSelect:"none",whiteSpace:"nowrap"}}>
                      {label}<SortIcon col={col}/>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.map(b=>(
                  <tr key={b.id} style={{borderBottom:`1px solid ${C.borderL}`}}>
                    <td style={{padding:"10px 12px",color:C.ink,fontWeight:500}}>{b.title}</td>

                    <td style={{padding:"10px 12px"}}>{b.category&&<span style={{...tp,fontSize:13}}>{b.category}</span>}</td>
                    <td style={{padding:"10px 12px",color:C.inkF,fontSize:15}}>{b.addedAt?new Date(b.addedAt).toLocaleDateString("pt-BR"):"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Wishlist */}
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <Ico d={D.heart} sz={18} col={C.red}/>
            <span style={{fontSize:21,fontWeight:500,color:C.ink}}>Wishlist</span>
            <span style={{fontSize:16,color:C.inkF}}>— livros que quero adquirir</span>
          </div>
          <button onClick={onAddWish} style={{display:"flex",alignItems:"center",gap:6,background:C.accentBg,border:`1px solid ${C.accentBrd}`,borderRadius:6,padding:"7px 16px",cursor:"pointer",color:C.accent,fontSize:17}}>
            <Ico d={D.plus} sz={14}/> Adicionar
          </button>
        </div>
        {wishlist.length===0&&<p style={{fontSize:17,color:C.inkF,fontStyle:"italic"}}>Nenhum livro na wishlist ainda.</p>}
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {wishlist.map(w=>(
            <div key={w.id} style={{display:"flex",alignItems:"center",gap:14,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 16px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:18,fontWeight:500,color:C.ink,lineHeight:1.3}}>{w.title}</div>
                {w.author&&<div style={{fontSize:15,color:C.inkF,marginTop:2}}>{w.author}</div>}
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0}}>
                {w.link&&(
                  <a href={w.link} target="_blank" rel="noopener"
                    style={{display:"flex",alignItems:"center",gap:5,fontSize:15,color:C.accent,padding:"5px 12px",border:`1px solid ${C.accentBrd}`,borderRadius:5,textDecoration:"none",background:C.accentBg}}>
                    <Ico d={D.link} sz={12}/> Comprar
                  </a>
                )}
                <button onClick={()=>onEditWish(w)} style={{...bI,padding:"5px 9px"}}><Ico d={D.edit} sz={13}/></button>
                <button onClick={()=>onDeleteWish(w.id)} style={{...bI,color:C.red,borderColor:C.red+"44",padding:"5px 9px"}}><Ico d={D.trash} sz={13}/></button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Setup ────────────────────────────────────────────────────────────────────
function Setup({onReady}){
  const [apiKey,setKey]=useState(()=>localStorage.getItem("bib_apikey")||"");
  const [dir,setDir]=useState(null);
  const [dirName,setDirName]=useState("");
  const [profile,setProfile]=useState(()=>localStorage.getItem("bib_user")||DEF_PROFILES[0]);
  const [customProfile,setCustomProfile]=useState("");
  const [err,setErr]=useState("");
  const pick=async()=>{try{const dh=await window.showDirectoryPicker({mode:"readwrite",startIn:"documents"});setDir(dh);setDirName(dh.name);setErr("");}catch(e){if(e.name!=="AbortError")setErr("Não foi possível acessar a pasta.");}};
  const finish=async()=>{
    const name=(profile==="custom"?customProfile:profile).trim();
    if(!apiKey.trim()||!dir||!name)return;
    await idbSet("dir",dir);
    await wf(dir,"apikey.txt",apiKey.trim());
    localStorage.setItem("bib_user",name);
    localStorage.setItem("bib_apikey",apiKey.trim());
    onReady(dir,apiKey.trim(),name);
  };
  const finalName=(profile==="custom"?customProfile:profile).trim();
  const ready=!!apiKey.trim()&&!!dir&&!!finalName;
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:24}}>
      <div style={{width:560,maxWidth:"92vw"}}>
        <h1 style={{fontSize:44,fontWeight:400,color:C.ink,marginBottom:6}}>Biblioteca Virtual</h1>
        <p style={{fontSize:18,color:C.inkD,lineHeight:1.65,marginBottom:28}}>Configure uma vez — os dados ficam salvos na pasta escolhida, permanentemente.</p>
        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:28,display:"flex",flexDirection:"column",gap:22}}>
          <div>
            <div style={{...lb,marginBottom:8}}>Quem está usando?</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:profile==="custom"?10:0}}>
              {[...DEF_PROFILES,"custom"].map(p=>(
                <button key={p} onClick={()=>setProfile(p)}
                  style={{padding:"8px 18px",borderRadius:7,border:`1px solid ${profile===p?C.accentBrd:C.border}`,background:profile===p?C.accentBg:"none",cursor:"pointer",color:profile===p?C.accent:C.inkD,fontSize:17}}>
                  {p==="custom"?"Outro…":p}
                </button>
              ))}

          </div>
          <div>
            <div style={{...lb,marginBottom:8}}>Chave de API Anthropic</div>
            <p style={{fontSize:16,color:C.inkF,lineHeight:1.6,marginBottom:10}}>Crie grátis em <a href="https://console.anthropic.com" target="_blank" style={{color:C.accent}}>console.anthropic.com</a>. Para uso compartilhado, a mesma chave serve para as duas pessoas.</p>
            <input type="password" style={fi} placeholder="sk-ant-…" value={apiKey} onChange={e=>setKey(e.target.value)}/>
          </div>
          <div>
            <div style={{...lb,marginBottom:8}}>Pasta compartilhada</div>
            <p style={{fontSize:16,color:C.inkF,lineHeight:1.6,marginBottom:10}}>Escolha uma pasta sincronizada (Dropbox, OneDrive, Google Drive) para acessar os mesmos livros de qualquer dispositivo.</p>
            <button onClick={pick} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 18px",border:`1px solid ${dir?C.accentBrd:C.border}`,borderRadius:7,cursor:"pointer",background:"none",color:dir?C.accent:C.inkD,fontSize:18}}>
              <Ico d={D.folder} sz={16}/>{dir?`✓  ${dirName}`:"Escolher pasta…"}

  const [chatLoading,setChatLoading]  = useState(false);
  const [globalLoading,setGlobalLoading]=useState(false);
  const [searchQ,setSearchQ]          = useState("");
  const [tagFilter,setTagFilter]      = useState("");
  const [catFilter,setCatFilter]      = useState("Todos");
  const [activeFilter,setActiveFilter]= useState("search");
  const [modal,setModal]              = useState(null);
  const [editBook,setEditBook]        = useState(null);
  const [wishModal,setWishModal]      = useState(false);
  const [wishEdit,setWishEdit]        = useState(null);
  const [pendingFile,setPendingFile]  = useState(null);
  const [uploading,setUploading]      = useState(false);
  const [upProg,setUpProg]            = useState(0);
  const [upErr,setUpErr]              = useState("");
  const [userName,setUserName]        = useState(initUser);
  const [lastBook,setLastBook]        = useState(null);
  const fileRef=useRef();

  const otherProfiles=useMemo(()=>DEF_PROFILES.filter(p=>p!==userName),[userName]);

  useEffect(()=>{
    Promise.all([loadIdx(dirHandle),loadStats(dirHandle)]).then(([{books:b,categories:c,wishlist:w},st])=>{
      setBooks(b);setCats(c);setWishlist(w||[]);setStats(st);
      const lastId=localStorage.getItem("bib_lastBook");
      if(lastId){const found=b.find(x=>x.id===lastId);if(found)setLastBook(found);}
    });
  },[]);

  const persist=async(b,c,w)=>saveIdx(dirHandle,{books:b,categories:c,wishlist:w});

  const bumpStat=async(bookId)=>{
    setStats(prev=>{
      const next={...prev,consultations:{...prev.consultations,[bookId]:(prev.consultations[bookId]||0)+1}};
      saveStats(dirHandle,next);
      return next;
    });
  };

  const allTags=useMemo(()=>{const s=new Set();books.forEach(b=>(b.tags||[]).forEach(t=>s.add(t)));return[...s].sort();},[books]);
  const setFilterSearch=q=>{setSearchQ(q);setTagFilter("");setCatFilter("Todos");setActiveFilter("search");};
  const setFilterTag=t=>{setTagFilter(t);setSearchQ("");setCatFilter("Todos");setActiveFilter("tag");};
  const setFilterCat=c=>{setCatFilter(c);setSearchQ("");setTagFilter("");setActiveFilter("cat");};
  const clearFilters=()=>{setSearchQ("");setTagFilter("");setCatFilter("Todos");setActiveFilter("search");};

  const filtered=useMemo(()=>books.filter(b=>{
    if(activeFilter==="cat"&&catFilter!=="Todos"&&b.category!==catFilter)return false;
    if(activeFilter==="tag"&&tagFilter&&!(b.tags||[]).includes(tagFilter))return false;
    if(activeFilter==="search"&&searchQ){const q=searchQ.toLowerCase();return b.title.toLowerCase().includes(q)||(b.author||"").toLowerCase().includes(q);}
    return true;
  }),[books,activeFilter,catFilter,tagFilter,searchQ]);

  const catCounts=useMemo(()=>{const m={};books.forEach(b=>{m[b.category]=(m[b.category]||0)+1;});return m;},[books]);
  const hasActiveFilter=(activeFilter==="search"&&searchQ)||(activeFilter==="tag"&&tagFilter)||(activeFilter==="cat"&&catFilter!=="Todos");

  const handleFilePick=e=>{const f=e.target.files?.[0];e.target.value="";if(!f)return;if(!f.name.toLowerCase().endsWith(".pdf")){alert("Apenas PDFs.");return;}setPendingFile(f);setModal({type:"add",initial:{title:f.name.replace(/\.pdf$/i,"").replace(/[-_]/g," "),author:"",category:cats[0]||"",tags:[]}});setUpErr("");setUpProg(0);};

  const doAdd=async(fd)=>{
    setUploading(true);setUpProg(15);setUpErr("");
    try{
      const {text,pages}=await extractPdf(pendingFile);setUpProg(55);
      let summary="";
      try{summary=await callClaude(apiKey,sysSummary(fd.title),[{role:"user",content:text.slice(0,20000)}],300);}catch{}
      setUpProg(85);
      const id=`b${Date.now()}`;
      const book={id,title:fd.title.trim(),author:fd.author.trim(),category:fd.category,tags:fd.tags,pages,summary,addedAt:new Date().toISOString()};
      await wf(dirHandle,`${id}.txt`,text);
      const nb=[...books,book];setBooks(nb);await persist(nb,cats,wishlist);
      setUpProg(100);setTimeout(()=>{setModal(null);setPendingFile(null);setUploading(false);setUpProg(0);},500);
    }catch(e){setUpErr("Erro: "+e.message);setUploading(false);setUpProg(0);}
  };

  const doEdit=async fd=>{const nb=books.map(b=>b.id===editBook.id?{...b,...fd}:b);setBooks(nb);if(selBook?.id===editBook.id)setSelBook(p=>({...p,...fd}));await persist(nb,cats,wishlist);setModal(null);setEditBook(null);};
  const doDelete=async book=>{if(!confirm(`Remover "${book.title}"?`))return;await rmf(dirHandle,`${book.id}.txt`);await rmf(dirHandle,`${book.id}_notes.txt`);const nb=books.filter(b=>b.id!==book.id);setBooks(nb);await persist(nb,cats,wishlist);if(selBook?.id===book.id){setSelBook(null);setScreen("home");}};
  const saveCats=async nc=>{setCats(nc);await persist(books,nc,wishlist);setModal(null);};
  const saveWish=async d=>{let nw;if(wishEdit){nw=wishlist.map(w=>w.id===wishEdit.id?{...wishEdit,...d}:w);}else{nw=[...wishlist,{...d,id:`w${Date.now()}`,addedAt:new Date().toISOString()}];}setWishlist(nw);await persist(books,cats,nw);setWishModal(false);setWishEdit(null);};
  const deleteWish=async id=>{const nw=wishlist.filter(w=>w.id!==id);setWishlist(nw);await persist(books,cats,nw);};

  const openBook=async(book)=>{
    setSelBook(book);setScreen("book");
    setLastBook(book);localStorage.setItem("bib_lastBook",book.id);
    await bumpStat(book.id);
    const txt=await rf(dirHandle,`${book.id}.txt`);setBookText(txt||"");
    const sessions=await loadChats(dirHandle,book.id,userName);
    setChatSessions(sessions);
    // load other profiles' sessions
    const others={};
    for(const p of otherProfiles){
      const ss=await loadChats(dirHandle,book.id,p);
      if(ss.length)others[p]=ss;
    }
    setOtherSessions(others);
    const lastId=localStorage.getItem(`bib_lastChat_${book.id}`);
    const last=sessions.find(s=>s.id===lastId);
    if(last){setBookMsgs(last.messages);setActiveChatId(last.id);}
    else{setBookMsgs([]);setActiveChatId(null);}
  };

  const newChat=()=>{setBookMsgs([]);setActiveChatId(null);};
  const selectChat=s=>{
    setBookMsgs(s.messages);
    if(!s._profile){setActiveChatId(s.id);localStorage.setItem(`bib_lastChat_${selBook.id}`,s.id);}
    else setActiveChatId(null); // read-only for other profiles
  };

  const saveCurrentChat=async msgs=>{
    if(!selBook||!msgs.length)return;
    const firstUser=msgs.find(m=>m.role==="user");
    const title=firstUser?firstUser.content.slice(0,50):"Conversa";
    const date=new Date().toLocaleDateString("pt-BR");
    let sessions=[...chatSessions];
    if(activeChatId){sessions=sessions.map(s=>s.id===activeChatId?{...s,messages:msgs,title,date}:s);}
    else{const id=`c${Date.now()}`;sessions=[{id,title,date,messages:msgs,profileId:userName,bookId:selBook.id},...sessions];setActiveChatId(id);localStorage.setItem(`bib_lastChat_${selBook.id}`,id);}
    setChatSessions(sessions);
    await saveChats(dirHandle,selBook.id,userName,sessions);
    if(!selBook._hasChats){const nb=books.map(b=>b.id===selBook.id?{...b,_hasChats:true}:b);setBooks(nb);await persist(nb,cats,wishlist);}
  };

  const openGlobal=async()=>{setScreen("global");if(globalTexts)return;setGlobalLoading(true);const t={};for(const b of books){t[b.id]=await rf(dirHandle,`${b.id}.txt`)||"";}setGlobalTexts(t);setGlobalLoading(false);};

  const av=userName?userName.charAt(0).toUpperCase():"?";
  const mkM=(role,content)=>({role,content,av});

  const sendBook=async txt=>{
    const next=[...bookMsgs,mkM("user",txt)];
    setBookMsgs(next);setChatLoading(true);
    try{const r=await callClaude(apiKey,sysBook(selBook.title,bookText),next);const final=[...next,mkM("assistant",r)];setBookMsgs(final);await saveCurrentChat(final);}
    catch(e){setBookMsgs(p=>[...p,mkM("assistant","Erro: "+e.message)]);}
    setChatLoading(false);
  };
  const sendGlobal=async txt=>{if(!globalTexts)return;const next=[...globalMsgs,mkM("user",txt)];setGlobalMsgs(next);setChatLoading(true);try{const r=await callClaude(apiKey,sysGlobal(books,globalTexts),next);setGlobalMsgs(p=>[...p,mkM("assistant",r)]);}catch(e){setGlobalMsgs(p=>[...p,mkM("assistant","Erro: "+e.message)]);}setChatLoading(false);};
  const exportChat=(msgs,title)=>{const txt=msgs.map(m=>`[${m.role==="user"?userName||"Você":"Biblioteca"}]\n${m.content}`).join("\n\n──────────────────\n\n");const blob=new Blob([`Conversa: ${title}\n${"═".repeat(36)}\n\n${txt}`],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`conversa_${title.replace(/\s+/g,"_").slice(0,30)}.txt`;a.click();};
  const switchProfile=name=>{setUserName(name);localStorage.setItem("bib_user",name);};
  const suggClick=(fn,txt)=>()=>fn(txt);

  // ── Sidebar ──────────────────────────────────────────────────────────────────
  const Sidebar=()=>(
    <aside style={{width:285,minWidth:285,background:C.sb,borderRight:`1px solid ${C.sbBorder}`,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"20px 18px 14px",borderBottom:`1px solid ${C.sbBorder}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:23,fontWeight:600,color:C.sbInk,display:"flex",alignItems:"center",gap:9}}>
            <Ico d={D.book} sz={19} col="#7ab4ff"/> Biblioteca
          </div>
          <ProfileSwitcher userName={userName} onSwitch={switchProfile}/>
        </div>
        <div style={{...sbLb,marginTop:3}}>{dirHandle.name}</div>
      </div>

      <div style={{padding:"10px 10px 8px",borderBottom:`1px solid ${C.sbBorder}`}}>
        {[
          {id:"home",label:"Página Inicial",icon:D.home,fn:()=>setScreen("home")},
          {id:"global",label:"Pesquisar na biblioteca",icon:D.globe,fn:openGlobal},
        ].map(({id,label,icon,fn})=>(
          <button key={id} onClick={fn}
            style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"9px 12px",marginBottom:3,borderRadius:7,cursor:"pointer",border:"none",textAlign:"left",fontSize:17,fontWeight:screen===id?500:400,background:screen===id?C.sbSurf:"none",color:screen===id?C.sbInk:C.sbInkD}}>
            <Ico d={icon} sz={16} col={screen===id?"#7ab4ff":C.sbInkF}/>{label}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 13px 8px",borderBottom:`1px solid ${C.sbBorder}`}}>
        <div style={{...sbLb,display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}><Ico d={D.list} sz={11}/> Meus Livros</span>
          <button onClick={()=>setModal({type:"cats"})} title="Gerenciar categorias" style={{background:"none",border:"none",cursor:"pointer",color:C.sbInkF,display:"flex",padding:2}}><Ico d={D.edit} sz={11}/></button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(0,0,0,.2)",border:`1px solid ${activeFilter==="search"&&searchQ?"rgba(45,107,228,.6)":C.sbBorder}`,borderRadius:6,padding:"8px 11px",marginBottom:10}}>
          <Ico d={D.search} sz={14} col={C.sbInkF}/>
          <input value={searchQ} onChange={e=>setFilterSearch(e.target.value)} placeholder="Título ou autor…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:C.sbInk,fontSize:17,minWidth:0}}/>
          {searchQ&&<button onClick={clearFilters} style={{background:"none",border:"none",cursor:"pointer",color:C.sbInkF,display:"flex"}}><Ico d={D.close} sz={12}/></button>}
        </div>
        {allTags.length>0&&(
          <div style={{marginBottom:10}}>
            <div style={{...sbLb,marginBottom:6,display:"flex",alignItems:"center",gap:4}}><Ico d={D.tag} sz={10}/> Tags</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {allTags.map(t=>(
                <button key={t} onClick={()=>activeFilter==="tag"&&tagFilter===t?clearFilters():setFilterTag(t)}
                  style={{fontSize:13,padding:"2px 9px",borderRadius:10,cursor:"pointer",border:`1px solid ${activeFilter==="tag"&&tagFilter===t?"rgba(45,107,228,.7)":"rgba(45,107,228,.3)"}`,background:activeFilter==="tag"&&tagFilter===t?"rgba(45,107,228,.25)":"rgba(45,107,228,.1)",opacity:activeFilter==="tag"&&tagFilter&&tagFilter!==t?.4:1,color:activeFilter==="tag"&&tagFilter===t?"#7ab4ff":C.sbInkD}}>
                  {t}
                </button>
              ))}
            </div>
          </div>
        )}
        <div>
          <div style={{...sbLb,marginBottom:6,display:"flex",alignItems:"center",gap:4}}><Ico d={D.list} sz={10}/> Categorias</div>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            {["Todos",...cats].map(cat=>(
              <button key={cat} onClick={()=>cat==="Todos"?clearFilters():activeFilter==="cat"&&catFilter===cat?clearFilters():setFilterCat(cat)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 10px",borderRadius:6,cursor:"pointer",border:"none",background:activeFilter==="cat"&&catFilter===cat?C.sbSurf:"none",color:activeFilter==="cat"&&catFilter===cat?"#7ab4ff":C.sbInkD,fontSize:16,textAlign:"left"}}>
                <span>{cat}</span>
                <span style={{fontSize:13,color:C.sbInkF}}>{cat==="Todos"?books.length:(catCounts[cat]||0)}</span>
              </button>
            ))}
          </div>
        </div>
        {hasActiveFilter&&(
          <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6,background:"rgba(45,107,228,.12)",border:"1px solid rgba(45,107,228,.3)",borderRadius:6,padding:"5px 10px"}}>
            <span style={{fontSize:14,color:"#7ab4ff",flex:1}}>
              {activeFilter==="search"&&`"${searchQ}"`}
              {activeFilter==="tag"&&`Tag: ${tagFilter}`}
              {activeFilter==="cat"&&`Categoria: ${catFilter}`}
            </span>
            <button onClick={clearFilters} style={{background:"none",border:"none",cursor:"pointer",color:"#7ab4ff",display:"flex"}}><Ico d={D.close} sz={12}/></button>
          </div>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"8px 9px"}}>
        {filtered.map(b=>(
          <div key={b.id} onClick={()=>openBook(b)}
            style={{display:"flex",alignItems:"flex-start",gap:8,padding:"9px 9px",borderRadius:7,cursor:"pointer",border:`1px solid ${selBook?.id===b.id&&screen==="book"?"rgba(45,107,228,.5)":"transparent"}`,background:selBook?.id===b.id&&screen==="book"?C.sbSurf:"none",marginBottom:2}}>
            <div style={{width:4,minWidth:4,height:44,borderRadius:2,background:spineC(b.id),marginTop:2}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:17,fontWeight:500,color:C.sbInk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.title}</div>
              {b.author&&<div style={{fontSize:14,color:C.sbInkD,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.author}</div>}
              {b.category&&<div style={{fontSize:12,color:C.sbInkF,marginTop:2}}>{b.category}</div>}
            </div>
          </div>
        ))}
        {!filtered.length&&<p style={{fontSize:16,color:C.sbInkF,padding:"10px 4px"}}>{books.length===0?"Nenhum livro ainda.":"Sem resultados."}</p>}
      </div>

      <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={handleFilePick}/>
      <button onClick={()=>fileRef.current?.click()}
        style={{margin:"0 10px 14px",display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"10px",border:"1px dashed rgba(45,107,228,.35)",borderRadius:7,cursor:"pointer",color:C.sbInkF,fontSize:17,background:"none"}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(122,180,255,.6)";e.currentTarget.style.color="#7ab4ff";}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(45,107,228,.35)";e.currentTarget.style.color=C.sbInkF;}}>
        <Ico d={D.up} sz={15}/> Adicionar livro (PDF)
      </button>
    </aside>
  );

  const WelcomeBook=()=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 24px"}}>
      <div style={{fontSize:22,fontWeight:500,color:C.accent,marginBottom:8}}>📖 Converse com este livro</div>
      <p style={{fontSize:18,color:C.inkD,lineHeight:1.7}}>As respostas são baseadas exclusivamente no texto do livro, sem fontes externas.</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:9,marginTop:14}}>
        {["Qual é o tema central?","Faça um resumo","Principais conceitos","Quem são os personagens?"].map(s=>(
          <button key={s} style={{fontSize:17,padding:"6px 14px",borderRadius:6,border:`1px solid ${C.border}`,background:"none",color:C.inkD,cursor:"pointer"}} onClick={suggClick(sendBook,s)}>{s}</button>
        ))}
      </div>
    </div>
  );

  const WelcomeGlobal=()=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 24px"}}>
      <div style={{fontSize:22,fontWeight:500,color:C.accent,marginBottom:8,display:"flex",alignItems:"center",gap:8}}><Ico d={D.globe} sz={20}/> Pesquisa global</div>
      <p style={{fontSize:18,color:C.inkD,lineHeight:1.7}}>Faça perguntas que cruzam múltiplos livros. A IA sempre indica de qual obra vem cada informação.{globalLoading&&<em style={{color:C.inkF}}> Carregando…</em>}</p>
      {!globalLoading&&books.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:9,marginTop:14}}>
          {["Quais livros falam sobre estratégia?","Compare os autores","Resuma cada livro em uma frase","Que temas se repetem?"].map(s=>(
            <button key={s} style={{fontSize:17,padding:"6px 14px",borderRadius:6,border:`1px solid ${C.border}`,background:"none",color:C.inkD,cursor:"pointer"}} onClick={suggClick(sendGlobal,s)}>{s}</button>
          ))}
        </div>
      )}
    </div>
  );

  return(
    <div style={{display:"flex",height:"100vh",color:C.ink,overflow:"hidden"}}>
      <Sidebar/>
      <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:C.bg}}>

        {screen==="home"&&(
          <HomePage books={books} wishlist={wishlist} stats={stats}
            lastBook={lastBook} onContinue={()=>{if(lastBook)openBook(lastBook);}}
            onAddWish={()=>{setWishEdit(null);setWishModal(true);}}
            onEditWish={w=>{setWishEdit(w);setWishModal(true);}}
            onDeleteWish={deleteWish}/>
        )}

        {screen==="book"&&selBook&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"16px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",gap:12,background:C.surf}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div style={{flex:1}}>
                <div style={{fontSize:26,fontWeight:500,color:C.ink}}>{selBook.title}</div>
                {selBook.author&&<div style={{fontSize:18,color:C.inkF,marginTop:3}}>{selBook.author}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:8}}>
                  {selBook.category&&<span style={{...tp,fontSize:14}}>Categoria: {selBook.category}</span>}
                  {(selBook.tags||[]).length>0&&<span style={{fontSize:14,color:C.inkF}}>Tags: {(selBook.tags||[]).join(", ")}</span>}
                  {selBook.pages&&<span style={{fontSize:15,color:C.inkF}}>{selBook.pages} pág.</span>}
                </div>
              </div>
              <button style={bI} onClick={()=>{setEditBook(selBook);setModal({type:"edit",initial:selBook});}}><Ico d={D.edit} sz={14}/></button>
              <button style={{...bI,color:C.red}} onClick={()=>doDelete(selBook)}><Ico d={D.trash} sz={14}/></button>
            </div>
            {selBook.summary&&(
              <div style={{padding:"13px 28px 0"}}>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:"13px 20px",fontSize:18,color:C.inkD,lineHeight:1.75,fontStyle:"italic"}}>
                  <strong style={{fontStyle:"normal",fontSize:13,letterSpacing:"0.1em",textTransform:"uppercase",color:C.gold}}>Resumo  </strong>{selBook.summary}
                </div>
              </div>
            )}
            <NotesPanel dirHandle={dirHandle} bookId={selBook.id} profileId={userName} otherProfiles={otherProfiles}/>
            <ChatHistory sessions={chatSessions} otherSessions={otherSessions} activeId={activeChatId} onSelect={selectChat} onNew={newChat}/>
            <div style={{padding:"8px 28px 0",borderBottom:`1px solid ${C.border}`,borderTop:chatSessions.length||Object.keys(otherSessions).length?`1px solid ${C.border}`:"none"}}>
              <div style={{...lb,paddingBottom:7,display:"flex",alignItems:"center",gap:6}}><Ico d={D.chat} sz={11}/> Conversa {activeChatId?"(continuando)":"(nova)"}</div>
            </div>
            <ChatArea messages={bookMsgs} loading={chatLoading} onSend={sendBook}
              placeholder="Pergunte algo sobre este livro…"
              onExport={()=>exportChat(bookMsgs,selBook.title)}
              emptyNode={<WelcomeBook/>}/>
          </div>
        )}

        {screen==="global"&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"16px 28px",borderBottom:`1px solid ${C.border}`,background:C.surf,display:"flex",alignItems:"center",gap:12}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div>
                <div style={{fontSize:23,fontWeight:500,color:C.ink,display:"flex",alignItems:"center",gap:8}}><Ico d={D.globe} sz={19} col={C.accent}/> Pesquisa na biblioteca</div>
                <div style={{fontSize:15,color:C.inkF,marginTop:2}}>{books.length} livros {globalLoading?"· carregando…":globalTexts?"· pronto":""}</div>
              </div>
            </div>
            <ChatArea messages={globalMsgs} loading={chatLoading||globalLoading}
              onSend={globalTexts?sendGlobal:()=>{}}
              placeholder={globalLoading?"Carregando livros…":"Pergunte sobre qualquer livro da biblioteca…"}
              onExport={()=>exportChat(globalMsgs,"pesquisa_global")}
              emptyNode={<WelcomeGlobal/>}/>
          </div>
        )}
      </main>

      {modal?.type==="cats"&&<CatModal categories={cats} onSave={saveCats} onClose={()=>setModal(null)}/>}
      {modal?.type==="add"&&<BookModal mode="add" initial={modal.initial} categories={cats} onSave={doAdd} onClose={()=>{setModal(null);setPendingFile(null);}} uploading={uploading} prog={upProg} err={upErr}/>}
      {modal?.type==="edit"&&editBook&&<BookModal mode="edit" initial={modal.initial} categories={cats} onSave={doEdit} onClose={()=>{setModal(null);setEditBook(null);}} uploading={false} prog={0} err=""/>}
      {wishModal&&<WishModal item={wishEdit} onSave={saveWish} onClose={()=>{setWishModal(false);setWishEdit(null);}}/>}
      <style>{`@keyframes bob{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}`}</style>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function Root(){
  const [phase,setPhase]=useState("loading");
  const [dirHandle,setDir]=useState(null);
  const [apiKey,setKey]=useState("");
  const [userName,setUser]=useState("");

  useEffect(()=>{
    if(!window.showDirectoryPicker){setPhase("unsupported");return;}
    const savedUser=localStorage.getItem("bib_user");
    const savedKey=localStorage.getItem("bib_apikey");
    idbGet("dir").then(async dh=>{
      if(!dh){setPhase("setup");return;}
      try{
        const perm=await dh.queryPermission({mode:"readwrite"});
        if(perm==="granted"){
          const k=savedKey||(await rf(dh,"apikey.txt"))||"";
          if(!k?.trim()||!savedUser){setPhase("setup");return;}
          setDir(dh);setKey(k.trim());setUser(savedUser);setPhase("app");
        }else{
          setPhase("reconnect");
          window._pendingDir=dh;window._pendingKey=savedKey||"";window._pendingUser=savedUser||"";
        }
      }catch{setPhase("setup");}
    }).catch(()=>setPhase("setup"));
  },[]);

  const center=(msg,sub)=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,textAlign:"center",padding:40}}>
      <div><div style={{fontSize:32,color:C.ink,marginBottom:12}}>{msg}</div>{sub&&<p style={{fontSize:18,color:C.inkF,lineHeight:1.7,maxWidth:440}} dangerouslySetInnerHTML={{__html:sub}}/>}</div>
    </div>
  );

  if(phase==="loading")return center("Carregando…");
  if(phase==="unsupported")return center("Navegador não suportado","Esta versão requer <strong>Google Chrome</strong> ou Microsoft Edge (v86+).<br/>Firefox e Safari não suportam a File System Access API.");

  if(phase==="reconnect"){
    const reconnect=async()=>{
      try{
        const dh=window._pendingDir;
        const perm=await dh.requestPermission({mode:"readwrite"});
        if(perm!=="granted"){setPhase("setup");return;}
        const k=window._pendingKey||(await rf(dh,"apikey.txt"))||"";
        const u=window._pendingUser;
        if(!k||!u){setPhase("setup");return;}
        setDir(dh);setKey(k.trim());setUser(u);setPhase("app");
      }catch{setPhase("setup");}
    };
    return(
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:40}}>
        <div style={{textAlign:"center",maxWidth:420}}>
          <div style={{fontSize:32,color:C.ink,marginBottom:12}}>Reconectar pasta</div>
          <p style={{fontSize:18,color:C.inkF,lineHeight:1.7,marginBottom:28}}>A permissão de acesso à pasta expirou. Clique para reconectar sem refazer o setup.</p>
          <button onClick={reconnect} style={{...bP(false),fontSize:19,padding:"12px 32px"}}>
            <Ico d={D.folder} sz={17} col={C.surf} style={{display:"inline",marginRight:8}}/> Reconectar pasta
          </button>
          <br/>
          <button onClick={()=>setPhase("setup")} style={{...bG,marginTop:12,fontSize:16}}>Fazer setup novamente</button>
        </div>
      </div>
    );
  }

  if(phase==="setup")return <Setup onReady={(dh,k,name)=>{setDir(dh);setKey(k);setUser(name);setPhase("app");}}/>;
  return <Library dirHandle={dirHandle} apiKey={apiKey} userName={userName}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
