// ─── Constants ─────────────────────────────────────────

const CURRENT_SCHEMA_VERSION = 4;

const DEF_CATS = [

  "Negócios",
  "Marketing",
  "Biografia",
  "Geopolítica",
  "Current Affairs",
  "História",
  "Autoajuda",
  "Arte e Cultura"
];

const CATEGORY_FIX_MAP = {
  "Ficcao":"Ficção",
  "Ficção":"Ficção",
  "Negocios":"Negócios",
  "Historia":"História",
  "Geopolitica":"Geopolítica",
  "Auto-Ajuda":"Autoajuda",
  "Autoajuda":"Autoajuda"
};

const CHUNK_SIZE = 1800;
const CHUNK_OVERLAP = 220;
const MAX_BOOK_CONTEXT_CHUNKS = 8;
const MAX_GLOBAL_BOOKS = 4;
const MAX_GLOBAL_CHUNKS_PER_BOOK = 4;

// ─── Utils ─────────────────────────────────────────────

const uid = () => (
  window.crypto?.randomUUID
    ? window.crypto.randomUUID()
    : `id_${Date.now()}_${Math.random().toString(36).slice(2,9)}`
);

const safeProfileKey = (name="") =>
  name.replace(/[^\p{L}\p{N}_-]+/gu,"_").slice(0,80) || "perfil";

const noteFileName = (bookId, profileId) =>
  `${bookId}_notes_${safeProfileKey(profileId)}.json`;

const chatFileName = (bookId, profileId) =>

const globalChatFileName = (profileId) =>
  `global_chats_${safeProfileKey(profileId)}.json`;

function trimStr(v){
  return typeof v === "string" ? v.trim() : "";
}

function uniqueCaseInsensitive(arr=[]){
  const out = [];
  const seen = new Set();

  for(const item of arr){
    const clean = trimStr(item);
    if(!clean) continue;

    const key = clean.toLocaleLowerCase("pt-BR");
    if(seen.has(key)) continue;

    seen.add(key);
    out.push(clean);
  }
  return out;
}

function normalizeTagValue(tag=""){
  const clean = trimStr(tag).replace(/\s+/g, " ").toLocaleLowerCase("pt-BR");
  if(!clean) return "";
  return clean;
}

function normalizeTags(tags){
  if(!Array.isArray(tags)) return [];
  return uniqueCaseInsensitive(tags.map(normalizeTagValue));
}

function normalizeCategory(cat){
  if(!cat) return "";
  const clean = trimStr(cat);
  if(CATEGORY_FIX_MAP[clean]) return CATEGORY_FIX_MAP[clean];
  return clean;
}

function normalizeCategories(categories){
  if(!Array.isArray(categories) || !categories.length) return [...DEF_CATS];
  return uniqueCaseInsensitive(categories.map(normalizeCategory));
}

function normalizeBooks(books){
  if(!Array.isArray(books)) return [];

  return books.map(book => ({
    id: book?.id || uid(),
    title: trimStr(book?.title),
    author: trimStr(book?.author),
    category: normalizeCategory(book?.category),
    tags: normalizeTags(book?.tags),
    pages: Number(book?.pages) || 0,
    summary: trimStr(book?.summary),
    addedAt: book?.addedAt || new Date().toISOString()
  }))
  .filter(b => b.title);
}

function normalizeWishlist(wishlist){
  if(!Array.isArray(wishlist)) return [];

  return wishlist.map(item => ({
    id: item?.id || uid(),
    title: trimStr(item?.title),
    author: trimStr(item?.author),
    link: trimStr(item?.link),
    addedAt: item?.addedAt || new Date().toISOString()
  }))
  .filter(i => i.title);
}

function truncateText(str="", max=70){
  if(str.length <= max) return str;
  return str.slice(0,max-1).trim() + "…";
}

function joinTags(tags=[]){
  return tags.length ? tags.join(", ") : "—";
}

function debounceValue(value, delay, setter){
  return setTimeout(()=>setter(value), delay);
}

function migrateIndexData(raw){
  return {
    schemaVersion: CURRENT_SCHEMA_VERSION,
    books: normalizeBooks(raw?.books),
    categories: normalizeCategories(raw?.categories),
    wishlist: normalizeWishlist(raw?.wishlist),
    profiles: uniqueCaseInsensitive(raw?.profiles || [])
  };
}

function escapeRegExp(str=""){
  return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function tokenizeQuery(query=""){
  return trimStr(query)
    .toLocaleLowerCase("pt-BR")
    .replace(/[^\p{L}\p{N}\s]+/gu, " ")
    .split(/\s+/)
    .filter(w => w && w.length > 2);
}

function splitTextIntoChunks(text="", size=CHUNK_SIZE, overlap=CHUNK_OVERLAP){
  const clean = trimStr(text);
  if(!clean) return [];

  const chunks = [];
  let start = 0;
  let idx = 0;

  while(start < clean.length){
    const end = Math.min(start + size, clean.length);
    const content = clean.slice(start, end).trim();
    if(content){
      chunks.push({
        id:`chunk_${idx}`,
        index: idx,
        start,
        end,
        content
      });
      idx += 1;
    }
    if(end >= clean.length) break;
    start = Math.max(end - overlap, start + 1);
  }

  return chunks;
}

function scoreChunkAgainstQuery(query="", text=""){
  const q = trimStr(query);
  const body = trimStr(text);
  if(!q || !body) return 0;

  const lowerText = body.toLocaleLowerCase("pt-BR");
  const tokens = uniqueCaseInsensitive(tokenizeQuery(q));
  if(!tokens.length) return 0;

  let score = 0;

  for(const token of tokens){
    const re = new RegExp(`\\b${escapeRegExp(token)}\\b`, "giu");
    const matches = lowerText.match(re);
    if(matches) score += matches.length * 4;
    else if(lowerText.includes(token)) score += 1.5;
  }

  const phrase = q.toLocaleLowerCase("pt-BR");
  if(lowerText.includes(phrase)) score += 10;

  return score;
}

function selectRelevantChunks(text="", query="", maxChunks=MAX_BOOK_CONTEXT_CHUNKS){
  const chunks = splitTextIntoChunks(text);
  if(!chunks.length) return [];

  const q = trimStr(query);
  if(!q){
    return chunks.slice(0, maxChunks);
  }

  const scored = chunks
    .map(chunk=>({
      ...chunk,
      score: scoreChunkAgainstQuery(q, chunk.content)
    }))
    .sort((a,b)=>{
      if(b.score !== a.score) return b.score - a.score;
      return a.index - b.index;
    });

  const best = scored.slice(0, maxChunks).sort((a,b)=>a.index - b.index);
  return best.length ? best : chunks.slice(0, maxChunks);
}

function selectRelevantBooks(query="", books=[], texts={}, limit=MAX_GLOBAL_BOOKS){
  const q = trimStr(query);
  if(!books.length) return [];

  const scored = books.map(book=>{
    const haystack = [
      book.title || "",
      book.author || "",
      book.category || "",
      (book.tags || []).join(" "),
      book.summary || "",
      (texts[book.id] || "").slice(0, 12000)
    ].join("\n");

    return {
      book,
      score: q ? scoreChunkAgainstQuery(q, haystack) : 0
    };
  });

  scored.sort((a,b)=>{
    if(b.score !== a.score) return b.score - a.score;
    return (a.book.title || "").localeCompare(b.book.title || "", "pt-BR");
  });

  const top = scored.slice(0, limit).map(x=>x.book);
  return top.length ? top : books.slice(0, limit);
}

function detectPdfQuality(text="", pages=0){
  const clean = trimStr(text);
  const compact = clean.replace(/\s+/g, " ");
  const chars = compact.length;
  const weirdMatches = compact.match(/[â€œÃ¢â‚¬□■▪◆◼◻]+/g) || [];
  const weirdRatio = chars ? weirdMatches.join("").length / chars : 0;
  const avgCharsPerPage = pages ? chars / pages : chars;

  const flags = [];
  if(chars < 1200) flags.push("Texto extraído muito curto");
  if(pages >= 8 && avgCharsPerPage < 250) flags.push("Baixa densidade de texto por página");
  if(weirdRatio > 0.015) flags.push("Caracteres estranhos detectados");

  return {
    isSuspect: flags.length > 0,
    flags,
    stats: {
      chars,
      avgCharsPerPage: Math.round(avgCharsPerPage),
      weirdRatio
    }
  };
}

// ─── IndexedDB ────────────────────────────────────────

function openIDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("mynd_library_v5",1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore("s");
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej(r.error);
  });
}

async function idbGet(k){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const r=db.transaction("s","readonly").objectStore("s").get(k);
    r.onsuccess=()=>res(r.result ?? null);
    r.onerror=()=>rej(r.error);
  });
}

async function idbSet(k,v){
  const db=await openIDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction("s","readwrite");
    tx.objectStore("s").put(v,k);
    tx.oncomplete=res;
    tx.onerror=()=>rej(tx.error);
  });
}

// ─── File System ──────────────────────────────────────

async function wf(dir,name,txt){
  const fh=await dir.getFileHandle(name,{create:true});
  const w=await fh.createWritable();
  await w.write(txt);
  await w.close();
}

async function rf(dir,name){
  try{
    return await (await (await dir.getFileHandle(name)).getFile()).text();
  }catch{
    return null;
  }
}

async function rmf(dir,name){
  try{
    await dir.removeEntry(name);
  }catch{}
}

async function listDirFiles(dir){
  const names=[];
  try{
    for await (const [name] of dir.entries()) names.push(name);
  }catch{}
  return names;
}

// ─── Index ────────────────────────────────────────────

async function saveIdx(dir,data){
  await wf(dir,"index.json",JSON.stringify({
    schemaVersion: CURRENT_SCHEMA_VERSION,
    books: normalizeBooks(data?.books),
    categories: normalizeCategories(data?.categories),
    wishlist: normalizeWishlist(data?.wishlist),
    profiles: uniqueCaseInsensitive(data?.profiles || [])
  },null,2));
}

async function loadIdx(dir){
  const txt = await rf(dir,"index.json");

  if(!txt){
    const fresh = {
      schemaVersion: CURRENT_SCHEMA_VERSION,
      books: [],
      categories: [...DEF_CATS],
      wishlist: [],
      profiles: []
    };
    await saveIdx(dir, fresh);
    return fresh;
  }

  try{
    const parsed = JSON.parse(txt);
    const migrated = migrateIndexData(parsed);

    const validCats = new Set(migrated.categories);
    const fixedBooks = migrated.books.map(book=>{
      const normalizedCat = normalizeCategory(book.category);
      return {
        ...book,
        category: validCats.has(normalizedCat) ? normalizedCat : ""
      };
    });

    const fullyMigrated = {
      ...migrated,
      books: fixedBooks
    };

    if(JSON.stringify(parsed) !== JSON.stringify(fullyMigrated)){
      await saveIdx(dir, fullyMigrated);
    }

    return fullyMigrated;
  }catch{
    const fresh = {
      schemaVersion: CURRENT_SCHEMA_VERSION,
      books: [],
      categories: [...DEF_CATS],
      wishlist: [],
      profiles: []
    };
    await saveIdx(dir, fresh);
    return fresh;
  }
}

// ─── Notes ────────────────────────────────────────────

async function loadNotes(dir,bookId,profileId){
  const txt=await rf(dir,noteFileName(bookId,profileId));
  if(!txt) return [];
  try{
    const parsed=JSON.parse(txt);
    if(Array.isArray(parsed)) return parsed;
    if(typeof parsed==="string" && parsed.trim()){
      return [{
        id:uid(),
        text:parsed,
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString()
      }];
    }
    return [];
  }catch{
    if(txt.trim()){
      return [{
        id:uid(),
        text:txt,
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString()
      }];
    }
    return [];
  }
}

async function saveNotes(dir,bookId,profileId,notes){
  await wf(dir,noteFileName(bookId,profileId),JSON.stringify(notes,null,2));
}

async function loadStats(dir){
  const txt=await rf(dir,"stats.json");
  if(!txt) return { consultations:{} };
  try{
    const parsed = JSON.parse(txt);
    return {
      consultations: parsed?.consultations && typeof parsed.consultations === "object"
        ? parsed.consultations
        : {}
    };
  }catch{
    return { consultations:{} };
  }
}

async function saveStats(dir,stats){
  await wf(dir,"stats.json",JSON.stringify({
    consultations: stats?.consultations || {}
  },null,2));
}

// ─── PDF.js ───────────────────────────────────────────

let pdfjsOk=false;

async function loadPdfLib(){
  if(pdfjsOk || window.pdfjsLib){
    pdfjsOk=true;
    return;
  }
  await new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=res;
    s.onerror=rej;
    document.head.appendChild(s);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  pdfjsOk=true;
}

async function extractPdf(file){
  await loadPdfLib();
  const pdf=await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
  let t="";
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const c = await page.getTextContent();
    t += c.items.map(x=>x.str).join(" ") + "\n";
    if(i % 2 === 0) await new Promise(r=>setTimeout(r,0));
  }
  return { text:t.trim(), pages:pdf.numPages };
}

// ─── Claude ───────────────────────────────────────────

async function callClaude(apiKey,system,messages,maxTok=1200){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body:JSON.stringify({
      model:"claude-3-5-haiku-20241022",
      max_tokens:maxTok,
      system,
      messages:messages.map(m=>({ role:m.role, content:m.content }))
    })
  });
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    throw new Error(e?.error?.message || `HTTP ${r.status}`);
  }
  return (await r.json()).content?.[0]?.text || "Sem resposta.";
}

function buildBookContextPrompt(title, query, chunks){
  const excerpts = chunks.map((chunk, idx)=>(
    `[Trecho ${idx+1} | posição ${chunk.start}-${chunk.end}]\n${chunk.content}`
  )).join("\n\n");

  return `Você é um assistente literário especializado no livro "${title}". Responda APENAS com base nos trechos abaixo. Não use conhecimento externo. Se a resposta não estiver clara nos trechos, diga isso explicitamente. Responda em português e, quando útil, cite os números dos trechos usados.

PERGUNTA:
${query}

TRECHOS RELEVANTES:
${excerpts}`;
}

function buildGlobalContextPrompt(query, entries){
  const body = entries.map((entry, bookIdx)=>{
    const chunkText = entry.chunks.map((chunk, idx)=>(
      `[Livro ${bookIdx+1} | Trecho ${idx+1} | posição ${chunk.start}-${chunk.end}]\n${chunk.content}`
    )).join("\n\n");

    return `${"─".repeat(48)}
📖 ${entry.book.title}${entry.book.author?` | ${entry.book.author}`:""}${entry.book.category?` [${entry.book.category}]`:""}
${"─".repeat(48)}
${chunkText}`;
  }).join("\n\n");

  return `Você é um assistente com acesso à biblioteca do usuário. Responda APENAS com base nos livros e trechos abaixo. Sempre deixe claro de qual livro vem cada informação. Se não houver base suficiente, diga isso claramente. Responda em português.

PERGUNTA:
${query}

BIBLIOTECA SELECIONADA:
${body}`;
}

// ─── TagInput ──────────────────────────────────────────

function TagInput({tags,onChange}){
  const [draft,setDraft]=useState("");
  const ref=useRef();

  const commit=useCallback(()=>{
    const normalized = normalizeTagValue(draft);
    if(!normalized){
      setDraft("");
      return;
    }
    const existing = (tags || []).some(
      t => t.toLocaleLowerCase("pt-BR") === normalized.toLocaleLowerCase("pt-BR")
    );
    if(existing){
      setDraft("");
      return;
    }
    onChange(normalizeTags([...(tags || []), normalized]));
    setDraft("");
    setTimeout(()=>ref.current?.focus(),0);
  },[draft,tags,onChange]);

  return(
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:7,padding:"8px 10px",minHeight:44}}>
      {tags.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
          {tags.map(t=>(
            <span key={t} style={{...tp,display:"flex",alignItems:"center",gap:5}}>
              {t}
              <button
                type="button"
                onClick={e=>{
                  e.preventDefault();
                  onChange(tags.filter(x=>x!==t));
                }}
                style={{background:"none",border:"none",cursor:"pointer",color:C.accent,padding:0,lineHeight:1,display:"flex"}}
              >
                <Ico d={D.close} sz={11}/>
              </button>
            </span>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:7,alignItems:"center"}}>
        <input
          ref={ref}
          value={draft}
          onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); commit(); } }}
          placeholder="Escreva e pressione Enter ou +"
          style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:14}}
        />
        <button
          type="button"
          onClick={e=>{e.preventDefault(); commit();}}
          disabled={!draft.trim()}
          style={{
            background:draft.trim()?C.accentBg:"none",
            border:`1px solid ${draft.trim()?C.accentBrd:C.border}`,
            borderRadius:5,padding:"4px 10px",
            cursor:draft.trim()?"pointer":"default",
            color:draft.trim()?C.accent:C.inkF,
            display:"flex",alignItems:"center"
          }}
        >
          <Ico d={D.plus} sz={15}/>
        </button>
      </div>
    </div>
  );
}

// ─── Category Modal ───────────────────────────────────

function CatModal({categories,onSave,onClose}){
  const [cats,setCats]=useState([...categories]);
  const [nv,setNv]=useState("");
  const [ed,setEd]=useState(null);
  const [renameMap,setRenameMap]=useState({});
  const [selectedIdx,setSelectedIdx]=useState(null);

  const add=()=>{
    const v=normalizeCategory(nv);
    if(!trimStr(v)) return;
    const next = uniqueCaseInsensitive([...cats, v]);
    setCats(next);
    setNv("");
  };

  const saveEdit=(i)=>{
    const oldValue = cats[i];
    const val = normalizeCategory(ed?.v);
    if(!val){
      setEd(null);
      return;
    }

    const updated=[...cats];
    updated[i]=val;
    const deduped=uniqueCaseInsensitive(updated);

    if(trimStr(oldValue) !== trimStr(val)){
      setRenameMap(prev=>({
        ...prev,
        [oldValue]: val
      }));
    }

    const newIndex = deduped.findIndex(x=>x===val);
    setCats(deduped);
    setSelectedIdx(newIndex >= 0 ? newIndex : null);
    setEd(null);
  };

  const moveSelected=(dir)=>{
    if(selectedIdx===null) return;
    const target = dir === "up" ? selectedIdx - 1 : selectedIdx + 1;
    if(target < 0 || target >= cats.length) return;
    const next=[...cats];
    const [item]=next.splice(selectedIdx,1);
    next.splice(target,0,item);
    setCats(next);
    setSelectedIdx(target);
  };

  const canMoveUp = selectedIdx !== null && selectedIdx > 0;
  const canMoveDown = selectedIdx !== null && selectedIdx < cats.length - 1;

  return(
    <div style={ov} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div style={{...mb,width:450}}>
        <div style={{fontSize:22,fontWeight:600,color:C.ink,marginBottom:18}}>Gerenciar categorias</div>

        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
          {cats.map((c,i)=>(
            <div
              key={i}
              style={{
                display:"flex",
                alignItems:"center",
                gap:8,
                background:selectedIdx===i?C.accentBg:C.card,
                border:`1px solid ${selectedIdx===i?C.accentBrd:C.border}`,
                borderRadius:7,
                padding:"8px 10px",
                cursor:"pointer"
              }}
              onClick={()=>setSelectedIdx(i)}
            >
              {ed?.i===i ? (
                <>
                  <input
                    autoFocus
                    value={ed.v}
                    onChange={e=>setEd(p=>({...p,v:e.target.value}))}
                    onKeyDown={e=>{
                      if(e.key==="Enter") saveEdit(i);
                      if(e.key==="Escape") setEd(null);
                    }}
                    style={{...fi,padding:"4px 8px",fontSize:14,flex:1}}
                    onClick={e=>e.stopPropagation()}
                  />
                  <button
                    style={{...bI,borderColor:C.accentBrd,color:C.accent}}
                    onClick={(e)=>{ e.stopPropagation(); saveEdit(i); }}
                  >
                    <Ico d={D.check} sz={14}/>
                  </button>
                  <button style={bI} onClick={(e)=>{ e.stopPropagation(); setEd(null); }}>
                    <Ico d={D.close} sz={13}/>
                  </button>
                </>
              ) : (
                <>
                  <span style={{flex:1,fontSize:15,color:C.ink}}>{c}</span>
                  <button style={bI} onClick={(e)=>{ e.stopPropagation(); setEd({i,v:c}); }}>
                    <Ico d={D.edit} sz={13}/>
                  </button>
                  <button
                    style={{...bI,color:C.red,borderColor:C.red+"44"}}
                    onClick={(e)=>{
                      e.stopPropagation();
                      setCats(p=>p.filter((_,j)=>j!==i));
                      setSelectedIdx(prev=>{
                        if(prev===null) return null;
                        if(prev===i) return null;
                        if(prev>i) return prev-1;
                        return prev;
                      });
                    }}
                  >
                    <Ico d={D.trash} sz={13}/>
                  </button>
                </>
              )}
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:22}}>
          <input
            value={nv}
            onChange={e=>setNv(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") add(); }}
            placeholder="Nova categoria…"
            style={{...fi,flex:1}}
          />
          <button style={bP(!nv.trim())} disabled={!nv.trim()} onClick={add}>
            <Ico d={D.plus} sz={16}/>
          </button>
        </div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button
            style={{
              ...bI,
              padding:"8px 10px",
              cursor:canMoveUp?"pointer":"not-allowed",
              opacity:canMoveUp?1:.45
            }}
            disabled={!canMoveUp}
            onClick={()=>moveSelected("up")}
          >
            <Ico d={D.arrowUp} sz={15}/>
          </button>

          <button
            style={{
              ...bI,
              padding:"8px 10px",
              cursor:canMoveDown?"pointer":"not-allowed",
              opacity:canMoveDown?1:.45
            }}
            disabled={!canMoveDown}
            onClick={()=>moveSelected("down")}
          >
            <Ico d={D.arrowDown} sz={15}/>
          </button>

          <button style={bG} onClick={onClose}>Cancelar</button>
          <button
            style={bP(false)}
            onClick={()=>{
              onSave({
                categories: normalizeCategories(cats),
                renameMap
              });
            }}
          >
            Salvar
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Notes Panel ──────────────────────────────────────

function NotesPanel({dirHandle,bookId,profileId,otherProfiles,onNotesPresenceChange,onToast}){
  const [myNotes,setMyNotes]=useState([]);
  const [saveState,setSaveState]=useState(null);
  const [ready,setReady]=useState(false);
  const [viewMode,setViewMode]=useState(profileId);
  const [otherNotes,setOtherNotes]=useState({});
  const [draft,setDraft]=useState("");
  const [editingId,setEditingId]=useState(null);

  const tabs = useMemo(()=>[profileId, ...otherProfiles, "Todas"], [profileId,otherProfiles]);

  const refreshMine=useCallback(async()=>{
    const notes=await loadNotes(dirHandle,bookId,profileId);
    setMyNotes(notes);
    onNotesPresenceChange?.(notes.length > 0);
    setReady(true);
  },[dirHandle,bookId,profileId,onNotesPresenceChange]);

  useEffect(()=>{
    refreshMine();
  },[refreshMine]);

  useEffect(()=>{
    const loadOthers=async()=>{
      const result={};
      for(const p of otherProfiles){
        const notes=await loadNotes(dirHandle,bookId,p);
        if(notes.length) result[p]=notes;
      }
      setOtherNotes(result);
    };
    loadOthers();
  },[bookId,otherProfiles,dirHandle]);

  useEffect(()=>{
    setViewMode(profileId);
    setDraft("");
    setEditingId(null);
    setSaveState(null);
  },[bookId, profileId]);

  const saveList=async(next)=>{
    setMyNotes(next);
    setSaveState("saving");
    await saveNotes(dirHandle,bookId,profileId,next);
    onNotesPresenceChange?.(next.length > 0);
    setSaveState("saved");
    setTimeout(()=>setSaveState(current=>current==="saved" ? null : current), 1200);
  };

  const addOrUpdate=async()=>{
    const text=draft.trim();
    if(!text) return;

    if(editingId){
      const next=myNotes.map(n=>n.id===editingId ? {...n,text,updatedAt:new Date().toISOString()} : n);
      await saveList(next);
      setEditingId(null);
      onToast?.("Nota atualizada");
    }else{
      const next=[{
        id:uid(),
        text,
        createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString()
      }, ...myNotes];
      await saveList(next);
      onToast?.("Nota salva");
    }
    setDraft("");
  };

  const startEdit=(note)=>{
    setDraft(note.text);
    setEditingId(note.id);
  };

  const removeNote=async(id)=>{
    const next=myNotes.filter(n=>n.id!==id);
    await saveList(next);
    if(editingId===id){
      setEditingId(null);
      setDraft("");
    }
    onToast?.("Nota excluída");
  };

  if(!ready) return null;

  const renderOwnSection = () => (
    <div>
      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 10px 9px",marginBottom:10}}>
        <textarea
          value={draft}
          onChange={e=>setDraft(e.target.value)}
          placeholder="Escreva uma nota"
          style={{
            ...fi, resize:"vertical", minHeight:66, lineHeight:1.65, fontSize:14,
            border:"none", background:"transparent", padding:0
          }}
        />
        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:8}}>
          {editingId && <button onClick={()=>{setEditingId(null); setDraft("");}} style={bG}>Cancelar</button>}
          <button onClick={addOrUpdate} style={bP(!draft.trim())} disabled={!draft.trim()}>
            <Ico d={editingId?D.check:D.save} sz={15} col={draft.trim()?C.surf:"#999"} style={{marginRight:8}}/>
            {editingId ? "Salvar edição" : "Salvar nota"}
          </button>
        </div>
      </div>

      {myNotes.length===0
        ? <p style={{fontSize:14,color:C.inkF,fontStyle:"italic",padding:"2px 0 6px"}}>Nenhuma nota salva ainda.</p>
        : myNotes.map(note=>(
            <NoteCard
              key={note.id}
              note={note}
              onEdit={()=>startEdit(note)}
              onDelete={()=>removeNote(note.id)}
            />
          ))
      }
    </div>
  );

  const renderReadOnlySection = (name, notes) => (
    <div style={{marginBottom:10}}>
      <div style={{...lb,marginBottom:6,color:C.gold,fontSize:10}}>{name}</div>
      {notes.length === 0
        ? <p style={{fontSize:14,color:C.inkF,fontStyle:"italic",padding:"2px 0 6px"}}>Nenhuma nota.</p>
        : notes.map(note=>(
            <NoteCard key={note.id} note={note} readonly ownerName={name} />
          ))
      }
    </div>
  );

  return(
    <div style={{padding:"10px 28px 0"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,gap:10,flexWrap:"wrap"}}>
        <div style={{...lb,display:"flex",alignItems:"center",gap:6}}>
          <Ico d={D.note} sz={11}/> Notas
        </div>

        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {tabs.map(label=>(
              <button
                key={label}
                onClick={()=>setViewMode(label)}
                style={{
                  fontSize:12,
                  padding:"3px 9px",
                  borderRadius:5,
                  border:`1px solid ${viewMode===label?C.accentBrd:C.border}`,
                  background:viewMode===label?C.accentBg:"none",
                  cursor:"pointer",
                  color:viewMode===label?C.accent:C.inkF,
                  fontWeight:label==="Todas" ? 700 : 500
                }}
              >
                {label}
              </button>
            ))}
          </div>

          {saveState && (
            <span style={{fontSize:12,color:saveState==="saved"?C.green:C.inkF,transition:"color .3s"}}>
              {saveState==="saved" ? "✓ salvo" : "salvando…"}
            </span>
          )}
        </div>
      </div>

      {viewMode === profileId && renderOwnSection()}

      {viewMode !== profileId && viewMode !== "Todas" && (
        renderReadOnlySection(viewMode, otherNotes[viewMode] || [])
      )}

      {viewMode === "Todas" && (
        <div>
          <div style={{marginBottom:10}}>
            <div style={{...lb,marginBottom:6,color:C.accent,fontSize:10}}>{profileId}</div>
            {myNotes.length===0
              ? <p style={{fontSize:14,color:C.inkF,fontStyle:"italic",padding:"2px 0 6px"}}>Nenhuma nota.</p>
              : myNotes.map(note=>(
                  <NoteCard
                    key={note.id}
                    note={note}
                    onEdit={()=>startEdit(note)}
                    onDelete={()=>removeNote(note.id)}
                    ownerName={profileId}
                  />
                ))
            }
          </div>

          {otherProfiles.map(p=>(
            <div key={p}>
              {renderReadOnlySection(p, otherNotes[p] || [])}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ChatArea ──────────────────────────────────────────

function ChatArea({messages,loading,onSend,placeholder,emptyNode,onExport}){
  const [input,setInput]=useState("");
  const endRef=useRef();
  const inputRef=useRef();

  useEffect(()=>{
    endRef.current?.scrollIntoView({behavior:"smooth"});
  },[messages,loading]);

  useEffect(()=>{
    setInput("");
  },[placeholder]);

  const send=()=>{
    const t=input.trim();
    if(!t || loading) return;
    onSend(t);
    setInput("");
    setTimeout(()=>inputRef.current?.focus(),0);
  };

  const onKey=e=>{
    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  };

  return(
    <>
      <div
        className="inner-scroll"
        style={{flex:1,overflowY:"auto",padding:"24px 28px",display:"flex",flexDirection:"column",gap:16}}
      >
        {messages.length===0 && emptyNode}

        {messages.map((m,i)=>(
          <div
            key={i}
            style={{
              display:"flex",
              gap:10,
              flexDirection:m.role==="user" ? "row-reverse" : "row",
              alignSelf:m.role==="user" ? "flex-end" : "flex-start",
              maxWidth:720
            }}
          >
            <div
              style={{
                width:28,height:28,minWidth:28,borderRadius:"50%",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:11,marginTop:2,
                background:m.role==="user"?"rgba(45,107,228,.12)":"rgba(122,90,26,.1)",
                color:m.role==="user"?C.accent:C.gold,fontWeight:700
              }}
            >
              {m.role==="user" ? m.av : "✦"}
            </div>

            {/* AJUSTE 7: padding reduzido de 13px/16px para 8px/12px */}
            <div
              style={{
                padding:"8px 12px",
                borderRadius:8,
                fontSize:14,
                lineHeight:1.65,
                whiteSpace:"pre-wrap",
                background:m.role==="user" ? "#eaf0fb" : C.card,
                border:`1px solid ${m.role==="user"?C.accentBrd:C.border}`,
                color:C.ink
              }}
            >
              {m.content}
            </div>
          </div>
        ))}

        {loading && (
          <div style={{display:"flex",gap:10,alignSelf:"flex-start"}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(122,90,26,.1)",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontSize:14}}>
              ✦
            </div>
            <div style={{padding:"10px 14px",borderRadius:8,background:C.card,border:`1px solid ${C.border}`,display:"flex",gap:6,alignItems:"center"}}>
              {[0,1,2].map(i=>(
                <span key={i} style={{width:7,height:7,borderRadius:"50%",background:C.gold,display:"inline-block",animation:`bob .9s ${i*.2}s infinite`}}/>
              ))}
            </div>
          </div>
        )}

        <div ref={endRef}/>
      </div>

      <div style={{padding:"14px 28px 20px",borderTop:`1px solid ${C.border}`,background:C.surf}}>
        {messages.length>0 && onExport && (
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:9}}>
            <button onClick={onExport} style={{...bI,gap:5,fontSize:13,padding:"5px 12px"}}>
              <Ico d={D.dl} sz={13}/> Exportar conversa
            </button>
          </div>
        )}

        <div style={{display:"flex",gap:10,alignItems:"flex-end",background:C.bg,border:`1px solid ${C.border}`,borderRadius:9,padding:"10px 14px"}}>
          <textarea
            ref={inputRef}
            rows={1}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={onKey}
            placeholder={placeholder}
            style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:15,resize:"none",maxHeight:120,lineHeight:1.6}}
          />
          <button
            onClick={send}
            disabled={!input.trim() || loading}
            style={{
              background:input.trim() && !loading ? C.accent : "#d0ccc8",
              border:"none", borderRadius:6,
              color:input.trim() && !loading ? C.surf : "#999",
              padding:"8px 12px",
              cursor:input.trim() && !loading ? "pointer" : "not-allowed",
              display:"flex"
            }}
          >
            <Ico d={D.send} sz={16}/>
          </button>
        </div>
      </div>
    </>
  );
}

// ─── ChatHistory ──────────────────────────────────────

function ChatHistory({sessions,otherSessions,activeId,onSelect,onNew,otherProfileNames=[], title="Conversas anteriores"}){
  const [tab,setTab]=useState("mine");
  const allOther=Object.entries(otherSessions || {}).flatMap(([p,ss])=>ss.map(s=>({...s,_profile:p})));
  const hasOther=allOther.length>0;
  const otherTabLabel=otherProfileNames.length===1 ? otherProfileNames[0] : "Outros perfis";

  useEffect(()=>{
    setTab("mine");
  },[sessions, otherSessions]);

  if(!sessions.length && !hasOther) return null;

  const renderSession=(s,showProfile=false)=>(
    <button
      key={`${s.id}_${showProfile?s._profile||"":""}`}
      onClick={()=>onSelect(s)}
      style={{
        textAlign:"left",
        padding:"6px 10px",
        borderRadius:6,
        border:`1px solid ${s.id===activeId?C.accentBrd:"transparent"}`,
        background:s.id===activeId?C.accentBg:"none",
        cursor:"pointer",
        color:s.id===activeId?C.accent:C.inkD,
        fontSize:13,
        display:"flex",
        alignItems:"center",
        gap:7,
        width:"100%"
      }}
    >
      <Ico d={D.chat} sz={12} col={s.id===activeId?C.accent:C.inkF}/>
      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
        {s.title || "Sem título"}
      </span>
      {showProfile && <span style={{fontSize:10,color:C.gold,flexShrink:0,fontStyle:"italic"}}>{s._profile}</span>}
      <span style={{fontSize:10,color:C.inkF,flexShrink:0}}>{s.date}</span>
    </button>
  );

  return(
    <div style={{padding:"10px 28px 0",borderTop:`1px solid ${C.border}`}}>
      <div style={{...lb,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Ico d={D.chat} sz={11}/>
          {hasOther ? (
            <div style={{display:"flex",gap:4}}>
              {[["mine","Minhas"],["other",otherTabLabel]].map(([t,label])=>(
                <button
                  key={t}
                  onClick={()=>setTab(t)}
                  style={{
                    fontSize:11,
                    padding:"2px 8px",
                    borderRadius:4,
                    border:`1px solid ${tab===t?C.accentBrd:C.border}`,
                    background:tab===t?C.accentBg:"none",
                    cursor:"pointer",
                    color:tab===t?C.accent:C.inkF,
                    letterSpacing:"0.1em",
                    textTransform:"uppercase",
                    fontWeight:600
                  }}
                >
                  {label}
                </button>
              ))}
            </div>
          ) : (
            <span>{title}</span>
          )}
        </div>

        <button onClick={onNew} style={{background:"none",border:"none",cursor:"pointer",color:C.accent,fontSize:12,display:"flex",alignItems:"center",gap:4,fontWeight:600}}>
          <Ico d={D.plus} sz={11}/> Nova
        </button>
      </div>

      <div className="inner-scroll" style={{display:"flex",flexDirection:"column",gap:3,maxHeight:120,overflowY:"auto"}}>
        {tab==="mine" && sessions.map(s=>renderSession(s,false))}
        {tab==="other" && (
          allOther.length===0
            ? <p style={{fontSize:13,color:C.inkF,fontStyle:"italic",padding:"4px 0"}}>Nenhuma conversa de outros perfis.</p>
            : allOther.map(s=>renderSession(s,true))
        )}
      </div>
    </div>
  );
}

// ─── HomePage ──────────────────────────────────────────

function HomePage({
  visibleBooks, allBooks, wishlist,onAddWish,onEditWish,onDeleteWish,lastBook,onContinue,
  stats,onOpenBook,onEditBook,onDeleteBook,onClearFilters,hasActiveFilter,onAddBook
}){
  const [sortCol,setSortCol]=useState("addedAt");
  const [sortAsc,setSortAsc]=useState(false);

  const totalPages=useMemo(()=>allBooks.reduce((s,b)=>s+(b.pages||0),0),[allBooks]);
  const withChats=useMemo(()=>allBooks.filter(b=>b._hasChats).length,[allBooks]);
  const withNotes=useMemo(()=>allBooks.filter(b=>b._hasNotes).length,[allBooks]);

  const mostConsulted=useMemo(()=>{
    const c=stats?.consultations || {};
    const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
    return top ? allBooks.find(bk=>bk.id===top[0]) : null;
  },[stats,allBooks]);

  const sorted=useMemo(()=>{
    const arr=[...visibleBooks];
    arr.sort((a,b)=>{
      let av=a[sortCol] || "", bv=b[sortCol] || "";
      if(sortCol === "tags"){
        av = joinTags(a.tags || []);
        bv = joinTags(b.tags || []);
      }
      if(typeof av==="string") av=av.toLowerCase();
      if(typeof bv==="string") bv=bv.toLowerCase();
      if(av===bv) return 0;
      return sortAsc ? (av>bv?1:-1) : (av<bv?1:-1);
    });
    return arr;
  },[visibleBooks,sortCol,sortAsc]);

  const toggleSort=col=>{
    if(sortCol===col) setSortAsc(a=>!a);
    else { setSortCol(col); setSortAsc(true); }
  };

  const SortIcon=({col})=>{
    if(sortCol!==col) return <span style={{color:C.border,marginLeft:3}}>↕</span>;
    return <span style={{color:C.accent,marginLeft:3}}>{sortAsc ? "↑" : "↓"}</span>;
  };

  const KCard=({label,value,sub,col,large})=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 18px",flex:1,minWidth:140}}>
      <div style={{...lb,marginBottom:8}}>{label}</div>
      <div style={{fontSize:large?18:30,fontWeight:700,color:col||C.ink,lineHeight:1.2}}>
        {value!==null && value!==undefined && value!=="" ? value : "—"}
      </div>
      {sub && <div style={{fontSize:13,color:C.inkF,marginTop:5,lineHeight:1.4}}>{sub}</div>}
    </div>
  );

  return(
    <div className="inner-scroll" style={{flex:1,overflowY:"auto",padding:"36px 40px"}}>
      <div style={{marginBottom:28,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
        <div>
          <h1 style={{fontSize:36,fontWeight:700,color:C.ink,lineHeight:1}}>Mynd Library</h1>
          <p style={{fontSize:16,color:C.inkF,marginTop:8}}>Sua biblioteca pessoal.</p>
        </div>
        <button
          onClick={onAddBook}
          style={{
            display:"flex",alignItems:"center",gap:8,background:C.accent,border:"none",
            color:C.surf,padding:"11px 16px",borderRadius:9,cursor:"pointer",
            fontSize:14,fontWeight:700,boxShadow:"0 8px 20px rgba(45,107,228,.18)"
          }}
        >
          <Ico d={D.plus} sz={15} col={C.surf}/> Adicionar livro
        </button>
      </div>

      {lastBook && (
        <div style={{background:`linear-gradient(135deg,${C.sb} 0%,#223858 100%)`,borderRadius:12,padding:"18px 22px",marginBottom:28,display:"flex",alignItems:"center",gap:18}}>
          <div style={{width:5,minWidth:5,height:50,borderRadius:3,background:spineC(lastBook.id)}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,letterSpacing:"0.13em",textTransform:"uppercase",color:C.sbInkD,marginBottom:4,fontWeight:600}}>
              Continuar leitura
            </div>
            <div style={{fontSize:19,fontWeight:600,color:C.sbInk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {lastBook.title}
            </div>
            {lastBook.author && <div style={{fontSize:14,color:C.sbInkD,marginTop:2}}>{lastBook.author}</div>}
          </div>
          <button
            onClick={onContinue}
            style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.18)",borderRadius:8,padding:"10px 18px",cursor:"pointer",color:C.sbInk,fontSize:14,fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}
          >
            <Ico d={D.play} sz={14} col={C.sbInk}/> Retomar
          </button>

      <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap"}}>
        <KCard label="Total de livros" value={allBooks.length} col={C.accent}/>
        <KCard label="Total de páginas" value={totalPages>0 ? totalPages.toLocaleString("pt-BR") : null}/>

        <div style={{fontSize:18,fontWeight:700,color:C.ink,marginBottom:16}}>Biblioteca</div>

          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:14,tableLayout:"fixed"}}>

              <tr style={{borderBottom:`1px solid ${C.border}`}}>

                  ["title","Nome",{width:"29%"}],

                  ["category","Categoria",{width:"15%"}],
                  ["tags","Tags",{width:"18%"}],

                    <td style={{padding:"11px 12px",color:C.ink,fontWeight:600,verticalAlign:"top"}}>
                      <button
                        onClick={()=>onOpenBook(b)}

              })}
              {sorted.length===0 && (

// ─── Setup ────────────────────────────────────────────

function Setup({onReady}){
  const [apiKey,setKey]=useState(()=>localStorage.getItem("mynd_apikey") || "");
  const [dir,setDir]=useState(null);
  const [dirName,setDirName]=useState("");
  const [profile,setProfile]=useState(()=>localStorage.getItem("mynd_user") || "");
  const [err,setErr]=useState("");

  const pick=async()=>{
    try{
      const dh=await window.showDirectoryPicker({mode:"readwrite",startIn:"documents"});
      setDir(dh);
      setDirName(dh.name);
      setErr("");
    }catch(e){
      if(e.name!=="AbortError") setErr("Não foi possível acessar a pasta.");
    }
  };

  const finish=async()=>{
    const name=profile.trim();
    if(!apiKey.trim() || !dir || !name) return;

    const idx=await loadIdx(dir);
    const profiles=uniqueCaseInsensitive([...(idx.profiles||[]), name]);

    await saveIdx(dir,{
      books:idx.books||[],
      categories:idx.categories||[...DEF_CATS],
      wishlist:idx.wishlist||[],
      profiles
    });

    await idbSet("dir",dir);
    await wf(dir,"apikey.txt",apiKey.trim());
    localStorage.setItem("mynd_user",name);
    localStorage.setItem("mynd_apikey",apiKey.trim());
    onReady(dir,apiKey.trim(),name);
  };

  const ready=!!apiKey.trim() && !!dir && !!profile.trim();

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:24}}>
      <div style={{width:560,maxWidth:"92vw"}}>
        <h1 style={{fontSize:40,fontWeight:700,color:C.ink,marginBottom:6}}>Mynd Library</h1>
        <p style={{fontSize:16,color:C.inkD,lineHeight:1.65,marginBottom:28}}>
          Configure uma vez e siga usando sua biblioteca na pasta escolhida.
        </p>

        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:28,display:"flex",flexDirection:"column",gap:22}}>
          <div>
            <div style={{...lb,marginBottom:8}}>Nome do perfil</div>
            <input
              style={fi}
              placeholder="Digite o nome do perfil"
              value={profile}
              onChange={e=>setProfile(e.target.value)}
            />
          </div>

          <div>
            <div style={{...lb,marginBottom:8}}>Chave de API Anthropic</div>
            <p style={{fontSize:14,color:C.inkF,lineHeight:1.6,marginBottom:10}}>
              Crie sua chave em <a href="https://console.anthropic.com" target="_blank" style={{color:C.accent}}>console.anthropic.com</a>.
            </p>
            <input
              type="password"
              style={fi}
              placeholder="sk-ant-..."
              value={apiKey}
              onChange={e=>setKey(e.target.value)}
            />
          </div>

          <div>
            <div style={{...lb,marginBottom:8}}>Pasta da biblioteca</div>
            <p style={{fontSize:14,color:C.inkF,lineHeight:1.6,marginBottom:10}}>
              Escolha a pasta onde seus livros, notas e conversas serão salvos.
            </p>
            <button
              onClick={pick}
              style={{
                display:"flex",alignItems:"center",gap:9,padding:"10px 18px",
                border:`1px solid ${dir?C.accentBrd:C.border}`,
                borderRadius:7,cursor:"pointer",background:"none",
                color:dir?C.accent:C.inkD,fontSize:14,fontWeight:600
              }}
            >
              <Ico d={D.folder} sz={16}/>{dir?`✓ ${dirName}`:"Escolher pasta…"}
            </button>
            {err && <p style={{fontSize:13,color:C.red,marginTop:8}}>{err}</p>}
          </div>

          <button disabled={!ready} onClick={finish} style={{...bP(!ready),fontSize:15,padding:"12px",marginTop:4}}>
            Abrir Mynd Library →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ProfileSwitcher ──────────────────────────────────

function ProfileSwitcher({userName,onSwitch,profiles=[]}){
  const [open,setOpen]=useState(false);
  const [custom,setCustom]=useState("");
  const options=Array.from(new Set([...(profiles||[]), userName].filter(Boolean)));

  return(
    <div style={{position:"relative"}}>
      <button
        onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.18)",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:C.sbInk,fontSize:12,fontWeight:600}}
      >
        <Ico d={D.user} sz={12} col={C.sbInk}/>
        <span>{userName}</span>
        <Ico d={D.chevDown} sz={11} col={C.sbInk}/>
      </button>

      {open && (
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:"#1e3554",border:"1px solid #2d4a6e",borderRadius:9,padding:"8px 0",minWidth:190,zIndex:100,boxShadow:"0 10px 30px rgba(0,0,0,.45)"}}>
          {options.map(p=>(
            <button
              key={p}
              onClick={()=>{onSwitch(p); setOpen(false);}}
              style={{width:"100%",textAlign:"left",padding:"9px 16px",background:p===userName?"rgba(255,255,255,.12)":"none",border:"none",cursor:"pointer",color:C.sbInk,fontSize:13,fontWeight:500}}
            >
              {p}
            </button>
          ))}

          <div style={{borderTop:"1px solid #2d4a6e",margin:"6px 0"}}/>

          <div style={{padding:"6px 12px"}}>
            <input
              value={custom}
              onChange={e=>setCustom(e.target.value)}
              placeholder="Novo perfil…"
              style={{width:"100%",background:"rgba(0,0,0,.25)",border:"1px solid #2d4a6e",borderRadius:5,padding:"6px 10px",color:C.sbInk,fontSize:13,outline:"none"}}
              onKeyDown={e=>{
                if(e.key==="Enter" && custom.trim()){
                  onSwitch(custom.trim());
                  setCustom("");
                  setOpen(false);
                }
              }}
            />
          </div>
        </div>
      )}
    </div>
  );
}
