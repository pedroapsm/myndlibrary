  const openConnections=async()=>{
    setScreen("connections");
    setSelConcept(null);
    setConceptDetail(null);

    // Se já tem índice em memória e não há novos livros sem conceitos, exibe direto
    const alreadyLoaded = Object.keys(conceptsIndex).length > 0;
    const allDone = books.every(b => b.conceptsStatus === "done");

    // Verifica se todos os livros atuais estão representados no índice em memória
    const indexedBookIds = new Set(
      Object.values(conceptsIndex).flatMap(e => e.books || [])
    );
    const allBooksIndexed = books.every(b => indexedBookIds.has(b.id));

    if(alreadyLoaded && allDone && allBooksIndexed){
      return; // tudo em memória e consistente, nada a fazer
    }

    setConceptsLoading(true);

    try{
      // Carrega textos e embeddings globais se ainda não carregados
      if(!globalTexts){
        const t={};
        for(const b of books) t[b.id]=await rf(dirHandle,`${b.id}.txt`) || "";
        setGlobalTexts(t);
      }
      if(!globalEmbeddings){
        const embMap={};
        await Promise.all(books.map(async b=>{
          const embs = await loadEmbeddings(dirHandle, b.id);
          if(embs) embMap[b.id] = embs;
        }));
        setGlobalEmbeddings(embMap);
      }

      // Carrega índice existente
      const existing = await loadConceptsIndex(dirHandle);

      // Detecta livros pendentes com Promise.all antes de filtrar
      const hasConceptsMap = {};
      await Promise.all(books.map(async b=>{
        const concepts = await loadBookConcepts(dirHandle, b.id);
        hasConceptsMap[b.id] = concepts.length > 0;
      }));

      // Corrige status de livros que já têm arquivo mas status desatualizado
      const statusFixNeeded = books.filter(b => b.conceptsStatus !== "done" && hasConceptsMap[b.id]);
      if(statusFixNeeded.length > 0){
        const nb = books.map(b => hasConceptsMap[b.id] ? {...b, conceptsStatus:"done"} : b);
        setBooks(nb);
        if(nb.length > 0) await persist(nb, cats, wishlist, profiles);
      }

      const pending = books.filter(b => !hasConceptsMap[b.id]);

      if(pending.length > 0){
        setConceptsLoading(false);
        setConceptsProcessing(true);
        try{
          const partialIndex = await rebuildConceptsIndex(dirHandle, books, apiKey, existing);
          setConceptsIndex(partialIndex);

          const updatedStatus = {};
          const currentBooks = [...books];

          for(const book of pending){
            try{
              const text = globalTexts?.[book.id] || await rf(dirHandle,`${book.id}.txt`) || "";
              const concepts = await extractConceptsForBook(book.id, text, book.title, apiKey);
              if(concepts.length > 0){
                await saveBookConcepts(dirHandle, book.id, concepts);
                updatedStatus[book.id] = "done";
              }
            }catch(e){
              console.warn(`Conceitos não extraídos para "${book.title}":`, e.message);
            }
          }

          if(Object.keys(updatedStatus).length > 0){
            const nb = currentBooks
              .filter(b => updatedStatus[b.id] || true) // mantém todos, mas filtra deletados no setBooks
              .map(b => updatedStatus[b.id] ? {...b, conceptsStatus:"done"} : b);
            setBooks(prev=>{
              const activeIds = new Set(prev.map(b=>b.id));
              const filtered = nb.filter(b=>activeIds.has(b.id));
              persist(filtered, cats, wishlist, profiles);
              return filtered;
            });
          }

          const booksForIndex = currentBooks.map(b => updatedStatus[b.id] ? {...b,conceptsStatus:"done"} : b);
          const fullIndex = await rebuildConceptsIndex(dirHandle, booksForIndex, apiKey, existing);
          setConceptsIndex(fullIndex);
        }finally{
          setConceptsProcessing(false);
        }

      } else {
        // Nenhum livro pendente — reconstrói sempre para garantir IDs atuais
        const index = await rebuildConceptsIndex(dirHandle, books, apiKey, existing);
        setConceptsIndex(index);
      }
    }catch(e){
      console.error("openConnections error:", e);
      addToast("Não foi possível carregar os conceitos", "error");
    }finally{
      setConceptsLoading(false);
    }
  };

  const updateConceptsAll=async(reprocessAll=false)=>{
    setConceptsProcessing(true);
    const existing = await loadConceptsIndex(dirHandle);

    // Fix 1: detecta pendentes com Promise.all
    const hasConceptsMap = {};
    await Promise.all(books.map(async b=>{
      const concepts = await loadBookConcepts(dirHandle, b.id);
      hasConceptsMap[b.id] = concepts.length > 0;
    }));

    const toProcess = reprocessAll
      ? books
      : books.filter(b => b.conceptsStatus !== "done" || !hasConceptsMap[b.id]);

    // Fix 2: acumula status em objeto local
    const updatedStatus = {};
    const currentBooks = [...books];

    for(const book of toProcess){
      try{
        const text = globalTexts?.[book.id] || await rf(dirHandle,`${book.id}.txt`) || "";
        const concepts = await extractConceptsForBook(book.id, text, book.title, apiKey);
        if(concepts.length > 0){
          await saveBookConcepts(dirHandle, book.id, concepts);
          updatedStatus[book.id] = "done";
        }
      }catch(e){
        console.warn(`Conceitos não extraídos para "${book.title}":`, e.message);
      }
    }

    // Aplica todos os status de uma vez, filtrando livros deletados
    if(Object.keys(updatedStatus).length > 0){
      setBooks(prev=>{
        const activeIds = new Set(prev.map(b=>b.id));
        const nb = currentBooks
          .filter(b=>activeIds.has(b.id))
          .map(b=>updatedStatus[b.id] ? {...b, conceptsStatus:"done"} : b);
        persist(nb, cats, wishlist, profiles);
        return nb;
      });
    }

    // Reconstrói índice com todos os livros (usa currentBooks para evitar closure stale)
    const booksForIndex = currentBooks.map(b =>
      updatedStatus[b.id] ? {...b, conceptsStatus:"done"} : b
    );
    const fullIndex = await rebuildConceptsIndex(dirHandle, booksForIndex, apiKey, existing);
    setConceptsIndex(fullIndex);
    setConceptsProcessing(false);
    pushToast(reprocessAll ? "Conceitos reprocessados" : "Conceitos atualizados");
  };

  const openConceptDetail=async(concept)=>{
    setSelConcept(concept);
    setConceptDetail(null);
    setConceptDetailLoading(true);

    const entry = conceptsIndex[concept];
    if(!entry){ setConceptDetailLoading(false); return; }

    const relatedBooks = (entry.books || [])
      .map(id => books.find(b => b.id === id))
      .filter(Boolean);

    // Busca trechos relevantes via embeddings
    let relevantChunks = [];
    if(globalEmbeddings && openaiKey){
      try{
        const qEmb = await generateEmbedding(concept, openaiKey);
        for(const book of relatedBooks){
          const embs = globalEmbeddings[book.id];
          if(!embs) continue;
          const text = globalTexts?.[book.id] || "";
          const allCh = splitTextIntoChunks(text);
          const contentMap = {};
          for(const c of allCh) contentMap[c.index] = c;
          const scored = embs
            .map(e => ({ ...contentMap[e.index], score: cosineSimilarity(qEmb, e.embedding), bookId: book.id, bookTitle: book.title }))
            .filter(c => c.content)
            .sort((a,b) => b.score - a.score)
            .slice(0, 2); // top 2 por livro
          relevantChunks.push(...scored);
        }
        relevantChunks.sort((a,b) => b.score - a.score);
        relevantChunks = relevantChunks.slice(0, 8);
      }catch(e){
        console.warn("Erro ao buscar trechos para conceito:", e.message);
      }
    }

    // Gera ou carrega síntese persistente
    let synthesis = entry.synthesis;
    let synthesisStale = entry.synthesisStale ?? true;

    if(!synthesis || synthesisStale){
      try{
        const bookNames = relatedBooks.map(b=>b.title).join(", ");
        const excerpts = relevantChunks.slice(0,4).map((c,i)=>`[${c.bookTitle} — Trecho ${i+1}]\n${c.content}`).join("\n\n");
        synthesis = sanitizeSynthesisText(await callClaude(
          apiKey,
          `Você é um assistente literário. Escreva um parágrafo direto de no máximo 100 palavras sobre como o conceito "${concept}" aparece nesta biblioteca. Comece diretamente pela ideia principal, sem repetir o nome do conceito como título ou heading. Sem títulos, sem markdown, sem bullet points, sem negrito, sem #, sem *. Texto corrido simples.`,
          [{ role:"user", content:`Livros relacionados: ${bookNames}\n\nTrechos:\n${excerpts}` }],
          300
        ));
        // Salva síntese no índice
        const updatedIndex = {
          ...conceptsIndex,
          [concept]: { ...entry, synthesis, synthesisStale: false, synthesisUpdatedAt: new Date().toISOString() }
        };
        setConceptsIndex(updatedIndex);
        await saveConceptsIndex(dirHandle, updatedIndex);
      }catch(e){
        console.warn("Síntese não gerada:", e.message);
        synthesis = null;
      }
    }

    // Gera conexões entre livros
    let connections = null;
    if(relatedBooks.length > 1){
      try{
        const bookNames = relatedBooks.map(b=>b.title).join(", ");
        connections = await callClaude(
          apiKey,
          `Explique brevemente, em texto corrido sem markdown, como o conceito "${concept}" aparece de forma diferente ou complementar em cada livro. Máximo 80 palavras. Sem títulos, sem bullet points.`,
          [{ role:"user", content:`Livros: ${bookNames}\n\nTrechos:\n${relevantChunks.slice(0,6).map((c,i)=>`[${c.bookTitle}]\n${c.content}`).join("\n\n")}` }],
          250
        );
      }catch{ connections = null; }
    }

    setConceptDetail({ synthesis, connections, chunks: relevantChunks, relatedBooks });
    setConceptDetailLoading(false);
  };

  const sendBook=async(txt)=>{
    if(!selBook) return;
    const next=[...bookMsgs,mkM("user",txt)];
    setBookMsgs(next);
    setChatLoading(true);
    setAutoDecision(null);

    try{
      let r;

      // ── Resolver modo efetivo ──────────────────────────────
      let effectiveMode = chatMode;
      let decision = null;

      if(chatMode === "auto"){
        decision = await decideAutoMode(txt, bookText, bookEmbeddings, openaiKey, bookCanUseDeep);
        setAutoDecision(decision);
        effectiveMode = decision.mode;
      }

      // ── Modo Profundo ──────────────────────────────────────
      if(effectiveMode === "deep" && bookCanUseDeep){
        const autoNote = decision
          ? `🔍 *Automático: usando visão global — ${decision.reason}*\n\n`
          : "";

        // Modo profundo distribuído: 65% semânticos + 35% distribuídos
        let deepChunks;
        const allCh = splitTextIntoChunks(bookText);

        if(bookEmbeddings && openaiKey){
          const qEmb = decision?.queryEmbedding || await generateEmbedding(txt, openaiKey);
          const contentMap = {};
          for(const c of allCh) contentMap[c.index] = c;
          const scored = bookEmbeddings
            .map(e => ({ ...contentMap[e.index], score: cosineSimilarity(qEmb, e.embedding) }))
            .filter(c => c.content)
            .sort((a,b) => b.score - a.score);
          deepChunks = buildDistributedChunks(allCh, scored, MAX_DEEP_CHUNKS);
        }else{
          // Fallback: distribuído puro sem semântica
          deepChunks = buildDistributedChunks(allCh, [], MAX_DEEP_CHUNKS);
        }

        const system = buildBookContextPrompt(selBook.title, txt, deepChunks);
        const raw = await callClaude(apiKey, system, next, 1600);
        r = autoNote + raw;

      }else{
        // ── Modo Básico: busca semântica com embeddings ────────
        const autoNote = (decision && decision.mode === "deep" && !bookCanUseDeep)
          ? `⚠️ *Automático: visão global recomendada mas indisponível — usando trechos.*\n\n`
          : "";

        // Nota discreta se o índice semântico ainda está sendo gerado
        const indexingNote = generatingEmbeddings
          ? `*Índice semântico ainda sendo gerado. Esta resposta usou busca por palavras-chave.*\n\n`
          : "";

        let chunks;
        if(bookEmbeddings && openaiKey){
          const cachedScoredChunks = decision?.scoredChunks;
          const cachedAllChunks    = decision?.allChunks;
          const cachedEmbedding    = decision?.queryEmbedding;

          if(cachedScoredChunks?.length && cachedAllChunks?.length){
            chunks = cachedScoredChunks
              .slice(0, MAX_BOOK_CONTEXT_CHUNKS)
              .sort((a,b) => a.index - b.index);
          }else{
            const qEmb = cachedEmbedding || await generateEmbedding(txt, openaiKey);
            const allCh = splitTextIntoChunks(bookText);
            chunks = await semanticSelectChunks(allCh, bookEmbeddings, qEmb, MAX_BOOK_CONTEXT_CHUNKS);
          }
        }else{
          // Fallback: keywords (livros antigos sem embeddings, ou sem chave OpenAI, ou ainda gerando)
          chunks = selectRelevantChunks(bookText, txt, MAX_BOOK_CONTEXT_CHUNKS);
        }

        const system = buildBookContextPrompt(selBook.title, txt, chunks);
        const raw = await callClaude(apiKey, system, next);
        r = autoNote + indexingNote + raw;
      }

      const final=[...next,mkM("assistant",r)];
      setBookMsgs(final);
      await saveCurrentChat(final);
    }catch(e){
      const msg = e.message || "Erro desconhecido.";
      const isFetch = msg.toLowerCase().includes("failed to fetch") || msg.toLowerCase().includes("networkerror");
      const display = isFetch
        ? "Sem conexão com a API. Verifique sua internet ou se há saldo disponível na conta Anthropic."
        : msg;
      setBookMsgs(p=>[...p,mkM("assistant", display)]);
    }

    setChatLoading(false);
  };

  const sendGlobal=async(txt)=>{
    if(!globalTexts) return;
    const next=[...globalMsgs,mkM("user",txt)];
    setGlobalMsgs(next);
    setChatLoading(true);
    setGlobalAutoDecision(null);

    // Filtra livros por categoria se necessário
    const activeBooks = globalSearchMode === "category" && globalSearchCategory
      ? books.filter(b => b.category === globalSearchCategory)
      : books;

    try{
      let r;
      const hasGlobalEmbeddings = globalEmbeddings && Object.keys(globalEmbeddings).length > 0;

      // ── Resolver modo efetivo ──────────────────────────
      let effectiveMode = globalChatMode;
      let decision = null;

      if(globalChatMode === "auto"){
        // Usa decideAutoMode com o contexto global
        // Passa texto vazio — a decisão será baseada em intent + qualidade semântica global
        let bestBookText = "";
        let bestBookEmbs = null;

        if(hasGlobalEmbeddings && openaiKey){
          // Usa o livro com mais embeddings como proxy para análise de qualidade
          const richestBookId = Object.entries(globalEmbeddings)
            .sort((a,b) => b[1].length - a[1].length)[0]?.[0];
          if(richestBookId){
            bestBookText = globalTexts[richestBookId] || "";
            bestBookEmbs = globalEmbeddings[richestBookId];
          }
        }

        decision = await decideAutoMode(txt, bestBookText, bestBookEmbs, openaiKey, true);
        setGlobalAutoDecision(decision);
        effectiveMode = decision.mode;
      }

      // ── Gerar embedding da query (uma vez, reutilizado) ──
      let queryEmbedding = null;
      if(hasGlobalEmbeddings && openaiKey){
        try{
          // Reutiliza embedding do decideAutoMode se disponível
          queryEmbedding = decision?.queryEmbedding || await generateEmbedding(txt, openaiKey);
        }catch{
          // Fallback para keywords se embedding falhar
        }
      }

      // ── Selecionar livros candidatos ──────────────────
      let candidateEntries; // [{ book, scoredChunks }]

      if(queryEmbedding && hasGlobalEmbeddings){
        // Seleção semântica — usa embeddings já carregados
        const semanticResults = selectRelevantBooksSemantic(
          queryEmbedding, activeBooks, globalEmbeddings, globalTexts, MAX_GLOBAL_BOOKS
        );
        candidateEntries = semanticResults
          .filter(r => r.score > 0 || r.scoredChunks.length > 0)
          .map(r => ({
            book: r.book,
            chunks: r.scoredChunks
              .slice(0, MAX_GLOBAL_CHUNKS_PER_BOOK)
              .sort((a,b) => a.index - b.index)
          }))
          .filter(e => e.chunks.length > 0);

        // Fallback se semântica não retornar nada
        if(!candidateEntries.length){
          const fallbackBooks = selectRelevantBooks(txt, activeBooks, globalTexts, MAX_GLOBAL_BOOKS);
          candidateEntries = fallbackBooks.map(book=>({
            book,
            chunks: selectRelevantChunks(globalTexts[book.id] || "", txt, MAX_GLOBAL_CHUNKS_PER_BOOK)
          })).filter(e=>e.chunks.length>0);
        }
      }else{
        // Fallback keywords
        const candidateBooks = selectRelevantBooks(txt, activeBooks, globalTexts, MAX_GLOBAL_BOOKS);
        candidateEntries = candidateBooks.map(book=>({
          book,
          chunks: selectRelevantChunks(globalTexts[book.id] || "", txt, MAX_GLOBAL_CHUNKS_PER_BOOK)
        })).filter(e=>e.chunks.length>0);
      }

      // ── Modo Profundo ─────────────────────────────────
      if(effectiveMode === "deep"){
        const autoNote = decision
          ? `🔍 *Automático: usando visão global — ${decision.reason}*\n\n`
          : "";

        // Modo profundo distribuído por livro: 65% semânticos + 35% distribuídos
        const deepEntries = candidateEntries.map(({book, chunks: semanticChunks}) => {
          const allCh = splitTextIntoChunks(globalTexts[book.id] || "");
          const deepChunks = buildDistributedChunks(allCh, semanticChunks, MAX_DEEP_CHUNKS_GLOBAL);
          return { book, chunks: deepChunks };
        });

        const system = buildGlobalContextPrompt(txt, deepEntries);
        const raw = await callClaude(apiKey, system, next, 1600);
        r = autoNote + raw;

      }else{
        // ── Modo Básico global: trechos semânticos ────────
        const autoNote = (decision && decision.mode === "deep")
          ? `⚠️ *Automático: visão global recomendada mas indisponível — usando trechos.*\n\n`
          : "";

        const system = buildGlobalContextPrompt(txt, candidateEntries);
        const raw = await callClaude(apiKey, system, next);
        r = autoNote + raw;
      }

      const final=[...next,mkM("assistant",r)];
      setGlobalMsgs(final);
      await saveCurrentGlobalChat(final);
    }catch(e){
      const msg = e.message || "Erro desconhecido.";
      const isFetch = msg.toLowerCase().includes("failed to fetch") || msg.toLowerCase().includes("networkerror");
      const display = isFetch
        ? "Sem conexão com a API. Verifique sua internet ou se há saldo disponível na conta Anthropic."
        : msg;
      setGlobalMsgs(p=>[...p,mkM("assistant", display)]);
    }

    setChatLoading(false);
  };

  const toggleInsight=async(msg, book, insightName="")=>{
    if(!msg?.id || !book) return;
    const existing = insights.find(ins => ins.messageId === msg.id);

    if(existing){
      // Remove insight

  const handleRetry=async(statusKey)=>{
    const book = selBookRef.current;
    if(!book) return;
    const text = await rf(dirHandle,`${book.id}.txt`) || "";

    const updateStatus=(s)=>{
      setBooks(prev=>{
        if(!prev.find(b=>b.id===book.id)) return prev;
        const nb=prev.map(b=>b.id===book.id?{...b,[statusKey]:s}:b);
        persist(nb,cats,wishlist,profiles);
        return nb;
      });
      setSelBook(p=>p?{...p,[statusKey]:s}:p);
    };

    updateStatus("processing");

    if(statusKey==="synopsisStatus"){
      try{
        const synopsis = sanitizeSynopsisText(await fetchBookSynopsis(apiKey, book.title, book.author));
        setBooks(prev=>{
          if(!prev.find(b=>b.id===book.id)) return prev;
          const nb=prev.map(b=>b.id===book.id?{...b,synopsis,synopsisStatus:"done"}:b);
          persist(nb,cats,wishlist,profiles);
          return nb;
        });
        setSelBook(p=>p?{...p,synopsis,synopsisStatus:"done"}:p);
        pushToast("Sinopse regenerada");
      }catch(e){
        updateStatus("error");
      }
    } else if(statusKey==="embeddingsStatus"){
      if(!openaiKey){ updateStatus("error"); return; }
      try{
        const chunks = splitTextIntoChunks(text);
        const embs = await generateAndSaveEmbeddings(book.id, chunks, dirHandle, openaiKey, ()=>{});
        updateStatus("done");
        if(selBookRef.current?.id===book.id) setBookEmbeddings(embs);
        pushToast("Índice semântico gerado");
      }catch(e){
        updateStatus("error");
      }
    } else if(statusKey==="conceptsStatus"){
      try{
        const concepts = await extractConceptsForBook(book.id, text, book.title, apiKey);
        if(concepts.length > 0){
          await saveBookConcepts(dirHandle, book.id, concepts);
          updateStatus("done");
        } else {
          updateStatus("error");
        }
      }catch(e){
        updateStatus("error");
      }
    }
  };

          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",gap:12,background:C.surf}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div style={{flex:1}}>
                <div style={{fontSize:24,fontWeight:700,color:C.ink,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  {selBook.title}
                  {openingBook && <span style={{fontSize:12,color:C.inkF,fontWeight:500}}>Carregando…</span>}
                </div>
                {selBook.author && <div style={{fontSize:15,color:C.inkF,marginTop:3}}>{selBook.author}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:8,rowGap:6,marginTop:10,alignItems:"center"}}>
                  {selBook.category ? (()=>{ const c=catStyle(selBook.category); return <span style={{fontSize:12,padding:"3px 9px",borderRadius:12,background:c.bg,color:c.ink,border:`1px solid ${c.brd}`,fontWeight:600}}>{selBook.category}</span>; })() : null}
                  {selBook.category && selBook.pages ? <span style={{fontSize:12,color:C.inkF}}>•</span> : null}
                  {selBook.pages ? <span style={{fontSize:13,color:C.inkF}}>{selBook.pages} pág.</span> : null}
                  {(selBook.category || selBook.pages) && (selBook.tags||[]).length > 0 ? <span style={{fontSize:12,color:C.inkF}}>•</span> : null}
                  {(selBook.tags||[]).length > 0 ? <span style={{fontSize:13,color:C.inkF}}>Tags: {(selBook.tags||[]).join(", ")}</span> : null}

                  {/* Separador antes do modo */}
                  <span style={{fontSize:12,color:C.inkF}}>•</span>

                  {/* Badge de modo — sempre visível */}
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,fontWeight:600,background:C.accentBg,color:C.accent,border:`1px solid ${C.accentBrd}`}}>
                    {autoDecision
                      ? `Modo: Automático - ${autoDecision.mode === "deep" ? "Profundo" : "Básico"}`
                      : chatMode === "deep" ? "Modo: Profundo"
                      : chatMode === "auto" ? "Modo: Automático"
                      : "Modo: Básico"
                    }
                  </span>

                  <BookProcessingStatus book={selBook} onRetry={handleRetry}/>
                </div>
              </div>
              <button style={bI} onClick={()=>{setEditBook(selBook); setModal({type:"edit",initial:selBook});}}><Ico d={D.edit} sz={14}/></button>
              <button style={{...bI,color:C.red}} onClick={()=>doDelete(selBook)}><Ico d={D.trash} sz={14}/></button>
            </div>

            <NotesPanel
              dirHandle={dirHandle}
              bookId={selBook.id}
              profileId={userName}
              otherProfiles={otherProfiles}
              synopsis={selBook.synopsis}
              synopsisStatus={selBook.synopsisStatus}
              onNotesPresenceChange={(hasNotes)=>updateBookNotesPresence(selBook.id,hasNotes)}
              onToast={pushToast}
              onRegenerateSynopsis={()=>handleRetry("synopsisStatus")}
            />

            <ConversasInsights
              chatSessions={chatSessions}
              insights={insights}
              selBook={selBook}
              activeChatId={activeChatId}
              userName={userName}
              selectChat={selectChat}
              deleteChat={deleteChat}
              newChat={newChat}
              toggleInsight={toggleInsight}
              setShowInsightsModal={setShowInsightsModal}
              onOpenInsight={(ins)=>{ setSelectedInsight(ins); setShowInsightsModal(true); }}
            />

            {showInsightsModal && (
              <InsightsSavedModal
                bookInsights={insights.filter(ins=>ins.bookId===selBook.id)}
                initialSelected={selectedInsight}
                onClose={()=>{ setShowInsightsModal(false); setSelectedInsight(null); }}
                onRemove={(insightId)=>{
                  const ins = insights.find(i=>i.id===insightId);
                  if(ins) toggleInsight({id:ins.messageId, content:ins.answerText}, selBook);
                  setShowInsightsModal(false);
                  setSelectedInsight(null);
                }}
              />
            )}

            <div style={{padding:"6px 28px 0",borderBottom:`1px solid ${C.border}`,borderTop:`1px solid ${C.border}`}}>
              <div style={{...lb,paddingBottom:7,display:"flex",alignItems:"center",gap:6}}>
                <Ico d={D.chat} sz={11}/> Conversa
              </div>
            </div>

            <ChatArea
              messages={bookMsgs}
              loading={chatLoading}
              onSend={sendBook}
              placeholder="Pergunte algo sobre este livro…"
              onExport={()=>exportChat(bookMsgs,selBook.title)}
              emptyNode={<WelcomeBook onSend={sendBook}/>}
              mode={chatMode}
              setMode={setChatMode}
              deepDisabled={!bookCanUseDeep}
              onToggleInsight={selBook ? (msg, name)=>toggleInsight(msg, selBook, name) : null}
              savedMessageIds={new Set(insights.filter(ins=>ins.bookId===selBook?.id).map(ins=>ins.messageId))}
              apiKey={apiKey}
            />
          </div>
        )}

        {screen==="global" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,background:C.surf,display:"flex",alignItems:"center",gap:12}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div style={{flex:1}}>
                <div style={{fontSize:21,fontWeight:700,color:C.ink,display:"flex",alignItems:"center",gap:8}}>
                  <Ico d={D.globe} sz={19} col={C.accent}/> Pesquisa na biblioteca
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,rowGap:4,marginTop:6,alignItems:"center"}}>
                  {/* Toggle Geral / Por categoria */}
                  <div style={{display:"flex",gap:4}}>
                    {["all","category"].map(mode=>(
                      <button
                        key={mode}
                        onClick={()=>{ setGlobalSearchMode(mode); if(mode==="all") setGlobalSearchCategory(""); }}
                        style={{
                          fontSize:13,padding:"4px 14px",borderRadius:6,cursor:"pointer",fontWeight:600,
                          border:`1px solid ${globalSearchMode===mode ? C.accentBrd : C.border}`,
                          background:globalSearchMode===mode ? C.accentBg : "none",
                          color:globalSearchMode===mode ? C.accent : C.inkF
                        }}
                      >
                        {mode==="all" ? "Geral" : "Por categoria"}
                      </button>
                    ))}
                  </div>

                  {/* Select de categoria */}
                  {globalSearchMode==="category" && (
                    <select
                      value={globalSearchCategory}
                      onChange={e=>setGlobalSearchCategory(e.target.value)}
                      style={{fontSize:13,padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.surf,color:C.ink,cursor:"pointer",outline:"none"}}
                    >
                      <option value="">Escolha uma categoria…</option>
                      {cats.filter(c => books.some(b=>b.category===c)).map(c=>(
                        <option key={c} value={c}>{c}</option>
                      ))}
                    </select>
                  )}

                  {/* Info de livros no escopo */}
                  <span style={{fontSize:12,color:C.inkF}}>
                    {globalSearchMode==="category" && globalSearchCategory
                      ? `${books.filter(b=>b.category===globalSearchCategory).length} livros em "${globalSearchCategory}"`
                      : `${books.length} livros`
                    }
                    {globalLoading ? " · Carregando…" : globalTexts ? " · Pronto para pesquisar" : ""}
                  </span>

                  <span style={{fontSize:12,color:C.inkF}}>•</span>
                  <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,fontWeight:600,background:C.accentBg,color:C.accent,border:`1px solid ${C.accentBrd}`}}>
                    {globalAutoDecision
                      ? `Modo: Automático - ${globalAutoDecision.mode === "deep" ? "Profundo" : "Básico"}`
                      : globalChatMode === "deep" ? "Modo: Profundo"
                      : globalChatMode === "auto" ? "Modo: Automático"
                      : "Modo: Básico"
                    }
                  </span>
                </div>
              </div>
            </div>

            <ChatHistory
              sessions={globalSessions}
              otherSessions={otherGlobalSessions}
              activeId={activeGlobalChatId}
              onSelect={selectGlobalChat}
              onNew={newGlobalChat}
              onDelete={deleteGlobalChat}
              otherProfileNames={otherProfiles}
              title="Pesquisas anteriores"
            />

            <div style={{padding:"6px 28px 0",borderBottom:`1px solid ${C.border}`,borderTop:globalSessions.length || Object.keys(otherGlobalSessions).length ? `1px solid ${C.border}` : "none"}}>
              <div style={{...lb,paddingBottom:7,display:"flex",alignItems:"center",gap:6}}>
                <Ico d={D.globe} sz={11}/> Conversa
              </div>
            </div>

            <ChatArea
              messages={globalMsgs}
              loading={chatLoading || globalLoading}
              onSend={globalTexts ? sendGlobal : ()=>{}}
              placeholder={globalLoading ? "Carregando livros…" : globalSearchMode==="category" && globalSearchCategory ? `Pergunte sobre livros de "${globalSearchCategory}"…` : "Pergunte sobre qualquer livro da biblioteca…"}
              onExport={()=>exportChat(globalMsgs,"pesquisa_global")}
              emptyNode={<WelcomeGlobal/>}
              mode={globalChatMode}
              setMode={setGlobalChatMode}
              deepDisabled={false}
              onToggleInsight={null}
              savedMessageIds={new Set()}
            />
          </div>
        )}

        {screen==="connections" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <ConnectionsPage
              conceptsIndex={conceptsIndex}
              conceptsLoading={conceptsLoading}
              conceptsProcessing={conceptsProcessing}
              selConcept={selConcept}
              conceptDetail={conceptDetail}
              conceptDetailLoading={conceptDetailLoading}
              books={books}
              onOpenConcept={openConceptDetail}
              onBack={()=>{ setSelConcept(null); setConceptDetail(null); }}
              onUpdate={()=>updateConceptsAll(false)}
              onReprocessAll={()=>updateConceptsAll(true)}
            />
          </div>
        )}

        {screen==="insights" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <InsightsPage
              insights={insights}
              insightEmbeddings={insightEmbeddings}
              openaiKey={openaiKey}
              cats={cats}
              profiles={[userName,...otherProfiles]}
            />
          </div>
        )}
      </main>

      {modal?.type==="cats" && <CatModal categories={cats} onSave={saveCats} onClose={()=>setModal(null)}/>}
      {modal?.type==="add" && <BookModal mode="add" initial={modal.initial} categories={cats} onSave={doAdd} onClose={()=>{setModal(null); setPendingFile(null); setUploadQualityAlert("");}} uploading={uploading} prog={upProg} err={upErr} qualityAlert={uploadQualityAlert}/>}
      {modal?.type==="edit" && modal.initial && <BookModal mode="edit" initial={modal.initial} categories={cats} onSave={doEdit} onClose={()=>{setModal(null); setEditBook(null);}} uploading={false} prog={0} err="" qualityAlert=""/>}
      {wishModal && <WishModal item={wishEdit} onSave={saveWish} onClose={()=>{setWishModal(false); setWishEdit(null);}}/>}
      <Toasts items={toasts} onRemove={removeToast}/>

      <style>{`
        @keyframes bob{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

        .inner-scroll{
          scrollbar-width: thin;
          scrollbar-color: rgba(0,0,0,.22) transparent;
        }

        .inner-scroll::-webkit-scrollbar{
          width: 8px;
          height: 8px;
        }

        .inner-scroll::-webkit-scrollbar-track{
          background: transparent;
        }

        .inner-scroll::-webkit-scrollbar-thumb{
          background: rgba(0,0,0,.22);
          border-radius: 999px;
        }

        .inner-scroll::-webkit-scrollbar-thumb:hover{
          background: rgba(0,0,0,.34);
        }

        .sidebar-shell .inner-scroll{
          scrollbar-color: rgba(255,255,255,.18) transparent;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar{
          width: 8px;
          height: 8px;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-track{
          background: transparent;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-thumb{
          background: rgba(255,255,255,.18);
          border-radius: 999px;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-thumb:hover{
          background: rgba(255,255,255,.28);
        }
      `}</style>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────

function Root(){
  const [phase,setPhase]=useState("loading");
  const [dirHandle,setDir]=useState(null);
  const [apiKey,setKey]=useState("");
  const [openaiKey,setOpenaiKey]=useState("");
  const [userName,setUser]=useState("");
  const [savedProfiles,setSavedProfiles]=useState([]);

  useEffect(()=>{
    if(!window.showDirectoryPicker){
      setPhase("unsupported");
      return;
    }

    const savedUser=localStorage.getItem("mynd_user");
    const savedKey=localStorage.getItem("mynd_apikey");
    const savedOpenaiKey=localStorage.getItem("mynd_openai_apikey") || "";

    idbGet("dir").then(async dh=>{
      if(!dh){
        setPhase("setup");
        return;
      }
      try{
        const perm=await dh.queryPermission({mode:"readwrite"});
        if(perm==="granted"){
          const k=savedKey || (await rf(dh,"apikey.txt")) || "";
          const oaik=savedOpenaiKey || (await rf(dh,"openai_apikey.txt")) || "";
          if(!k?.trim()){
            setPhase("setup");
            return;
          }
          setDir(dh);
          setKey(k.trim());
          setOpenaiKey(oaik.trim());
          if(!savedUser){
            try{
              const idxTxt = await rf(dh,"index.json");
              const idx = idxTxt ? JSON.parse(idxTxt) : {};
              setSavedProfiles(uniqueCaseInsensitive(idx?.profiles || []));
            }catch{ setSavedProfiles([]); }
            setPhase("setup");
            return;
          }
          setUser(savedUser);
          setPhase("app");
        }else{
          setPhase("reconnect");
          window._pendingDir=dh;
          window._pendingKey=savedKey || "";
          window._pendingOpenaiKey=savedOpenaiKey || "";
          window._pendingUser=savedUser || "";
        }
      }catch{
        setPhase("setup");
      }
    }).catch(()=>setPhase("setup"));
  },[]);

  const center=(msg,sub)=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,textAlign:"center",padding:40}}>
      <div>
        <div style={{fontSize:30,color:C.ink,marginBottom:12,fontWeight:700}}>{msg}</div>
        {sub && <p style={{fontSize:16,color:C.inkF,lineHeight:1.7,maxWidth:460}} dangerouslySetInnerHTML={{__html:sub}}/>}
      </div>
    </div>
  );

  if(phase==="loading") return center("Carregando…");

  if(phase==="unsupported") return center(
    "Navegador não suportado",
    'Esta versão requer <strong>Google Chrome</strong> ou Microsoft Edge (v86+).<br/>Firefox e Safari não suportam a File System Access API.'
  );

  if(phase==="reconnect"){
    const reconnect=async()=>{
      try{
        const dh=window._pendingDir;
        const perm=await dh.requestPermission({mode:"readwrite"});
        if(perm!=="granted"){
          setPhase("setup");
          return;
        }
        const k=window._pendingKey || (await rf(dh,"apikey.txt")) || "";
        const oaik=window._pendingOpenaiKey || (await rf(dh,"openai_apikey.txt")) || "";
        const u=window._pendingUser;
        if(!k || !u){
          setPhase("setup");
          return;
        }
        setDir(dh);
        setKey(k.trim());
        setOpenaiKey(oaik.trim());
        setUser(u);
        setPhase("app");
      }catch{
        setPhase("setup");
      }
    };

    return(
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:40}}>
        <div style={{textAlign:"center",maxWidth:420}}>
          <div style={{fontSize:30,color:C.ink,marginBottom:12,fontWeight:700}}>Reconectar pasta</div>
          <p style={{fontSize:16,color:C.inkF,lineHeight:1.7,marginBottom:28}}>
            A permissão de acesso à pasta expirou. Clique para reconectar.
          </p>
          <button onClick={reconnect} style={{...bP(false),fontSize:15,padding:"12px 28px"}}>
            <Ico d={D.folder} sz={17} col={C.surf} style={{display:"inline",marginRight:8}}/> Reconectar pasta
          </button>
          <br/>
          <button onClick={()=>setPhase("setup")} style={{...bG,marginTop:12,fontSize:14}}>
            Fazer setup novamente
          </button>
        </div>
      </div>
    );
  }

  // profile_select unificado em setup
  if(phase==="profile_select") setPhase("setup");

  if(phase==="setup"){
    return <Setup onReady={(dh,k,name,oaik)=>{ setDir(dh); setKey(k); setUser(name); setOpenaiKey(oaik||""); setPhase("app"); }} savedProfiles={savedProfiles} currentDir={dirHandle} currentDirName={dirHandle?.name||""} currentApiKey={apiKey} currentOpenaiKey={openaiKey}/>;
  }

  return <Library dirHandle={dirHandle} apiKey={apiKey} userName={userName} openaiKey={openaiKey} onLogoff={()=>setPhase("setup")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
