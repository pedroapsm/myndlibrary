        As respostas são baseadas exclusivamente no texto do livro.
      </p>
      <SuggestionChips items={BOOK_SUGGESTIONS} onSelect={onSend} variant="global" />
    </div>
  );
}

// ─── Library ──────────────────────────────────────────

function Library({dirHandle,apiKey,userName:initUser}){
  const [books,setBooks] = useState([]);
  const [cats,setCats] = useState([...DEF_CATS]);
  const [profiles,setProfiles] = useState([]);
  const [wishlist,setWishlist] = useState([]);
  const [stats,setStats] = useState({consultations:{}});
  const [screen,setScreen] = useState("home");
  const [selBook,setSelBook] = useState(null);
  const [bookText,setBookText] = useState("");
  const [bookMsgs,setBookMsgs] = useState([]);
  const [chatSessions,setChatSessions] = useState([]);
  const [otherSessions,setOtherSessions] = useState({});
  const [activeChatId,setActiveChatId] = useState(null);

  const [globalMsgs,setGlobalMsgs] = useState([]);
  const [globalTexts,setGlobalTexts] = useState(null);
  const [globalSessions,setGlobalSessions] = useState([]);
  const [otherGlobalSessions,setOtherGlobalSessions] = useState({});
  const [activeGlobalChatId,setActiveGlobalChatId] = useState(null);

  const [chatLoading,setChatLoading] = useState(false);
  const [globalLoading,setGlobalLoading] = useState(false);
  const [openingBook,setOpeningBook] = useState(false);

  const [searchQ,setSearchQ] = useState("");
  const [searchDraft,setSearchDraft] = useState("");
  const [tagQuery,setTagQuery] = useState("");
  const [tagDraft,setTagDraft] = useState("");
  const [selectedCategory,setSelectedCategory] = useState("");
  const [modal,setModal] = useState(null);
  const [editBook,setEditBook] = useState(null);
  const [wishModal,setWishModal] = useState(false);
  const [wishEdit,setWishEdit] = useState(null);
  const [pendingFile,setPendingFile] = useState(null);
  const [uploading,setUploading] = useState(false);
  const [upProg,setUpProg] = useState(0);
  const [upErr,setUpErr] = useState("");
  const [uploadQualityAlert,setUploadQualityAlert] = useState("");
  const [userName,setUserName] = useState(initUser);
  const [lastBook,setLastBook] = useState(null);
  const [toasts,setToasts] = useState([]);
  const fileRef=useRef();

  const otherProfiles=useMemo(()=>profiles.filter(p=>p!==userName),[profiles,userName]);

  const pushToast=useCallback((text)=>{
    const id=uid();
    setToasts(prev=>[...prev,{id,text}]);
    setTimeout(()=>{
      setToasts(prev=>prev.filter(t=>t.id!==id));
    },2600);
  },[]);

  const removeToast=useCallback((id)=>{
    setToasts(prev=>prev.filter(t=>t.id!==id));
  },[]);

  useEffect(()=>{
    (async()=>{
      const [idx,st,files] = await Promise.all([
        loadIdx(dirHandle),
        loadStats(dirHandle),
        listDirFiles(dirHandle)
      ]);

      const validSet = new Set(idx.categories || []);
      const booksWithMeta=(idx.books || []).map(book=>{
        const fixedCategory = normalizeCategory(book.category);
        const hasNotes = files.some(name=>name.startsWith(`${book.id}_notes_`));
        const hasChats = files.some(name=>name.startsWith(`${book.id}_chats_`));
        return {
          ...book,
          tags: normalizeTags(book.tags),
          category: validSet.has(fixedCategory) ? fixedCategory : "",
          _hasNotes:hasNotes,
          _hasChats:hasChats
        };
      });

      setBooks(booksWithMeta);
      setCats(idx.categories || [...DEF_CATS]);
      setWishlist(idx.wishlist || []);
      setProfiles(idx.profiles || []);
      setStats(st);

      const lastId=localStorage.getItem("mynd_lastBook");
      if(lastId){
        const found=booksWithMeta.find(x=>x.id===lastId);
        if(found) setLastBook(found);
        else localStorage.removeItem("mynd_lastBook");
      }
    })();
  },[dirHandle]);

  useEffect(()=>{
    setGlobalTexts(null);
  },[books]);

  useEffect(()=>{
    const t = debounceValue(searchDraft, 160, setSearchQ);
    return ()=>clearTimeout(t);
  },[searchDraft]);

  useEffect(()=>{
    setTagQuery(tagDraft);
  },[tagDraft]);

  const persist=async(nextBooks=books,nextCats=cats,nextWishlist=wishlist,nextProfiles=profiles)=>{
    const normalizedCats = normalizeCategories(nextCats);
    const validSet = new Set(normalizedCats);

    const booksToStore=nextBooks.map(({_hasNotes,_hasChats,...rest})=>({
      ...rest,
      tags: normalizeTags(rest.tags),
      category: validSet.has(normalizeCategory(rest.category)) ? normalizeCategory(rest.category) : ""
    }));

    await saveIdx(dirHandle,{
      books:booksToStore,
      categories:normalizedCats,
      wishlist:nextWishlist,
      profiles:nextProfiles
    });
  };

  const ensureProfileSaved=async(name)=>{
    const trimmed=(name||"").trim();
    if(!trimmed) return;
    if(profiles.includes(trimmed)) return;
    const next=uniqueCaseInsensitive([...profiles,trimmed]);
    setProfiles(next);
    await persist(books,cats,wishlist,next);
  };

  const bumpStat=async(bookId)=>{
    setStats(prev=>{
      const next={
        ...prev,
        consultations:{
          ...prev.consultations,
          [bookId]:(prev.consultations[bookId]||0)+1
        }
      };
      saveStats(dirHandle,next);
      return next;
    });
  };

  const allTags=useMemo(()=>{
    const s=new Set();
    books.forEach(b=>(b.tags||[]).forEach(t=>s.add(normalizeTagValue(t))));
    return [...s].sort((a,b)=>a.localeCompare(b,"pt-BR"));
  },[books]);

  const filteredBooks=useMemo(()=>{
    return books.filter(b=>{
      const matchesSearch = !searchQ.trim() || (
        b.title.toLowerCase().includes(searchQ.toLowerCase()) ||
        (b.author||"").toLowerCase().includes(searchQ.toLowerCase())
      );

      const matchesTag = !tagQuery.trim() || (
        (b.tags||[]).some(t=>t.toLowerCase().includes(tagQuery.toLowerCase()))
      );

      const matchesCategory = !selectedCategory || b.category === selectedCategory;

      return matchesSearch && matchesTag && matchesCategory;
    });
  },[books,searchQ,tagQuery,selectedCategory]);

  const catCounts=useMemo(()=>{
    const m={};
    books.forEach(b=>{
      if(!b.category) return;
      m[b.category]=(m[b.category]||0)+1;
    });
    return m;
  },[books]);

  const hasActiveFilter = !!searchDraft.trim() || !!tagDraft.trim() || !!selectedCategory;

  const clearFilters=()=>{
    setSearchDraft("");
    setTagDraft("");
    setSelectedCategory("");
  };

  const handleFilePick=e=>{
    const f=e.target.files?.[0];
    e.target.value="";
    if(!f) return;
    if(!f.name.toLowerCase().endsWith(".pdf")){
      alert("Apenas PDFs.");
      return;
    }
    setPendingFile(f);
    setUploadQualityAlert("");
    setModal({
      type:"add",
      initial:{
        title:f.name.replace(/\.pdf$/i,"").replace(/[-_]/g," "),
        author:"",
        category:cats[0] || "",
        tags:[]
      }
    });
    setUpErr("");
    setUpProg(0);
  };

  const doAdd=async(fd)=>{
    setUploading(true);
    setUpProg(15);
    setUpErr("");
    setUploadQualityAlert("");

    try{
      const normalizedCategory = normalizeCategory(fd.category);
      const nextCats = normalizedCategory && !cats.includes(normalizedCategory)
        ? [...cats, normalizedCategory]
        : cats;

      if(nextCats !== cats) setCats(nextCats);

      const {text,pages}=await extractPdf(pendingFile);
      const quality = detectPdfQuality(text, pages);
      if(quality.isSuspect){
        setUploadQualityAlert(`O PDF pode ter sido extraído com baixa qualidade. ${quality.flags.join(" | ")}`);
      }

      setUpProg(55);

      let summary="";
      try{
        summary=await callClaude(apiKey,sysSummary(fd.title),[{role:"user",content:text.slice(0,20000)}],300);
      }catch{}

      setUpProg(85);

      const id=uid();
      const book={
        id,
        title:trimStr(fd.title),
        author:trimStr(fd.author),
        category: nextCats.includes(normalizedCategory) ? normalizedCategory : "",
        tags:normalizeTags(fd.tags),
        pages,
        summary,
        addedAt:new Date().toISOString(),
        _hasNotes:false,
        _hasChats:false
      };

      await wf(dirHandle,`${id}.txt`,text);

      const nb=[...books,book];
      setBooks(nb);
      await persist(nb,nextCats,wishlist,profiles);

      setUpProg(100);
      pushToast(quality.isSuspect ? "Livro adicionado com alerta de qualidade do PDF" : "Livro adicionado à biblioteca");

      setTimeout(()=>{
        setModal(null);
        setPendingFile(null);
        setUploading(false);
        setUpProg(0);
        setUploadQualityAlert("");
      },500);
    }catch(e){
      setUpErr("Erro: " + e.message);
      setUploading(false);
      setUpProg(0);
    }
  };

  const doEdit=async(fd)=>{
    const normalizedCategory = normalizeCategory(fd.category);
    const nextCats = normalizedCategory && !cats.includes(normalizedCategory)
      ? [...cats, normalizedCategory]
      : cats;

    if(nextCats !== cats) setCats(nextCats);

    const finalCategory = nextCats.includes(normalizedCategory) ? normalizedCategory : "";
    const nextTags = normalizeTags(fd.tags);

    const nb=books.map(b=>b.id===editBook.id ? {...b,...fd,category:finalCategory,tags:nextTags} : b);
    setBooks(nb);

    if(selBook?.id===editBook.id){
      setSelBook(p=>({...p,...fd,category:finalCategory,tags:nextTags}));
    }

    await persist(nb,nextCats,wishlist,profiles);
    setModal(null);
    setEditBook(null);
    pushToast("Livro atualizado");
  };

  const doDelete=async(book)=>{
    if(!confirm(`Remover "${book.title}"?`)) return;

    await rmf(dirHandle,`${book.id}.txt`);

    const knownProfiles=Array.from(new Set([...(profiles||[]), userName].filter(Boolean)));
    for(const p of knownProfiles){
      await rmf(dirHandle,noteFileName(book.id,p));
      await rmf(dirHandle,chatFileName(book.id,p));
    }

    const names=await listDirFiles(dirHandle);
    for(const name of names){
      if(name.startsWith(`${book.id}_notes_`) || name.startsWith(`${book.id}_chats_`)){
        await rmf(dirHandle,name);
      }
    }

    const nb=books.filter(b=>b.id!==book.id);
    setBooks(nb);
    await persist(nb,cats,wishlist,profiles);

    setStats(prev=>{
      const nextConsultations={...prev.consultations};
      delete nextConsultations[book.id];
      const next={...prev, consultations:nextConsultations};
      saveStats(dirHandle,next);
      return next;
    });

    if(selBook?.id===book.id){
      setSelBook(null);
      setBookText("");
      setBookMsgs([]);
      setChatSessions([]);
      setOtherSessions({});
      setActiveChatId(null);
      setScreen("home");
    }

    if(lastBook?.id===book.id){
      setLastBook(null);
      localStorage.removeItem("mynd_lastBook");
    }

    localStorage.removeItem(`mynd_lastChat_${book.id}`);
    pushToast("Livro excluído");
  };

  const saveCats=async(payload)=>{
    const normalized = normalizeCategories(payload?.categories || []);
    const renameMap = payload?.renameMap || {};
    const validSet = new Set(normalized);

    const nb = books.map(b=>{
      let nextCategory = normalizeCategory(b.category || "");
      if(nextCategory && renameMap[nextCategory]){
        nextCategory = normalizeCategory(renameMap[nextCategory]);
      }
      if(nextCategory && !validSet.has(nextCategory)){
        nextCategory = "";
      }
      return {...b,category:nextCategory};
    });

    setCats(normalized);
    setBooks(nb);

    if(selBook){
      const updatedSel = nb.find(b=>b.id===selBook.id) || null;
      setSelBook(updatedSel);
    }

    if(selectedCategory){
      const nextSelected = renameMap[selectedCategory]
        ? normalizeCategory(renameMap[selectedCategory])
        : selectedCategory;
      setSelectedCategory(validSet.has(nextSelected) ? nextSelected : "");
    }

    await persist(nb,normalized,wishlist,profiles);
    setModal(null);
    pushToast("Categorias atualizadas");
  };

  const saveWish=async(d)=>{
    let nw;
    if(wishEdit){
      nw=wishlist.map(w=>w.id===wishEdit.id ? {...wishEdit,...d} : w);
      pushToast("Wishlist atualizada");
    }else{
      nw=[...wishlist,{...d,id:uid(),addedAt:new Date().toISOString()}];
      pushToast("Livro adicionado à wishlist");
    }
    setWishlist(nw);
    await persist(books,cats,nw,profiles);
    setWishModal(false);
    setWishEdit(null);
  };

  const deleteWish=async(id)=>{
    const nw=wishlist.filter(w=>w.id!==id);
    setWishlist(nw);
    await persist(books,cats,nw,profiles);
    pushToast("Livro removido da wishlist");
  };

  const openBook=async(book)=>{
    const freshBook = books.find(b=>b.id===book.id) || book;

    setOpeningBook(true);
    setSelBook(freshBook);
    setScreen("book");
    setLastBook(freshBook);
    localStorage.setItem("mynd_lastBook",freshBook.id);

    setBookMsgs([]);
    setChatSessions([]);
    setOtherSessions({});
    setActiveChatId(null);

    await bumpStat(freshBook.id);

    const txt=await rf(dirHandle,`${freshBook.id}.txt`);
    setBookText(txt || "");

    const sessions=await loadChats(dirHandle,freshBook.id,userName);
    setChatSessions(sessions);

    const others={};
    for(const p of otherProfiles){
      const ss=await loadChats(dirHandle,freshBook.id,p);
      if(ss.length) others[p]=ss;
    }
    setOtherSessions(others);

    const lastId=localStorage.getItem(`mynd_lastChat_${freshBook.id}`);
    const last=sessions.find(s=>s.id===lastId);

    if(last){
      setBookMsgs(last.messages);
      setActiveChatId(last.id);
    }else{
      setBookMsgs([]);
      setActiveChatId(null);
    }

    setOpeningBook(false);
  };

  const newChat=()=>{
    setBookMsgs([]);
    setActiveChatId(null);
  };

  const selectChat=s=>{
    setBookMsgs(s.messages);
    if(!s._profile){
      setActiveChatId(s.id);
      localStorage.setItem(`mynd_lastChat_${selBook.id}`,s.id);
    }else{
      setActiveChatId(null);
    }
  };

  const saveCurrentChat=async(msgs)=>{
    if(!selBook || !msgs.length) return;

    const firstUser=msgs.find(m=>m.role==="user");
    const title=firstUser ? firstUser.content.slice(0,50) : "Conversa";
    const date=new Date().toLocaleDateString("pt-BR");
    let sessions=[...chatSessions];

    if(activeChatId){
      sessions=sessions.map(s=>s.id===activeChatId ? {...s,messages:msgs,title,date} : s);
    }else{
      const id=uid();
      sessions=[{id,title,date,messages:msgs,profileId:userName,bookId:selBook.id}, ...sessions];
      setActiveChatId(id);
      localStorage.setItem(`mynd_lastChat_${selBook.id}`,id);
    }

    setChatSessions(sessions);
    await saveChats(dirHandle,selBook.id,userName,sessions);

    if(!selBook._hasChats){
      const nb=books.map(b=>b.id===selBook.id ? {...b,_hasChats:true} : b);
      setBooks(nb);
      setSelBook(p=>p?{...p,_hasChats:true}:p);
      await persist(nb,cats,wishlist,profiles);
    }
  };

  const openGlobal=async()=>{
    setScreen("global");
    setGlobalLoading(true);

    const t={};
    for(const b of books){
      t[b.id]=await rf(dirHandle,`${b.id}.txt`) || "";
    }
    setGlobalTexts(t);

    const mine = await loadGlobalChats(dirHandle,userName);
    setGlobalSessions(mine);

    const others={};
    for(const p of otherProfiles){
      const ss=await loadGlobalChats(dirHandle,p);
      if(ss.length) others[p]=ss;
    }
    setOtherGlobalSessions(others);

    const lastId=localStorage.getItem("mynd_lastGlobalChat");
    const last=mine.find(s=>s.id===lastId);
    if(last){
      setGlobalMsgs(last.messages);
      setActiveGlobalChatId(last.id);
    }else{
      setGlobalMsgs([]);
      setActiveGlobalChatId(null);
    }

    setGlobalLoading(false);
  };

  const newGlobalChat=()=>{
    setGlobalMsgs([]);
    setActiveGlobalChatId(null);
  };

  const selectGlobalChat=s=>{
    setGlobalMsgs(s.messages);
    if(!s._profile){
      setActiveGlobalChatId(s.id);
      localStorage.setItem("mynd_lastGlobalChat",s.id);
    }else{
      setActiveGlobalChatId(null);
    }
  };

  const saveCurrentGlobalChat=async(msgs)=>{
    if(!msgs.length) return;

    const firstUser=msgs.find(m=>m.role==="user");
    const title=firstUser ? firstUser.content.slice(0,50) : "Conversa global";
    const date=new Date().toLocaleDateString("pt-BR");
    let sessions=[...globalSessions];

    if(activeGlobalChatId){
      sessions=sessions.map(s=>s.id===activeGlobalChatId ? {...s,messages:msgs,title,date} : s);
    }else{
      const id=uid();
      sessions=[{id,title,date,messages:msgs,profileId:userName}, ...sessions];
      setActiveGlobalChatId(id);
      localStorage.setItem("mynd_lastGlobalChat",id);
    }

    setGlobalSessions(sessions);
    await saveGlobalChats(dirHandle,userName,sessions);
  };

  const av=userName ? userName.charAt(0).toUpperCase() : "?";
  const mkM=(role,content)=>({role,content,av});

  const sendBook=async(txt)=>{
    if(!selBook) return;
    const next=[...bookMsgs,mkM("user",txt)];
    setBookMsgs(next);
    setChatLoading(true);

    try{
      const chunks = selectRelevantChunks(bookText, txt, MAX_BOOK_CONTEXT_CHUNKS);
      const system = buildBookContextPrompt(selBook.title, txt, chunks);
      const r=await callClaude(apiKey,system,next);
      const final=[...next,mkM("assistant",r)];
      setBookMsgs(final);
      await saveCurrentChat(final);
    }catch(e){
      setBookMsgs(p=>[...p,mkM("assistant","Erro: " + e.message + ". Tente novamente.")]);
    }

    setChatLoading(false);
  };

  const sendGlobal=async(txt)=>{
    if(!globalTexts) return;
    const next=[...globalMsgs,mkM("user",txt)];
    setGlobalMsgs(next);
    setChatLoading(true);

    try{
      const candidateBooks = selectRelevantBooks(txt, books, globalTexts, MAX_GLOBAL_BOOKS);
      const entries = candidateBooks.map(book=>({
        book,
        chunks: selectRelevantChunks(globalTexts[book.id] || "", txt, MAX_GLOBAL_CHUNKS_PER_BOOK)
      })).filter(entry=>entry.chunks.length > 0);

      const system = buildGlobalContextPrompt(txt, entries);
      const r=await callClaude(apiKey,system,next);
      const final=[...next,mkM("assistant",r)];
      setGlobalMsgs(final);
      await saveCurrentGlobalChat(final);
    }catch(e){
      setGlobalMsgs(p=>[...p,mkM("assistant","Erro: " + e.message + ". Tente novamente.")]);
    }

    setChatLoading(false);
  };

  const exportChat=(msgs,title)=>{
    const txt=msgs.map(m=>`[${m.role==="user" ? (userName || "Você") : "Mynd Library"}]\n${m.content}`).join("\n\n──────────────────\n\n");
    const blob=new Blob([`Conversa: ${title}\nPerfil: ${userName}\nData: ${new Date().toLocaleString("pt-BR")}\n${"═".repeat(36)}\n\n${txt}`],{type:"text/plain"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`conversa_${title.replace(/\s+/g,"_").slice(0,30)}.txt`;
    a.click();
    pushToast("Conversa exportada");
  };

  const switchProfile=async(name)=>{
    const trimmed=(name||"").trim();
    if(!trimmed) return;
    setUserName(trimmed);
    localStorage.setItem("mynd_user",trimmed);
    await ensureProfileSaved(trimmed);
    if(selBook){
      const fresh = books.find(b=>b.id===selBook.id);
      if(fresh) await openBook(fresh);
    }
    if(screen==="global"){
      await openGlobal();
    }
  };

  const updateBookNotesPresence=async(bookId,hasNotes)=>{
    const nb=books.map(b=>b.id===bookId ? {...b,_hasNotes:hasNotes} : b);
    setBooks(nb);
    if(selBook?.id===bookId) setSelBook(p=>p?{...p,_hasNotes:hasNotes}:p);
    await persist(nb,cats,wishlist,profiles);
  };

  // suggestion chips para pesquisa global
  const globalSuggestionItems = [
    "Quais livros falam sobre estratégia?",
    "Compare os autores",
    "Resuma cada livro em uma frase",
    "Que temas se repetem?"
  ];

  const WelcomeGlobal=()=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px 24px"}}>
      <p style={{fontSize:15,color:C.inkD,lineHeight:1.7}}>
        Faça perguntas que cruzam múltiplos livros. A IA sempre indica de qual obra vem cada informação.
        {globalLoading && <em style={{color:C.inkF}}> Carregando…</em>}
      </p>
      {!globalLoading && books.length>0 && (
        <SuggestionChips items={globalSuggestionItems} onSelect={sendGlobal} variant="global" />
      )}
    </div>
  );

  return(
    <div style={{display:"flex",height:"100vh",color:C.ink,overflow:"hidden"}}>
      <Sidebar
        dirHandle={dirHandle}
        userName={userName}
        profiles={profiles}
        switchProfile={switchProfile}
        screen={screen}
        setScreen={setScreen}
        openGlobal={openGlobal}
        searchDraft={searchDraft}
        setSearchDraft={setSearchDraft}
        tagDraft={tagDraft}
        setTagDraft={setTagDraft}
        allTags={allTags}
        selectedCategory={selectedCategory}
        setSelectedCategory={setSelectedCategory}
        cats={cats}
        catCounts={catCounts}
        books={books}
        filteredBooks={filteredBooks}
        selBook={selBook}
        openBook={openBook}
        clearFilters={clearFilters}
        hasActiveFilter={hasActiveFilter}
        setModal={setModal}
        fileRef={fileRef}
        handleFilePick={handleFilePick}
        onDeleteBook={doDelete}
      />

      <main style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",background:C.bg}}>
        {screen==="home" && (
          <HomePage
            visibleBooks={filteredBooks}
            allBooks={books}
            wishlist={wishlist}
            stats={stats}
            lastBook={lastBook}
            onContinue={()=>{ if(lastBook) openBook(lastBook); }}
            onAddWish={()=>{ setWishEdit(null); setWishModal(true); }}
            onEditWish={w=>{ setWishEdit(w); setWishModal(true); }}
            onDeleteWish={deleteWish}
            onOpenBook={openBook}
            onEditBook={b=>{ setEditBook(b); setModal({type:"edit",initial:b}); }}
            onDeleteBook={doDelete}
            onClearFilters={clearFilters}
            hasActiveFilter={hasActiveFilter}
            onAddBook={()=>fileRef.current?.click()}
          />
        )}

        {screen==="book" && selBook && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",gap:12,background:C.surf}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div style={{flex:1}}>
                <div style={{fontSize:24,fontWeight:700,color:C.ink,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  {selBook.title}
                  {openingBook && <span style={{fontSize:12,color:C.inkF,fontWeight:500}}>Carregando…</span>}
                </div>
                {selBook.author && <div style={{fontSize:15,color:C.inkF,marginTop:3}}>{selBook.author}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:8,rowGap:6,marginTop:10,alignItems:"center"}}>
                  {selBook.category ? (()=>{ const c=catStyle(selBook.category); return <span style={{fontSize:12,padding:"3px 9px",borderRadius:12,background:c.bg,color:c.ink,border:`1px solid ${c.brd}`,fontWeight:600}}>{selBook.category}</span>; })() : null}
                  {selBook.category && selBook.pages ? <span style={{fontSize:12,color:C.inkF}}>•</span> : null}
                  {selBook.pages ? <span style={{fontSize:13,color:C.inkF}}>{selBook.pages} pág.</span> : null}
                  {(selBook.category || selBook.pages) && (selBook.tags||[]).length > 0 ? <span style={{fontSize:12,color:C.inkF}}>•</span> : null}
                  {(selBook.tags||[]).length > 0 ? <span style={{fontSize:13,color:C.inkF}}>Tags: {(selBook.tags||[]).join(", ")}</span> : null}
                </div>
              </div>
              <button style={bI} onClick={()=>{setEditBook(selBook); setModal({type:"edit",initial:selBook});}}><Ico d={D.edit} sz={14}/></button>
              <button style={{...bI,color:C.red}} onClick={()=>doDelete(selBook)}><Ico d={D.trash} sz={14}/></button>
            </div>

            {selBook.summary && (
              <div style={{padding:"12px 28px 0"}}>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:9,padding:"12px 18px",fontSize:15,color:C.inkD,lineHeight:1.78}}>
                  <strong style={{fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:C.gold}}>Resumo</strong>
                  <div style={{marginTop:6}}>{selBook.summary}</div>
                </div>
              </div>
            )}

            <NotesPanel
              dirHandle={dirHandle}
              bookId={selBook.id}
              profileId={userName}
              otherProfiles={otherProfiles}
              onNotesPresenceChange={(hasNotes)=>updateBookNotesPresence(selBook.id,hasNotes)}
              onToast={pushToast}
            />

            <ChatHistory
              sessions={chatSessions}
              otherSessions={otherSessions}
              activeId={activeChatId}
              onSelect={selectChat}
              onNew={newChat}
              otherProfileNames={otherProfiles}
              title="Conversas anteriores"
            />

            <div style={{padding:"6px 28px 0",borderBottom:`1px solid ${C.border}`,borderTop:chatSessions.length || Object.keys(otherSessions).length ? `1px solid ${C.border}` : "none"}}>
              <div style={{...lb,paddingBottom:7,display:"flex",alignItems:"center",gap:6}}>
                <Ico d={D.chat} sz={11}/> Conversa
              </div>
            </div>

            <ChatArea
              messages={bookMsgs}
              loading={chatLoading}
              onSend={sendBook}
              placeholder="Pergunte algo sobre este livro…"
              onExport={()=>exportChat(bookMsgs,selBook.title)}
              emptyNode={<WelcomeBook onSend={sendBook}/>}
            />
          </div>
        )}

        {screen==="global" && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"14px 28px",borderBottom:`1px solid ${C.border}`,background:C.surf,display:"flex",alignItems:"center",gap:12}}>
              <button style={bI} onClick={()=>setScreen("home")}><Ico d={D.back} sz={15}/></button>
              <div>
                <div style={{fontSize:21,fontWeight:700,color:C.ink,display:"flex",alignItems:"center",gap:8}}>
                  <Ico d={D.globe} sz={19} col={C.accent}/> Pesquisa na biblioteca
                </div>
                <div style={{fontSize:13,color:C.inkF,marginTop:2}}>
                  {books.length} livros {globalLoading ? "| carregando…" : globalTexts ? "| pronto" : ""}
                </div>
              </div>
            </div>

            <ChatHistory
              sessions={globalSessions}
              otherSessions={otherGlobalSessions}
              activeId={activeGlobalChatId}
              onSelect={selectGlobalChat}
              onNew={newGlobalChat}
              otherProfileNames={otherProfiles}
              title="Pesquisas anteriores"
            />

            <div style={{padding:"6px 28px 0",borderBottom:`1px solid ${C.border}`,borderTop:globalSessions.length || Object.keys(otherGlobalSessions).length ? `1px solid ${C.border}` : "none"}}>
              <div style={{...lb,paddingBottom:7,display:"flex",alignItems:"center",gap:6}}>
                <Ico d={D.globe} sz={11}/> Conversa
              </div>
            </div>

            <ChatArea
              messages={globalMsgs}
              loading={chatLoading || globalLoading}
              onSend={globalTexts ? sendGlobal : ()=>{}}
              placeholder={globalLoading ? "Carregando livros…" : "Pergunte sobre qualquer livro da biblioteca…"}
              onExport={()=>exportChat(globalMsgs,"pesquisa_global")}
              emptyNode={<WelcomeGlobal/>}
            />
          </div>
        )}
      </main>

      {modal?.type==="cats" && <CatModal categories={cats} onSave={saveCats} onClose={()=>setModal(null)}/>}
      {modal?.type==="add" && <BookModal mode="add" initial={modal.initial} categories={cats} onSave={doAdd} onClose={()=>{setModal(null); setPendingFile(null); setUploadQualityAlert("");}} uploading={uploading} prog={upProg} err={upErr} qualityAlert={uploadQualityAlert}/>}
      {modal?.type==="edit" && editBook && <BookModal mode="edit" initial={modal.initial} categories={cats} onSave={doEdit} onClose={()=>{setModal(null); setEditBook(null);}} uploading={false} prog={0} err="" qualityAlert=""/>}
      {wishModal && <WishModal item={wishEdit} onSave={saveWish} onClose={()=>{setWishModal(false); setWishEdit(null);}}/>}
      <Toasts items={toasts} onRemove={removeToast}/>

      <style>{`
        @keyframes bob{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

        .inner-scroll{
          scrollbar-width: thin;
          scrollbar-color: rgba(0,0,0,.22) transparent;
        }

        .inner-scroll::-webkit-scrollbar{
          width: 8px;
          height: 8px;
        }

        .inner-scroll::-webkit-scrollbar-track{
          background: transparent;
        }

        .inner-scroll::-webkit-scrollbar-thumb{
          background: rgba(0,0,0,.22);
          border-radius: 999px;
        }

        .inner-scroll::-webkit-scrollbar-thumb:hover{
          background: rgba(0,0,0,.34);
        }

        .sidebar-shell .inner-scroll{
          scrollbar-color: rgba(255,255,255,.18) transparent;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar{
          width: 8px;
          height: 8px;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-track{
          background: transparent;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-thumb{
          background: rgba(255,255,255,.18);
          border-radius: 999px;
        }

        .sidebar-shell .inner-scroll::-webkit-scrollbar-thumb:hover{
          background: rgba(255,255,255,.28);
        }
      `}</style>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────

function Root(){
  const [phase,setPhase]=useState("loading");
  const [dirHandle,setDir]=useState(null);
  const [apiKey,setKey]=useState("");
  const [userName,setUser]=useState("");

  useEffect(()=>{
    if(!window.showDirectoryPicker){
      setPhase("unsupported");
      return;
    }

    const savedUser=localStorage.getItem("mynd_user");
    const savedKey=localStorage.getItem("mynd_apikey");

    idbGet("dir").then(async dh=>{
      if(!dh){
        setPhase("setup");
        return;
      }
      try{
        const perm=await dh.queryPermission({mode:"readwrite"});
        if(perm==="granted"){
          const k=savedKey || (await rf(dh,"apikey.txt")) || "";
          if(!k?.trim() || !savedUser){
            setPhase("setup");
            return;
          }
          setDir(dh);
          setKey(k.trim());
          setUser(savedUser);
          setPhase("app");
        }else{
          setPhase("reconnect");
          window._pendingDir=dh;
          window._pendingKey=savedKey || "";
          window._pendingUser=savedUser || "";
        }
      }catch{
        setPhase("setup");
      }
    }).catch(()=>setPhase("setup"));
  },[]);

  const center=(msg,sub)=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,textAlign:"center",padding:40}}>
      <div>
        <div style={{fontSize:30,color:C.ink,marginBottom:12,fontWeight:700}}>{msg}</div>
        {sub && <p style={{fontSize:16,color:C.inkF,lineHeight:1.7,maxWidth:460}} dangerouslySetInnerHTML={{__html:sub}}/>}
      </div>
    </div>
  );

  if(phase==="loading") return center("Carregando…");

  if(phase==="unsupported") return center(
    "Navegador não suportado",
    'Esta versão requer <strong>Google Chrome</strong> ou Microsoft Edge (v86+).<br/>Firefox e Safari não suportam a File System Access API.'
  );

  if(phase==="reconnect"){
    const reconnect=async()=>{
      try{
        const dh=window._pendingDir;
        const perm=await dh.requestPermission({mode:"readwrite"});
        if(perm!=="granted"){
          setPhase("setup");
          return;
        }
        const k=window._pendingKey || (await rf(dh,"apikey.txt")) || "";
        const u=window._pendingUser;
        if(!k || !u){
          setPhase("setup");
          return;
        }
        setDir(dh);
        setKey(k.trim());
        setUser(u);
        setPhase("app");
      }catch{
        setPhase("setup");
      }
    };

    return(
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:40}}>
        <div style={{textAlign:"center",maxWidth:420}}>
          <div style={{fontSize:30,color:C.ink,marginBottom:12,fontWeight:700}}>Reconectar pasta</div>
          <p style={{fontSize:16,color:C.inkF,lineHeight:1.7,marginBottom:28}}>
            A permissão de acesso à pasta expirou. Clique para reconectar.
          </p>
          <button onClick={reconnect} style={{...bP(false),fontSize:15,padding:"12px 28px"}}>
            <Ico d={D.folder} sz={17} col={C.surf} style={{display:"inline",marginRight:8}}/> Reconectar pasta
          </button>
          <br/>
          <button onClick={()=>setPhase("setup")} style={{...bG,marginTop:12,fontSize:14}}>
            Fazer setup novamente
          </button>
        </div>
      </div>
    );
  }

  if(phase==="setup"){
    return <Setup onReady={(dh,k,name)=>{ setDir(dh); setKey(k); setUser(name); setPhase("app"); }} />;
  }

  return <Library dirHandle={dirHandle} apiKey={apiKey} userName={userName}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
