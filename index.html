function HomePage({
  visibleBooks, allBooks, wishlist,onAddWish,onEditWish,onDeleteWish,lastBook,onContinue,
  stats,onOpenBook,onEditBook,onDeleteBook,onClearFilters,hasActiveFilter,onAddBook
}){
  const [sortCol,setSortCol]=useState("addedAt");
  const [sortAsc,setSortAsc]=useState(false);

  const totalPages=useMemo(()=>allBooks.reduce((s,b)=>s+(b.pages||0),0),[allBooks]);
  const withChats=useMemo(()=>allBooks.filter(b=>b._hasChats).length,[allBooks]);
  const withNotes=useMemo(()=>allBooks.filter(b=>b._hasNotes).length,[allBooks]);

  const mostConsulted=useMemo(()=>{
    const c=stats?.consultations || {};
    const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
    return top ? allBooks.find(bk=>bk.id===top[0]) : null;
  },[stats,allBooks]);

  const sorted=useMemo(()=>{
    const arr=[...visibleBooks];
    arr.sort((a,b)=>{
      let av=a[sortCol] || "", bv=b[sortCol] || "";
      if(sortCol === "tags"){
        av = joinTags(a.tags || []);
        bv = joinTags(b.tags || []);
      }
      if(typeof av==="string") av=av.toLowerCase();
      if(typeof bv==="string") bv=bv.toLowerCase();
      if(av===bv) return 0;
      return sortAsc ? (av>bv?1:-1) : (av<bv?1:-1);
    });
    return arr;
  },[visibleBooks,sortCol,sortAsc]);

  const toggleSort=col=>{
    if(sortCol===col) setSortAsc(a=>!a);
    else { setSortCol(col); setSortAsc(true); }
  };

  const SortIcon=({col})=>{
    if(sortCol!==col) return <span style={{color:C.border,marginLeft:3}}>↕</span>;
    return <span style={{color:C.accent,marginLeft:3}}>{sortAsc ? "↑" : "↓"}</span>;
  };

  const KCard=({label,value,sub,col,large})=>(
    <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 18px",flex:1,minWidth:140}}>
      <div style={{...lb,marginBottom:8}}>{label}</div>
      <div style={{fontSize:large?18:30,fontWeight:700,color:col||C.ink,lineHeight:1.2}}>
        {value!==null && value!==undefined && value!=="" ? value : "—"}
      </div>
      {sub && <div style={{fontSize:13,color:C.inkF,marginTop:5,lineHeight:1.4}}>{sub}</div>}
    </div>
  );

  return(
    <div className="inner-scroll" style={{flex:1,overflowY:"auto",padding:"36px 40px"}}>
      <div style={{marginBottom:28,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
        <div>
          <h1 style={{fontSize:36,fontWeight:700,color:C.ink,lineHeight:1}}>Mynd Library</h1>
          <p style={{fontSize:16,color:C.inkF,marginTop:8}}>Sua biblioteca pessoal.</p>
        </div>
        <button
          onClick={onAddBook}
          style={{
            display:"flex",alignItems:"center",gap:8,background:C.accent,border:"none",
            color:C.surf,padding:"11px 16px",borderRadius:9,cursor:"pointer",
            fontSize:14,fontWeight:700,boxShadow:"0 8px 20px rgba(45,107,228,.18)"
          }}
        >
          <Ico d={D.plus} sz={15} col={C.surf}/> Adicionar livro
        </button>
      </div>

      {lastBook && (
        <div style={{background:`linear-gradient(135deg,${C.sb} 0%,#223858 100%)`,borderRadius:12,padding:"18px 22px",marginBottom:28,display:"flex",alignItems:"center",gap:18}}>
          <div style={{width:5,minWidth:5,height:50,borderRadius:3,background:spineC(lastBook.id)}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,letterSpacing:"0.13em",textTransform:"uppercase",color:C.sbInkD,marginBottom:4,fontWeight:600}}>
              Continuar leitura
            </div>
            <div style={{fontSize:19,fontWeight:600,color:C.sbInk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {lastBook.title}
            </div>
            {lastBook.author && <div style={{fontSize:14,color:C.sbInkD,marginTop:2}}>{lastBook.author}</div>}
          </div>
          <button
            onClick={onContinue}
            style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.18)",borderRadius:8,padding:"10px 18px",cursor:"pointer",color:C.sbInk,fontSize:14,fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}
          >
            <Ico d={D.play} sz={14} col={C.sbInk}/> Retomar
          </button>
        </div>
      )}

      <div style={{display:"flex",gap:14,marginBottom:28,flexWrap:"wrap"}}>
        <KCard label="Total de livros" value={allBooks.length} col={C.accent}/>
        <KCard label="Total de páginas" value={totalPages>0 ? totalPages.toLocaleString("pt-BR") : null}/>
        <KCard label="Com conversas" value={withChats || null}/>
        <KCard label="Livros com notas" value={withNotes || null}/>
        {mostConsulted && <KCard label="Mais consultado" value={mostConsulted.title} sub={mostConsulted.author} col={C.gold} large/>}
      </div>

      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px 24px",marginBottom:28}}>
        <div style={{fontSize:18,fontWeight:700,color:C.ink,marginBottom:16}}>Biblioteca</div>

        <div className="inner-scroll" style={{overflow:"auto",maxHeight:330,border:`1px solid ${C.borderL}`,borderRadius:8}}>
          <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,fontSize:14,tableLayout:"fixed"}}>
            <thead>
              <tr style={{borderBottom:`1px solid ${C.border}`}}>
                {[
                  ["title","Nome",{width:"24%"}],
                  ["author","Autor",{width:"13%"}],
                  ["pages","Páginas",{width:"8%"}],
                  ["category","Categoria",{width:"13%"}],
                  ["tags","Tags",{width:"18%"}],
                  ["addedAt","Data",{width:"9%"}]
                ].map(([col,label,extra])=>(
                  <th
                    key={col}
                    onClick={()=>toggleSort(col)}
                    style={{
                      position:"sticky",
                      top:0,
                      zIndex:2,
                      background:C.surf,
                      textAlign:"left",
                      padding:"10px 12px",
                      cursor:"pointer",
                      color:C.inkD,
                      fontWeight:700,
                      fontSize:12,
                      letterSpacing:"0.05em",
                      userSelect:"none",
                      whiteSpace:"nowrap",
                      borderBottom:`1px solid ${C.border}`,
                      ...extra
                    }}
                  >
                    {label}<SortIcon col={col}/>
                  </th>
                ))}
                <th style={{
                  position:"sticky",top:0,zIndex:2,background:C.surf,textAlign:"left",
                  padding:"10px 18px 10px 16px",color:C.inkD,fontWeight:700,fontSize:12,letterSpacing:"0.05em",
                  whiteSpace:"nowrap",borderBottom:`1px solid ${C.border}`,width:"11%"
                }}>
                  Ações
                </th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(b=>{
                const c = catStyle(b.category);
                return (
                  <tr key={b.id} style={{borderBottom:`1px solid ${C.borderL}`, transition:"background .15s"}} onMouseEnter={e=>e.currentTarget.style.background="#faf9f7"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{padding:"11px 12px",color:C.ink,fontWeight:600,verticalAlign:"top"}}>
                      <button
                        onClick={()=>onOpenBook(b)}
                        style={{
                          background:"none",
                          border:"none",
                          padding:0,
                          margin:0,
                          textAlign:"left",
                          cursor:"pointer",
                          color:C.ink,
                          fontWeight:600,
                          fontSize:14,
                          lineHeight:1.45,
                          width:"100%"
                        }}
                        title={b.title}
                      >
                        {b.title}
                      </button>
                    </td>
                    <td style={{padding:"11px 12px",color:C.inkD,verticalAlign:"top"}}>
                      <div title={b.author || ""}>{b.author ? truncateText(b.author,30) : "—"}</div>
                    </td>
                    <td style={{padding:"11px 12px",color:C.inkF,fontSize:13,verticalAlign:"top",whiteSpace:"nowrap"}}>
                      {b.pages ? `${b.pages} pág.` : "—"}
                    </td>
                    <td style={{padding:"11px 12px",verticalAlign:"top"}}>
                      {b.category ? (()=>{ const c=catStyle(b.category); return <span style={{fontSize:11,padding:"3px 9px",borderRadius:12,background:c.bg,color:c.ink,border:`1px solid ${c.brd}`,fontWeight:600,display:"inline-block"}}>{b.category}</span>; })() : <span style={{fontSize:11,color:C.inkF}}>—</span>}
                    </td>
                    <td style={{padding:"11px 12px",color:C.inkF,verticalAlign:"top"}}>
                      <div title={joinTags(b.tags||[])} style={{lineHeight:1.5}}>
                        {truncateText(joinTags(b.tags||[]), 36)}
                      </div>
                    </td>
                    <td style={{padding:"11px 12px 11px 14px",color:C.inkF,fontSize:13,verticalAlign:"top",whiteSpace:"nowrap"}}>
                      {b.addedAt ? new Date(b.addedAt).toLocaleDateString("pt-BR") : "—"}
                    </td>
                    <td style={{padding:"11px 18px 11px 16px",verticalAlign:"top"}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"nowrap"}}>
                        <button onClick={()=>onOpenBook(b)} style={{...bI,padding:"4px 8px",fontSize:12,fontWeight:600,color:C.inkD}}>Abrir</button>
                        <button onClick={()=>onEditBook(b)} style={{...bI,padding:"4px 6px"}}><Ico d={D.edit} sz={13}/></button>
                        <button
                          onClick={()=>onDeleteBook(b)}
                          style={{...bI,padding:"4px 6px",color:C.red,borderColor:C.red+"44",transition:"background .15s, color .15s, border-color .15s"}}
                          onMouseEnter={e=>{
                            e.currentTarget.style.background = "rgba(122,30,30,.08)";
                            e.currentTarget.style.borderColor = C.red;
                          }}
                          onMouseLeave={e=>{
                            e.currentTarget.style.background = "none";
                            e.currentTarget.style.borderColor = C.red+"44";
                          }}
                        >
                          <Ico d={D.trash} sz={13}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
              {sorted.length===0 && (
                <tr>
                  <td colSpan="7" style={{padding:"18px 12px"}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                      <span style={{color:C.inkF,fontStyle:"italic"}}>
                        Nenhum livro corresponde aos filtros atuais.
                      </span>
                      {hasActiveFilter && (
                        <button onClick={onClearFilters} style={{...bG,fontSize:13,padding:"7px 12px"}}>
                          Limpar filtros
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,padding:"22px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:10,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
            <Ico d={D.heart} sz={18} col={C.red}/>
            <span style={{fontSize:18,fontWeight:700,color:C.ink}}>Wishlist</span>
            <span style={{fontSize:14,color:C.inkF}}>| livros que quero adquirir</span>
          </div>
          <button onClick={onAddWish} style={{display:"flex",alignItems:"center",gap:6,background:C.accentBg,border:`1px solid ${C.accentBrd}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",color:C.accent,fontSize:13,fontWeight:700}}>
            <Ico d={D.plus} sz={14}/> Adicionar
          </button>
        </div>

        {wishlist.length===0 && <p style={{fontSize:14,color:C.inkF,fontStyle:"italic"}}>Nenhum livro na wishlist ainda.</p>}

        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {wishlist.map(w=>(
            <div key={w.id} style={{display:"flex",alignItems:"center",gap:14,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 16px"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:15,fontWeight:600,color:C.ink,lineHeight:1.3}}>{w.title}</div>
                {w.author && <div style={{fontSize:13,color:C.inkF,marginTop:2}}>{w.author}</div>}
              </div>
              <div style={{display:"flex",gap:7,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
                {w.link && (
                  <a
                    href={w.link}
                    target="_blank"
                    rel="noopener"
                    style={{display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:600,color:C.accent,padding:"5px 12px",border:`1px solid ${C.accentBrd}`,borderRadius:5,textDecoration:"none",background:C.accentBg}}
                  >
                    <Ico d={D.link} sz={12}/> Comprar
                  </a>
                )}
                <button onClick={()=>onEditWish(w)} style={{...bI,padding:"5px 9px"}}><Ico d={D.edit} sz={13}/></button>
                <button onClick={()=>onDeleteWish(w.id)} style={{...bI,color:C.red,borderColor:C.red+"44",padding:"5px 9px"}}><Ico d={D.trash} sz={13}/></button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Setup ────────────────────────────────────────────

function Setup({onReady, savedProfiles=[], currentDir=null, currentDirName="", currentApiKey="", currentOpenaiKey=""}){
  const [apiKey,setKey]=useState(()=>currentApiKey || localStorage.getItem("mynd_apikey") || "");
  const [openaiKey,setOpenaiKey]=useState(()=>currentOpenaiKey || localStorage.getItem("mynd_openai_apikey") || "");
  const [dir,setDir]=useState(()=>currentDir || null);
  const [dirName,setDirName]=useState(()=>currentDirName || "");
  const [profile,setProfile]=useState(()=>localStorage.getItem("mynd_user") || "");
  const [err,setErr]=useState("");

  const pick=async()=>{
    try{
      const dh=await window.showDirectoryPicker({mode:"readwrite",startIn:"documents"});
      setDir(dh);
      setDirName(dh.name);
      setErr("");
    }catch(e){
      if(e.name!=="AbortError") setErr("Não foi possível acessar a pasta.");
    }
  };

  const finish=async()=>{
    const name=profile.trim();
    if(!apiKey.trim() || !dir || !name) return;

    const idx=await loadIdx(dir);
    const profiles=uniqueCaseInsensitive([...(idx.profiles||[]), name]);

    await saveIdx(dir,{
      books:idx.books||[],
      categories:idx.categories||[...DEF_CATS],
      wishlist:idx.wishlist||[],
      profiles
    });

    await idbSet("dir",dir);
    await wf(dir,"apikey.txt",apiKey.trim());

    // Salva chave OpenAI separada (pode ser vazia se usuário não quiser embeddings)
    if(openaiKey.trim()){
      await wf(dir,"openai_apikey.txt",openaiKey.trim());
    }

    localStorage.setItem("mynd_user",name);
    localStorage.setItem("mynd_apikey",apiKey.trim());
    if(openaiKey.trim()) localStorage.setItem("mynd_openai_apikey",openaiKey.trim());

    onReady(dir, apiKey.trim(), name, openaiKey.trim());
  };

  const ready=!!apiKey.trim() && !!dir && !!profile.trim();

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,padding:24}}>
      <div style={{width:560,maxWidth:"92vw"}}>
        <h1 style={{fontSize:40,fontWeight:700,color:C.ink,marginBottom:6}}>Mynd Library</h1>
        <p style={{fontSize:16,color:C.inkD,lineHeight:1.65,marginBottom:28}}>
          Configure uma vez e siga usando sua biblioteca na pasta escolhida.
        </p>

        <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:28,display:"flex",flexDirection:"column",gap:22}}>
          <div>
            <div style={{...lb,marginBottom:8}}>Perfil</div>
            {savedProfiles.length > 0 && (
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {savedProfiles.map(p=>(
                  <button
                    key={p}
                    type="button"
                    onClick={()=>setProfile(p)}
                    style={{
                      padding:"5px 13px",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer",
                      border:`1px solid ${profile===p ? C.accentBrd : C.border}`,
                      background: profile===p ? "rgba(45,107,228,.08)" : C.surf,
                      color: profile===p ? C.accent : C.inkD,
                      transition:"border-color .15s,background .15s,color .15s"
                    }}
                  >{p}</button>
                ))}
              </div>
            )}
            <input
              style={fi}
              placeholder="Novo perfil ou selecione acima"
              value={profile}
              onChange={e=>setProfile(e.target.value)}
            />
          </div>

          <div>
            <div style={{...lb,marginBottom:8}}>Chave de API Anthropic</div>
            <p style={{fontSize:14,color:C.inkF,lineHeight:1.6,marginBottom:10}}>
              Crie sua chave em <a href="https://console.anthropic.com" target="_blank" style={{color:C.accent}}>console.anthropic.com</a>.
            </p>
            <input
              type="password"
              style={fi}
              placeholder="sk-ant-..."
              value={apiKey}
              onChange={e=>setKey(e.target.value)}
            />
          </div>

          <div>
            <div style={{...lb,marginBottom:8}}>Chave de API OpenAI <span style={{fontSize:10,color:C.inkF,textTransform:"none",letterSpacing:0,fontWeight:400}}>(para busca semântica no modo básico)</span></div>
            <p style={{fontSize:14,color:C.inkF,lineHeight:1.6,marginBottom:10}}>
              Crie sua chave em <a href="https://platform.openai.com/api-keys" target="_blank" style={{color:C.accent}}>platform.openai.com/api-keys</a>. Opcional — sem ela o modo básico usa busca por keywords.
            </p>
            <input
              type="password"
              style={fi}
              placeholder="sk-..."
              value={openaiKey}
              onChange={e=>setOpenaiKey(e.target.value)}
            />
          </div>

          <div>
            <div style={{...lb,marginBottom:8}}>Pasta da biblioteca</div>
            <p style={{fontSize:14,color:C.inkF,lineHeight:1.6,marginBottom:10}}>
              Escolha a pasta onde seus livros, notas e conversas serão salvos.
            </p>
            <button
              onClick={pick}
              style={{
                display:"flex",alignItems:"center",gap:9,padding:"10px 18px",
                border:`1px solid ${dir?C.accentBrd:C.border}`,
                borderRadius:7,cursor:"pointer",background:"none",
                color:dir?C.accent:C.inkD,fontSize:14,fontWeight:600
              }}
            >
              <Ico d={D.folder} sz={16}/>{dir?`✓ ${dirName}`:"Escolher pasta…"}
            </button>
            {err && <p style={{fontSize:13,color:C.red,marginTop:8}}>{err}</p>}
          </div>

          <button disabled={!ready} onClick={finish} style={{...bP(!ready),fontSize:15,padding:"12px",marginTop:4}}>
            Abrir Mynd Library →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── ProfileSwitcher ──────────────────────────────────

function ProfileSwitcher({userName,onSwitch,profiles=[]}){
  const [open,setOpen]=useState(false);
  const [custom,setCustom]=useState("");
  const options=Array.from(new Set([...(profiles||[]), userName].filter(Boolean)));

  return(
    <div style={{position:"relative"}}>
      <button
        onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.18)",borderRadius:6,padding:"5px 10px",cursor:"pointer",color:C.sbInk,fontSize:12,fontWeight:600}}
      >
        <Ico d={D.user} sz={12} col={C.sbInk}/>
        <span>{userName}</span>
        <Ico d={D.chevDown} sz={11} col={C.sbInk}/>
      </button>

      {open && (
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:"#1e3554",border:"1px solid #2d4a6e",borderRadius:9,padding:"8px 0",minWidth:190,zIndex:100,boxShadow:"0 10px 30px rgba(0,0,0,.45)"}}>
          {options.map(p=>(
            <button
              key={p}
              onClick={()=>{onSwitch(p); setOpen(false);}}
              style={{width:"100%",textAlign:"left",padding:"9px 16px",background:p===userName?"rgba(255,255,255,.12)":"none",border:"none",cursor:"pointer",color:C.sbInk,fontSize:13,fontWeight:500}}
            >
              {p}
            </button>
          ))}

          <div style={{borderTop:"1px solid #2d4a6e",margin:"6px 0"}}/>

          <div style={{padding:"6px 12px"}}>
            <input
              value={custom}
              onChange={e=>setCustom(e.target.value)}
              placeholder="Novo perfil…"
              style={{width:"100%",background:"rgba(0,0,0,.25)",border:"1px solid #2d4a6e",borderRadius:5,padding:"6px 10px",color:C.sbInk,fontSize:13,outline:"none"}}
              onKeyDown={e=>{
                if(e.key==="Enter" && custom.trim()){
                  onSwitch(custom.trim());
                  setCustom("");
                  setOpen(false);
                }
              }}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────

function Sidebar({
  dirHandle,
  userName,
  profiles,
  switchProfile,
  screen,
  setScreen,
  openGlobal,
  openConnections,
  searchDraft,
  setSearchDraft,
  tagDraft,
  setTagDraft,
  allTags,
  selectedCategory,
  setSelectedCategory,
  cats,
  catCounts,
  books,
  filteredBooks,
  selBook,
  openBook,
  clearFilters,
  hasActiveFilter,
  setModal,
  fileRef,
  handleFilePick,
  onDeleteBook,
  onEditBook,
  onLogoff
}){
  const booksScrollRef=useRef(null);
  const [sortKey,setSortKey]=useState("addedAt");
  const [showSortMenu,setShowSortMenu]=useState(false);

  const sortedBooks=useMemo(()=>{
    const arr=[...filteredBooks];
    arr.sort((a,b)=>{
      let av=a[sortKey]||"", bv=b[sortKey]||"";
      if(typeof av==="string") av=av.toLocaleLowerCase("pt-BR");
      if(typeof bv==="string") bv=bv.toLocaleLowerCase("pt-BR");
      if(sortKey==="addedAt") return av>bv?-1:av<bv?1:0;
      return av>bv?1:av<bv?-1:0;
    });
    return arr;
  },[filteredBooks,sortKey]);

  return(
    <aside
      className="sidebar-shell"
      style={{
        width:296,
        minWidth:296,
        background:C.sb,
        borderRight:`1px solid ${C.sbBorder}`,
        display:"flex",
        flexDirection:"column",
        overflow:"hidden"
      }}
    >
      <div style={{padding:"16px 14px 12px",borderBottom:`1px solid ${C.sbBorder}`,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,gap:8}}>
          <div style={{fontSize:19,fontWeight:700,color:C.sbInk,display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>
            <Ico d={D.book} sz={17} col={C.sbInk}/> Mynd Library
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <ProfileSwitcher userName={userName} onSwitch={switchProfile} profiles={profiles}/>
            <button
              title="Sair / Trocar pasta"
              onClick={onLogoff}
              style={{background:"none",border:"1px solid rgba(255,255,255,.18)",borderRadius:6,padding:"5px 7px",cursor:"pointer",color:"rgba(255,255,255,.62)",display:"flex",alignItems:"center",transition:"color .15s, border-color .15s"}}
              onMouseEnter={e=>{ e.currentTarget.style.color="#fff"; e.currentTarget.style.borderColor="rgba(255,255,255,.5)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.color="rgba(255,255,255,.62)"; e.currentTarget.style.borderColor="rgba(255,255,255,.18)"; }}
            >
              <Ico d={D.logoff} sz={13} col="currentColor"/>
            </button>
          </div>
        </div>
      </div>

      <div style={{padding:"10px 10px 8px",borderBottom:`1px solid ${C.sbBorder}`,flexShrink:0}}>
        {[
          {id:"home",label:"Página inicial",icon:D.home,fn:()=>setScreen("home")},
          {id:"global",label:"Pesquisa na biblioteca",icon:D.globe,fn:openGlobal},
          {id:"connections",label:"Conexões",icon:D.link,fn:openConnections},
          {id:"insights",label:"Insights",icon:D.insights,fn:()=>setScreen("insights")},
        ].map(({id,label,icon,fn})=>(
          <button
            key={id}
            onClick={fn}
            style={{
              width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 10px",marginBottom:3,
              borderRadius:7,cursor:"pointer",border:"none",textAlign:"left",fontSize:13,
              fontWeight:screen===id?700:500,background:screen===id?C.sbSurf:"none",
              color:screen===id?C.sbInk:C.sbInkD
            }}
          >
            <Ico d={icon} sz={15} col={C.sbInk}/>{label}
          </button>
        ))}
      </div>

      <div style={{padding:"10px 11px 8px",borderBottom:`1px solid ${C.sbBorder}`,flexShrink:0}}>
        <div style={{...sbLb,marginBottom:7,display:"flex",alignItems:"center",gap:6}}>
          <Ico d={D.search} sz={10}/> Pesquisar um livro
        </div>

        <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(0,0,0,.2)",border:`1px solid ${searchDraft.trim()?"rgba(255,255,255,.45)":C.sbBorder}`,borderRadius:6,padding:"7px 10px",marginBottom:10}}>
          <Ico d={D.search} sz={13} col={C.sbInk}/>
          <input
            value={searchDraft}
            onChange={e=>setSearchDraft(e.target.value)}
            placeholder="Título ou autor…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:C.sbInk,fontSize:13,minWidth:0}}
          />
          {searchDraft && (
            <button onClick={()=>setSearchDraft("")} style={{background:"none",border:"none",cursor:"pointer",color:C.sbInk,display:"flex"}}>
              <Ico d={D.close} sz={12}/>
            </button>
          )}
        </div>

        <div style={{...sbLb,marginBottom:6,display:"flex",alignItems:"center",gap:4}}>
          <Ico d={D.tag} sz={10}/> Pesquisa por tag
        </div>

        <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(0,0,0,.2)",border:`1px solid ${tagDraft.trim()?"rgba(255,255,255,.45)":C.sbBorder}`,borderRadius:6,padding:"7px 10px",marginBottom:8}}>
          <Ico d={D.tag} sz={13} col={C.sbInk}/>
          <input
            value={tagDraft}
            onChange={e=>setTagDraft(e.target.value)}
            placeholder="Digite uma tag…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:C.sbInk,fontSize:13,minWidth:0}}
          />
          {tagDraft && (
            <button onClick={()=>setTagDraft("")} style={{background:"none",border:"none",cursor:"pointer",color:C.sbInk,display:"flex"}}>
              <Ico d={D.close} sz={12}/>
            </button>
          )}
        </div>

        {allTags.length > 0 && (
          <div style={{marginBottom:10}}>
            <div style={{...sbLb,marginBottom:6,display:"flex",alignItems:"center",gap:4}}>
              <Ico d={D.tag} sz={10}/> Tags disponíveis
            </div>
            <div className="inner-scroll" style={{display:"flex",flexWrap:"wrap",gap:5,maxHeight:82,overflowY:"auto",overflowX:"hidden"}}>
              {allTags.map(t=>{
                const active = tagDraft.toLowerCase()===t.toLowerCase();
                return (
                  <button
                    key={t}
                    onClick={()=>setTagDraft(active ? "" : t)}
                    style={{
                      fontSize:11,padding:"2px 8px",borderRadius:10,cursor:"pointer",
                      border:`1px solid ${active?"rgba(255,255,255,.75)":"rgba(255,255,255,.28)"}`,
                      background:active?"rgba(255,255,255,.18)":"rgba(255,255,255,.08)",
                      color:C.sbInk,fontWeight:600
                    }}
                  >
                    {t}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        <div style={{marginRight:-11,paddingRight:0}}>
          <div style={{...sbLb,marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between",paddingRight:8}}>
            <span style={{display:"flex",alignItems:"center",gap:4}}><Ico d={D.list} sz={10}/> Categorias</span>
            <button onClick={()=>setModal({type:"cats"})} title="Gerenciar categorias" style={{background:"none",border:"none",cursor:"pointer",color:C.sbInk,display:"flex",padding:0,lineHeight:1}}>
              <Ico d={D.edit} sz={11}/>
            </button>
          </div>

          <div
            className="inner-scroll"
            style={{display:"flex",flexDirection:"column",gap:1,maxHeight:170,overflowY:"auto",overflowX:"hidden"}}
          >
            {["Todas", ...cats].map(cat=>{
              const active = (cat==="Todas" && !selectedCategory) || (cat!=="Todas" && selectedCategory===cat);
              const count = cat==="Todas" ? books.length : (catCounts[cat] || 0);
              return (
                <button
                  key={cat}
                  onClick={()=>{
                    if(cat==="Todas"){
                      setSelectedCategory("");
                      return;
                    }
                    if(selectedCategory===cat) return;
                    setSelectedCategory(cat);
                  }}
                  style={{
                    display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"5px 9px",borderRadius:6,cursor:"pointer",border:"none",
                    background:active ? C.sbSurf : "none",
                    color:active ? C.sbInk : C.sbInkD,
                    fontSize:12,textAlign:"left",fontWeight:cat==="Todas" ? 700 : 500,
                    width:"100%"
                  }}
                >
                  <span>{cat}</span>
                  <span style={{fontSize:10,color:C.sbInkF}}>
                    {count===0 ? "–" : count}
                  </span>
                </button>
              );

          </div>
        </div>

        {hasActiveFilter && (
          <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.sbBorder}`}}>
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.18)",borderRadius:6,padding:"6px 10px"}}>
              <span style={{fontSize:12,color:C.sbInk,flex:1}}>
                {[searchDraft.trim() && `Busca: ${searchDraft}`, tagDraft.trim() && `Tag: ${tagDraft}`, selectedCategory && `Categoria: ${selectedCategory}`].filter(Boolean).join(" | ")}
              </span>
              <button onClick={clearFilters} style={{background:"none",border:"none",cursor:"pointer",color:C.sbInk,display:"flex"}}>
                <Ico d={D.close} sz={12}/>
              </button>
            </div>
          </div>
        )}
      </div>

      <div style={{padding:"8px 11px 4px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{...sbLb,display:"flex",alignItems:"center",gap:4}}>
            <Ico d={D.book} sz={10}/> Biblioteca
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {hasActiveFilter && filteredBooks.length !== books.length && (
              <span style={{fontSize:10,color:C.sbInkF,fontWeight:600}}>
                {filteredBooks.length} de {books.length}
              </span>
            )}
            <div style={{position:"relative"}}>
              <button
                onClick={()=>setShowSortMenu(p=>!p)}
                title="Ordenar biblioteca"
                style={{background:"none",border:"none",cursor:"pointer",color:C.sbInk,display:"flex",padding:2}}
              >
                <Ico d={D.list} sz={11}/>
              </button>
              {showSortMenu && (
                <div style={{
                  position:"absolute",right:0,top:"calc(100% + 4px)",
                  background:"#1e3554",border:"1px solid #2d4a6e",
                  borderRadius:8,padding:"4px 0",zIndex:100,
                  boxShadow:"0 8px 24px rgba(0,0,0,.4)",minWidth:160
                }}>
                  {[
                    {id:"addedAt", label:"Data de inclusão"},
                    {id:"title",   label:"Alfabético"},
                    {id:"author",  label:"Autor"},
                    {id:"category",label:"Categoria"}
                  ].map(({id,label})=>(
                    <button
                      key={id}
                      onClick={()=>{ setSortKey(id); setShowSortMenu(false); }}
                      style={{
                        width:"100%",textAlign:"left",padding:"8px 14px",
                        background:sortKey===id?"rgba(255,255,255,.1)":"none",
                        border:"none",cursor:"pointer",
                        color:C.sbInk,fontSize:12,fontWeight:sortKey===id?700:500
                      }}
                    >
                      {sortKey===id ? "✓ " : "   "}{label}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      <div ref={booksScrollRef} className="inner-scroll" style={{flex:1,minHeight:0,overflowY:"auto",padding:"6px 0 12px 9px"}}>
        {sortedBooks.map((b)=>{
          const isActive = selBook?.id===b.id && screen==="book";
          return (
            <div
              key={b.id}
              onClick={()=>{
                if(isActive){
                  setScreen("home");
                  return;
                }
                openBook(b);
              }}
              style={{
                display:"flex",alignItems:"stretch",gap:7,padding:"7px 9px 7px 7px",borderRadius:8,cursor:"pointer",
                border:`1px solid ${isActive ? "rgba(255,255,255,.28)" : "transparent"}`,
                background:isActive ? C.sbSurfStrong : "none",
                marginBottom:2,
                boxShadow:isActive ? "inset 0 0 0 1px rgba(255,255,255,.05)" : "none",
                transition:"background .18s ease, border-color .18s ease, opacity .18s ease",
                opacity:1
              }}
              onMouseEnter={e=>{
                if(!isActive) e.currentTarget.style.background = "rgba(255,255,255,.05)";
              }}
              onMouseLeave={e=>{
                if(!isActive) e.currentTarget.style.background = "none";
              }}
            >
              <div style={{width:5,minWidth:5,borderRadius:3,background:spineC(b.id)}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                  <div
                    style={{
                      flex:1,
                      minWidth:0,
                      fontSize:12.5,
                      fontWeight:600,
                      color:C.sbInk,
                      lineHeight:1.3,
                      overflow:"hidden",
                      display:"-webkit-box",
                      WebkitLineClamp:2,
                      WebkitBoxOrient:"vertical"
                    }}
                  >
                    {b.title}
                  </div>

                  <div
                    style={{
                      fontSize:10.5,
                      color:C.sbInkF,
                      whiteSpace:"nowrap",
                      flexShrink:0,
                      paddingTop:1
                    }}
                  >
                    {b.pages ? `${b.pages} pág.` : "—"}
                  </div>
                </div>

                {b.author && (
                  <div style={{fontSize:11.5,color:C.sbInkD,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {b.author}
                  </div>
                )}

                <div style={{marginTop:4,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",minWidth:0}}>
                    {b.category && <div style={{fontSize:10,color:C.sbInkF}}>{b.category}</div>}
                    {b._hasNotes && <div style={{fontSize:10,color:"#c7e4ff"}}>Notas</div>}
                    {(()=>{ const _b = (selBook?.id===b.id ? selBook : b); const _s = deriveBookStatus(_b).state; return(<>
                      {_s === "preparando" && <div style={{fontSize:10,color:"#c4962a",animation:"bob .9s infinite"}}>⟳</div>}
                      {_s === "atencao"    && <div style={{fontSize:10,color:"#e07070"}}>✗</div>}
                    </>); })()}
                  </div>

                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    <button
                      onClick={(e)=>{
                        e.stopPropagation();
                        onEditBook(b);
                      }}
                      style={{
                        background:"none",
                        border:"1px solid rgba(255,255,255,.16)",
                        color:"rgba(255,255,255,.72)",
                        padding:"4px 6px",
                        borderRadius:5,
                        cursor:"pointer",
                        display:"flex",
                        alignItems:"center",
                        transition:"background .15s, color .15s, border-color .15s"
                      }}
                      onMouseEnter={e=>{
                        e.currentTarget.style.background = "rgba(255,255,255,.12)";
                        e.currentTarget.style.borderColor = "rgba(255,255,255,.4)";
                        e.currentTarget.style.color = "#fff";
                      }}
                      onMouseLeave={e=>{
                        e.currentTarget.style.background = "none";
                        e.currentTarget.style.borderColor = "rgba(255,255,255,.16)";
                        e.currentTarget.style.color = "rgba(255,255,255,.72)";
                      }}
                    >
                      <Ico d={D.edit} sz={11} col="currentColor"/>
                    </button>

                    <button
                      onClick={(e)=>{
                        e.stopPropagation();
                        onDeleteBook(b);
                      }}
                      style={{
                        background:"none",
                        border:"1px solid rgba(255,255,255,.16)",
                        color:"rgba(255,255,255,.72)",
                        padding:"4px 6px",
                        borderRadius:5,
                        cursor:"pointer",
                        display:"flex",
                        alignItems:"center",
                        transition:"background .15s, color .15s, border-color .15s"
                      }}
                      onMouseEnter={e=>{
                        e.currentTarget.style.background = "rgba(200,50,50,.25)";
                        e.currentTarget.style.borderColor = "rgba(220,80,80,.6)";
                        e.currentTarget.style.color = "#ff9090";
                      }}
                      onMouseLeave={e=>{
                        e.currentTarget.style.background = "none";
                        e.currentTarget.style.borderColor = "rgba(255,255,255,.16)";
                        e.currentTarget.style.color = "rgba(255,255,255,.72)";
                      }}
                    >
                      <Ico d={D.trash} sz={11} col="currentColor"/>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}

        {!sortedBooks.length && (
          <p style={{fontSize:13,color:C.sbInkF,padding:"10px 4px"}}>
            {books.length===0 ? "Nenhum livro ainda." : "Sem resultados."}
          </p>
        )}
      </div>

      <div style={{padding:"12px",borderTop:`1px solid ${C.sbBorder}`,background:C.sb,flexShrink:0}}>
        <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={handleFilePick}/>
        <button
          onClick={()=>fileRef.current?.click()}
          style={{
            width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:7,
            padding:"11px 12px",border:"1px solid rgba(255,255,255,.18)",borderRadius:8,cursor:"pointer",
            color:C.sbInk,fontSize:13,fontWeight:700,background:"rgba(255,255,255,.08)"
          }}
        >
          <Ico d={D.up} sz={15}/> Adicionar livro (PDF)
        </button>
      </div>
    </aside>
  );
}

// ─── ConnectionsPage ──────────────────────────────────

function ConnectionsPage({
  conceptsIndex, conceptsLoading, conceptsProcessing,
  selConcept, conceptDetail, conceptDetailLoading,
  books, onOpenConcept, onBack, onUpdate, onReprocessAll
}){
  const [search, setSearch] = useState("");

  // Lista ordenada por número de livros, depois alfabética
  const sortedConcepts = useMemo(()=>{
    return Object.entries(conceptsIndex)
      .filter(([c]) => !search.trim() || c.includes(search.toLowerCase().trim()))
      .sort((a,b) => {
        const diff = (b[1].books?.length||0) - (a[1].books?.length||0);
        return diff !== 0 ? diff : a[0].localeCompare(b[0],"pt-BR");
      });
  },[conceptsIndex, search]);

  const bookMap = useMemo(()=>{
    const m={};
    books.forEach(b=>m[b.id]=b);
    return m;
  },[books]);

  // ── Detalhe do conceito ──
  if(selConcept){
    const entry = conceptsIndex[selConcept];
    const relatedBooks = (entry?.books||[]).map(id=>bookMap[id]).filter(Boolean);

    return(
      <div className="inner-scroll" style={{flex:1,overflowY:"auto",padding:"28px 40px"}}>
        <button style={{...bG,marginBottom:20,display:"flex",alignItems:"center",gap:6,fontSize:13}} onClick={onBack}>
          <Ico d={D.back} sz={13}/> Conexões
        </button>

        <div style={{fontSize:30,fontWeight:700,color:C.ink,marginBottom:6,textTransform:"capitalize"}}>
          {selConcept}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:24}}>
          <span style={{fontSize:13,color:C.inkF}}>{relatedBooks.length} {relatedBooks.length===1?"livro":"livros"}</span>
          {relatedBooks.map(b=>(
            <span key={b.id} style={{...tp,fontSize:11}}>{b.title}</span>
          ))}
        </div>

        {conceptDetailLoading ? (
          <div style={{display:"flex",gap:8,alignItems:"center",color:C.inkF,fontSize:14,padding:"20px 0"}}>
            <span style={{animation:"bob .9s infinite"}}>✦</span> Gerando síntese…
          </div>
        ) : conceptDetail ? (
          <>
            {/* Síntese persistente — bloco principal */}
            {conceptDetail.synthesis && (
              <div style={{background:C.surf,border:`1px solid ${C.border}`,borderRadius:12,padding:"22px 26px",marginBottom:24}}>
                <div style={{...lb,marginBottom:12,color:C.gold,display:"flex",alignItems:"center",gap:5}}>
                  <Ico d={D.note} sz={11}/> Síntese da biblioteca
                </div>
                <p style={{fontSize:15,color:C.inkD,lineHeight:1.8}}>{sanitizeSynthesisText(conceptDetail.synthesis)}</p>
              </div>
            )}

            {/* Livros relacionados */}
            <div style={{marginBottom:24}}>
              <div style={{...lb,marginBottom:12,display:"flex",alignItems:"center",gap:5}}>
                <Ico d={D.book} sz={11}/> Livros relacionados
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {relatedBooks.map(b=>(
                  <div key={b.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px"}}>
                    <div style={{fontSize:15,fontWeight:600,color:C.ink}}>{b.title}</div>
                    {b.author && <div style={{fontSize:13,color:C.inkF,marginTop:2}}>{b.author}</div>}
                  </div>
                ))}
              </div>
            </div>

            {/* Conexões entre livros */}
            {conceptDetail.connections && relatedBooks.length > 1 && (
              <div style={{marginBottom:24}}>
                <div style={{...lb,marginBottom:12,display:"flex",alignItems:"center",gap:5}}>
                  <Ico d={D.link} sz={11}/> Conexões entre livros
                </div>
                <div style={{background:C.surf,border:`1px solid ${C.accentBrd}`,borderRadius:10,padding:"16px 20px"}}>
                  <p style={{fontSize:14,color:C.inkD,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{conceptDetail.connections}</p>
                </div>
              </div>
            )}

            {/* Trechos relevantes removidos — uso interno apenas */}
          </>
        ) : (
          <p style={{color:C.inkF,fontStyle:"italic"}}>Não foi possível gerar o detalhe deste conceito.</p>
        )}
      </div>
    );
  }

  // ── Lista de conceitos ──
  return(
    <div className="inner-scroll" style={{flex:1,overflowY:"auto",padding:"36px 40px"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,flexWrap:"wrap",marginBottom:24}}>
        <div>
          <h1 style={{fontSize:32,fontWeight:700,color:C.ink,lineHeight:1}}>Conexões</h1>
          <p style={{fontSize:15,color:C.inkF,marginTop:8}}>
            Conceitos extraídos da sua biblioteca e como se conectam entre livros.
          </p>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          {conceptsProcessing && (
            <span style={{fontSize:13,color:C.gold,display:"flex",alignItems:"center",gap:5}}>
              <span style={{animation:"bob .9s infinite"}}>⟳</span> Processando conceitos…
            </span>
          )}
          <button
            onClick={onUpdate}
            disabled={conceptsProcessing}
            style={{...bP(conceptsProcessing),fontSize:13,padding:"8px 14px",display:"flex",alignItems:"center",gap:6}}
          >
            <Ico d={D.check} sz={13} col={conceptsProcessing?"#999":C.surf}/> Atualizar conceitos
          </button>
          <button
            onClick={onReprocessAll}
            disabled={conceptsProcessing}
            style={{background:"none",border:"none",cursor:conceptsProcessing?"not-allowed":"pointer",color:C.inkF,fontSize:12,textDecoration:"underline",padding:"4px 0"}}
          >
            Reprocessar tudo
          </button>
        </div>
      </div>

      {/* Busca */}
      <div style={{display:"flex",alignItems:"center",gap:8,background:C.surf,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",marginBottom:24,maxWidth:400}}>
        <Ico d={D.search} sz={14} col={C.inkF}/>
        <input
          value={search}
          onChange={e=>setSearch(e.target.value)}
          placeholder="Filtrar conceitos…"
          style={{flex:1,background:"none",border:"none",outline:"none",color:C.ink,fontSize:14}}
        />
        {search && <button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:C.inkF,display:"flex"}}><Ico d={D.close} sz={12}/></button>}
      </div>

      {conceptsLoading ? (
        <div style={{color:C.inkF,fontSize:14,padding:"20px 0"}}>Carregando conceitos…</div>
      ) : sortedConcepts.length === 0 ? (
        <div style={{color:C.inkF,fontSize:14,fontStyle:"italic",padding:"20px 0"}}>
          {Object.keys(conceptsIndex).length === 0
            ? "Nenhum conceito extraído ainda. Clique em \"Atualizar conceitos\" para começar."
            : "Nenhum conceito encontrado para este filtro."
          }
        </div>
      ) : (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
          {sortedConcepts.map(([concept, entry])=>(
            <button
              key={concept}
              onClick={()=>onOpenConcept(concept)}
              style={{
                textAlign:"left",background:C.surf,border:`1px solid ${C.border}`,borderRadius:10,
                padding:"16px 18px",cursor:"pointer",transition:"border-color .15s,box-shadow .15s",
                minHeight:140,display:"flex",flexDirection:"column",justifyContent:"flex-start"
              }}
              onMouseEnter={e=>{
                e.currentTarget.style.borderColor = C.accentBrd;
                e.currentTarget.style.boxShadow = `0 4px 16px rgba(45,107,228,.08)`;
              }}
              onMouseLeave={e=>{

// ─── InsightsPage ─────────────────────────────────────

function InsightsPage({ insights, insightEmbeddings, openaiKey, cats, profiles }){
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("");
  const [filterProfile, setFilterProfile] = useState("");
  const [searching, setSearching] = useState(false);
  const [results, setResults] = useState(null); // null = sem busca ativa

  const availableCats = useMemo(()=>[...new Set(insights.map(i=>i.bookCategory).filter(Boolean))],[insights]);
  const availableProfiles = useMemo(()=>[...new Set(insights.map(i=>i.profileId).filter(Boolean))],[insights]);

  // Filtra base por categoria e perfil
  const baseFiltered = useMemo(()=>{
    return insights.filter(ins=>{
      if(filterCat && ins.bookCategory !== filterCat) return false;
      if(filterProfile && ins.profileId !== filterProfile) return false;
      return true;
    });
  },[insights, filterCat, filterProfile]);

  const displayed = results !== null ? results : baseFiltered;

  const doSearch = async()=>{
    const q = search.trim();
    if(!q){ setResults(null); return; }
    setSearching(true);

    // Busca textual base
    const textFiltered = searchInsightsText(baseFiltered, q);

    // Reordena semanticamente se tiver OpenAI key e embeddings
    if(openaiKey && Object.keys(insightEmbeddings).length > 0){
      try{
        const qEmb = await generateEmbedding(q, openaiKey);
        const reordered = reorderInsightsBySemantic(textFiltered, insightEmbeddings, qEmb);
        setResults(reordered);
      }catch{
        setResults(textFiltered);
      }
    } else {
      setResults(textFiltered);
    }
    setSearching(false);
  };

  return(
    <div className="inner-scroll" style={{flex:1, overflowY:"auto", padding:"36px 40px"}}>
      <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:24, gap:16, flexWrap:"wrap"}}>
        <div>
          <h1 style={{fontSize:32, fontWeight:700, color:C.ink, lineHeight:1}}>Insights</h1>
          <p style={{fontSize:15, color:C.inkF, marginTop:8}}>
            Respostas salvas da sua biblioteca. {insights.length} insight{insights.length!==1?"s":""} no total.
          </p>
        </div>
      </div>

      {/* Filtros + Busca */}
      <div style={{display:"flex", gap:10, marginBottom:24, flexWrap:"wrap", alignItems:"center"}}>
        {availableCats.length > 1 && (
          <select
            value={filterCat}
            onChange={e=>{ setFilterCat(e.target.value); setResults(null); }}
            style={{fontSize:13, padding:"6px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.surf, color:C.ink, outline:"none", cursor:"pointer"}}
          >
            <option value="">Todas as categorias</option>
            {availableCats.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        )}
        {availableProfiles.length > 1 && (
          <select
            value={filterProfile}
            onChange={e=>{ setFilterProfile(e.target.value); setResults(null); }}
            style={{fontSize:13, padding:"6px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.surf, color:C.ink, outline:"none", cursor:"pointer"}}
          >
            <option value="">Todos os perfis</option>
            {availableProfiles.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        )}
        <div style={{flex:1, minWidth:240, display:"flex", gap:8, alignItems:"center", background:C.surf, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 12px"}}>
          <Ico d={D.search} sz={14} col={C.inkF}/>
          <input
            value={search}
            onChange={e=>{ setSearch(e.target.value); if(!e.target.value.trim()) setResults(null); }}
            onKeyDown={e=>{ if(e.key==="Enter") doSearch(); }}
            placeholder="Buscar insights…"
            style={{flex:1, background:"none", border:"none", outline:"none", color:C.ink, fontSize:14}}
          />
          {search && <button onClick={()=>{ setSearch(""); setResults(null); }} style={{background:"none",border:"none",cursor:"pointer",color:C.inkF,display:"flex"}}><Ico d={D.close} sz={12}/></button>}
        </div>
        <button
          onClick={doSearch}
          disabled={!search.trim() || searching}
          style={{...bP(!search.trim()||searching), fontSize:13, padding:"6px 16px"}}
        >
          {searching ? "Buscando…" : "Buscar"}
        </button>
      </div>

      {/* Lista */}
      {insights.length === 0 ? (
        <div style={{color:C.inkF, fontSize:14, fontStyle:"italic"}}>
          Nenhum insight salvo ainda. Clique no ♡ em qualquer resposta da IA para salvar.
        </div>
      ) : displayed.length === 0 ? (
        <div style={{color:C.inkF, fontSize:14, fontStyle:"italic"}}>Nenhum insight encontrado.</div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:12}}>
          {displayed.map(ins=>(
            <div key={ins.id} style={{background:C.surf, border:`1px solid ${C.border}`, borderRadius:10, padding:"16px 20px"}}>
              <div style={{fontSize:14, color:C.inkD, lineHeight:1.75, marginBottom:10}}>
                {ins.answerText}
              </div>
              <div style={{display:"flex", alignItems:"center", gap:10, flexWrap:"wrap"}}>
                <span style={{fontSize:12, fontWeight:600, color:C.ink}}>{ins.bookTitle}</span>
                {ins.bookAuthor && <span style={{fontSize:12, color:C.inkF}}>· {ins.bookAuthor}</span>}
                {ins.bookCategory && (()=>{ const c=catStyle(ins.bookCategory); return <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:c.bg,color:c.ink,border:`1px solid ${c.brd}`,fontWeight:600}}>{ins.bookCategory}</span>; })()}
                <span style={{fontSize:11, color:C.inkF, marginLeft:"auto"}}>{ins.profileId} · {new Date(ins.savedAt).toLocaleDateString("pt-BR")}</span>

      )}
    </div>
  );
}

  const [tagQuery,setTagQuery] = useState("");
  const [tagDraft,setTagDraft] = useState("");
  const [selectedCategory,setSelectedCategory] = useState("");
  const [modal,setModal] = useState(null);
  const [editBook,setEditBook] = useState(null);

  useEffect(()=>{ editBookRef.current = editBook; }, [editBook]);
  const [wishModal,setWishModal] = useState(false);
  const [wishEdit,setWishEdit] = useState(null);
  const [pendingFile,setPendingFile] = useState(null);
  const [uploading,setUploading] = useState(false);
  const [upProg,setUpProg] = useState(0);
  const [upErr,setUpErr] = useState("");
  const [uploadQualityAlert,setUploadQualityAlert] = useState("");
  const [userName,setUserName] = useState(initUser);
  const [openaiKey] = useState(initOpenaiKey || ""); // chave OpenAI (read-only após init)
  const [lastBook,setLastBook] = useState(null);
  const [toasts,setToasts] = useState([]);
  const fileRef=useRef();

  const otherProfiles=useMemo(()=>profiles.filter(p=>p!==userName),[profiles,userName]);

  const pushToast=useCallback((text)=>{
    const id=uid();
    setToasts(prev=>[...prev,{id,text}]);
    setTimeout(()=>{
      setToasts(prev=>prev.filter(t=>t.id!==id));
    },2600);
  },[]);

  const removeToast=useCallback((id)=>{
    setToasts(prev=>prev.filter(t=>t.id!==id));
  },[]);

  useEffect(()=>{
    (async()=>{
      const [idx,st,files] = await Promise.all([
        loadIdx(dirHandle),
        loadStats(dirHandle),
        listDirFiles(dirHandle)
      ]);

      const validSet = new Set(idx.categories || []);
      const booksWithMeta=(idx.books || []).map(book=>{
        const fixedCategory = normalizeCategory(book.category);
        const hasNotes = files.some(name=>name.startsWith(`${book.id}_notes_`));
        const hasChats = files.some(name=>name.startsWith(`${book.id}_chats_`));
        return {
          ...book,
          tags: normalizeTags(book.tags),
          category: validSet.has(fixedCategory) ? fixedCategory : "",
          embeddingsStatus: book.embeddingsStatus ?? "pending",
          synopsisStatus: book.synopsisStatus ?? "pending",
          conceptsStatus: book.conceptsStatus ?? "pending",
          _hasNotes:hasNotes,
          _hasChats:hasChats
        };
      });

      setBooks(booksWithMeta);
      setCats(idx.categories || [...DEF_CATS]);
      setWishlist(idx.wishlist || []);
      setProfiles(idx.profiles || []);
      setStats(st);

      // Carrega insights do perfil atual
      const ins = await loadInsights(dirHandle, initUser);
      const insEmbs = await loadInsightEmbeddings(dirHandle, initUser);
      setInsights(ins);
      setInsightEmbeddings(insEmbs);
      setInsightsLoaded(true);

      const lastId=localStorage.getItem("mynd_lastBook");
      if(lastId){
        const found=booksWithMeta.find(x=>x.id===lastId);
        if(found) setLastBook(found);
        else localStorage.removeItem("mynd_lastBook");
      }
    })();
  },[dirHandle]);

  useEffect(()=>{
    setGlobalTexts(null);
  },[books]);

  useEffect(()=>{
    const t = debounceValue(searchDraft, 160, setSearchQ);
    return ()=>clearTimeout(t);
  },[searchDraft]);

  useEffect(()=>{
    setTagQuery(tagDraft);
  },[tagDraft]);

  const persistQueueRef = useRef(Promise.resolve());

  const persist=async(nextBooks=books,nextCats=cats,nextWishlist=wishlist,nextProfiles=profiles)=>{
    const normalizedCats = normalizeCategories(nextCats);
    const validSet = new Set(normalizedCats);

    const booksToStore=nextBooks.map(({_hasNotes,_hasChats,...rest})=>({
      ...rest,
      tags: normalizeTags(rest.tags),
      category: validSet.has(normalizeCategory(rest.category)) ? normalizeCategory(rest.category) : ""
    }));

    const data = {
      books:booksToStore,
      categories:normalizedCats,
      wishlist:nextWishlist,
      profiles:nextProfiles
    };

    return new Promise((resolve, reject) => {
      persistQueueRef.current = persistQueueRef.current
        .then(() => saveIdx(dirHandle, data))
        .then(resolve)
        .catch(e => { console.warn("persist falhou:", e.message); resolve(); });
    });
  };

  const ensureProfileSaved=async(name)=>{
    const trimmed=(name||"").trim();
    if(!trimmed) return;
    if(profiles.includes(trimmed)) return;
    const next=uniqueCaseInsensitive([...profiles,trimmed]);
    setProfiles(next);
    await persist(books,cats,wishlist,next);
  };

  const bumpStat=async(bookId)=>{
    setStats(prev=>{
      const next={
        ...prev,
        consultations:{
          ...prev.consultations,
          [bookId]:(prev.consultations[bookId]||0)+1
        }
      };
      saveStats(dirHandle,next);
      return next;
    });
  };

  const allTags=useMemo(()=>{
    const s=new Set();
    books.forEach(b=>(b.tags||[]).forEach(t=>s.add(normalizeTagValue(t))));
    return [...s].sort((a,b)=>a.localeCompare(b,"pt-BR"));
  },[books]);

  const filteredBooks=useMemo(()=>{
    return books.filter(b=>{
      const matchesSearch = !searchQ.trim() || (
        b.title.toLowerCase().includes(searchQ.toLowerCase()) ||
        (b.author||"").toLowerCase().includes(searchQ.toLowerCase())
      );

      const matchesTag = !tagQuery.trim() || (
        (b.tags||[]).some(t=>t.toLowerCase().includes(tagQuery.toLowerCase()))
      );

      const matchesCategory = !selectedCategory || b.category === selectedCategory;

      return matchesSearch && matchesTag && matchesCategory;
    });
  },[books,searchQ,tagQuery,selectedCategory]);

  const catCounts=useMemo(()=>{
    const m={};
    books.forEach(b=>{
      if(!b.category) return;
      m[b.category]=(m[b.category]||0)+1;
    });
    return m;
  },[books]);

  const hasActiveFilter = !!searchDraft.trim() || !!tagDraft.trim() || !!selectedCategory;

  const clearFilters=()=>{
    setSearchDraft("");
    setTagDraft("");
    setSelectedCategory("");
  };

  const handleFilePick=e=>{
    const f=e.target.files?.[0];
    e.target.value="";
    if(!f) return;
    if(!f.name.toLowerCase().endsWith(".pdf")){
      alert("Apenas PDFs.");
      return;
    }
    setPendingFile(f);
    setUploadQualityAlert("");

    // Parse do nome do arquivo — detecta padrão "Autor - Título.pdf"
    const baseName = f.name.replace(/\.pdf$/i,"");
    const dashMatch = baseName.match(/^(.+?)\s*[-–—]\s*(.+)$/);
    let parsedTitle = "";
    let parsedAuthor = "";
    if(dashMatch){
      parsedAuthor = dashMatch[1].trim();
      parsedTitle  = dashMatch[2].trim();
    }else{
      parsedTitle = baseName.replace(/[-_]/g," ").trim();
    }

    setModal({
      type:"add",
      initial:{
        title: parsedTitle,
        author: parsedAuthor,
        category: cats[0] || "",
        tags:[]
      }
    });
    setUpErr("");
    setUpProg(0);
  };

  const doAdd=async(fd)=>{
    setUploading(true);
    setUpProg(10);
    setUpErr("");
    setUploadQualityAlert("");

    try{
      const normalizedCategory = normalizeCategory(fd.category);
      const nextCats = normalizedCategory && !cats.includes(normalizedCategory)
        ? [...cats, normalizedCategory]
        : cats;

      if(nextCats !== cats) setCats(nextCats);

      const {text,pages}=await extractPdf(pendingFile);
      const quality = detectPdfQuality(text, pages);
      if(quality.isSuspect){
        setUploadQualityAlert(`O PDF pode ter sido extraído com baixa qualidade. ${quality.flags.join(" | ")}`);
      }

      setUpProg(60);

      const id=uid();

      const book={
        id,
        title:trimStr(fd.title),
        author:trimStr(fd.author),
        category: nextCats.includes(normalizedCategory) ? normalizedCategory : "",
        tags:normalizeTags(fd.tags),
        pages,
        synopsis: null,
        synopsisStatus: "pending",
        embeddingsStatus: openaiKey ? "pending" : "done",
        conceptsStatus: "pending",
        addedAt:new Date().toISOString(),
        _hasNotes:false,
        _hasChats:false
      };

      await wf(dirHandle,`${id}.txt`,text);

      const pdfBuffer = await pendingFile.arrayBuffer();
      await wf(dirHandle,`${id}.pdf`, new Uint8Array(pdfBuffer));

      setUpProg(90);

      const nb=[...books,book];
      setBooks(nb);
      await persist(nb,nextCats,wishlist,profiles);

      setUpProg(100);

      // Fecha modal imediatamente
      setTimeout(()=>{
        setModal(null);
        setPendingFile(null);
        setUploading(false);
        setUpProg(0);
        setUploadQualityAlert("");
      },300);

      pushToast("Livro adicionado — processando em background…");

      // Background: sinopse + embeddings + conceitos
      setTimeout(async()=>{
        const bookId = id;
        const bookTitle = trimStr(fd.title);
        const bookAuthor = trimStr(fd.author);

        // Sinopse
        setBooks(prev=>prev.map(b=>b.id===bookId?{...b,synopsisStatus:"processing"}:b));
        try{
          const synopsis = sanitizeSynopsisText(await fetchBookSynopsis(apiKey, bookTitle, bookAuthor));
          setBooks(prev=>{
            if(!prev.find(b=>b.id===bookId)) return prev; // livro foi deletado
            const nb2=prev.map(b=>b.id===bookId?{...b,synopsis,synopsisStatus:"done"}:b);
            persist(nb2,nextCats,wishlist,profiles);
            return nb2;
          });
          if(selBookRef.current?.id===bookId) setSelBook(p=>p?{...p,synopsis,synopsisStatus:"done"}:p);
        }catch(e){
          console.warn("Sinopse falhou:",e.message);
          setBooks(prev=>prev.map(b=>b.id===bookId?{...b,synopsisStatus:"error"}:b));
          if(selBookRef.current?.id===bookId) setSelBook(p=>p?{...p,synopsisStatus:"error"}:p);
        }

        // Embeddings
        if(openaiKey){
          setBooks(prev=>prev.map(b=>b.id===bookId?{...b,embeddingsStatus:"processing"}:b));
          if(selBookRef.current?.id===bookId) setSelBook(p=>p?{...p,embeddingsStatus:"processing"}:p);
          try{
            const chunks = splitTextIntoChunks(text);
            const embs = await generateAndSaveEmbeddings(bookId, chunks, dirHandle, openaiKey, ()=>{});
            setBooks(prev=>{
              if(!prev.find(b=>b.id===bookId)) return prev; // livro foi deletado
              const nb2=prev.map(b=>b.id===bookId?{...b,embeddingsStatus:"done"}:b);
              persist(nb2,nextCats,wishlist,profiles);
              return nb2;
            });
            if(selBookRef.current?.id===bookId){
              setSelBook(p=>p?{...p,embeddingsStatus:"done"}:p);
              setBookEmbeddings(embs);
            }
            pushToast("Índice semântico gerado");
          }catch(e){
            console.warn("Embeddings falharam:",e.message);
            setBooks(prev=>prev.map(b=>b.id===bookId?{...b,embeddingsStatus:"error"}:b));
            if(selBookRef.current?.id===bookId) setSelBook(p=>p?{...p,embeddingsStatus:"error"}:p);
          }
        }

        // Conceitos
        setBooks(prev=>prev.map(b=>b.id===bookId?{...b,conceptsStatus:"processing"}:b));
        try{
          const concepts = await extractConceptsForBook(bookId, text, bookTitle, apiKey);
          if(concepts.length > 0){
            await saveBookConcepts(dirHandle, bookId, concepts);
            setBooks(prev=>{
              if(!prev.find(b=>b.id===bookId)) return prev; // livro foi deletado
              const nb2=prev.map(b=>b.id===bookId?{...b,conceptsStatus:"done"}:b);
              persist(nb2,nextCats,wishlist,profiles);
              return nb2;
            });
          } else {
            setBooks(prev=>prev.map(b=>b.id===bookId?{...b,conceptsStatus:"error"}:b));
          }
        }catch(e){
          console.warn("Conceitos falharam:",e.message);
          setBooks(prev=>prev.map(b=>b.id===bookId?{...b,conceptsStatus:"error"}:b));
        }
      }, 500);

    }catch(e){
      setUpErr("Erro: " + e.message);
      setUploading(false);
      setUpProg(0);
    }
  };

  const doDelete=async(book)=>{
    const bookInsightsCount = insights.filter(ins => ins.bookId === book.id).length;
    const confirmMsg = bookInsightsCount > 0
      ? `Remover "${book.title}"? Isso também removerá ${bookInsightsCount} insight${bookInsightsCount>1?"s":""} salvos relacionados a este livro.`
      : `Remover "${book.title}"?`;
    if(!confirm(confirmMsg)) return;

    await rmf(dirHandle,`${book.id}.txt`);
    await rmf(dirHandle,embeddingsFileName(book.id));

    const knownProfiles=Array.from(new Set([...(profiles||[]), userName].filter(Boolean)));
    for(const p of knownProfiles){
      await rmf(dirHandle,noteFileName(book.id,p));
      await rmf(dirHandle,chatFileName(book.id,p));
    }

    const names=await listDirFiles(dirHandle);
    for(const name of names){
      if(name.startsWith(`${book.id}_notes_`) || name.startsWith(`${book.id}_chats_`)){
        await rmf(dirHandle,name);
      }
    }

    // Filtra o livro e persiste diretamente (bypass da fila para garantir atomicidade)
    const nb = books.filter(b => b.id !== book.id);
    setBooks(nb);

    const normalizedCats = normalizeCategories(cats);
    const validSet = new Set(normalizedCats);
    const booksToStore = nb.map(({_hasNotes,_hasChats,...rest})=>({
      ...rest,
      tags: normalizeTags(rest.tags),
      category: validSet.has(normalizeCategory(rest.category)) ? normalizeCategory(rest.category) : ""
    }));
    await saveIdx(dirHandle, {
      books: booksToStore,
      categories: normalizedCats,
      wishlist,
      profiles
    });
    console.log("[doDelete] index.json salvo. Livros restantes:", booksToStore.map(b=>b.title));

    setStats(prev=>{
      const nextConsultations={...prev.consultations};
      delete nextConsultations[book.id];
      const next={...prev, consultations:nextConsultations};
      saveStats(dirHandle,next);
      return next;
    });

    // Remove insights relacionados a este livro (todos os perfis)
    const knownProfilesForInsights = Array.from(new Set([...(profiles||[]), userName].filter(Boolean)));
    for(const p of knownProfilesForInsights){
      const pInsights = await loadInsights(dirHandle, p);
      const relatedIds = new Set(pInsights.filter(ins=>ins.bookId===book.id).map(ins=>ins.id));
      if(relatedIds.size > 0){
        const nextIns = pInsights.filter(ins=>ins.bookId!==book.id);
        await saveInsights(dirHandle, p, nextIns);
        // Remove embeddings relacionados
        const pEmbs = await loadInsightEmbeddings(dirHandle, p);
        let changed = false;
        for(const id of relatedIds){ if(pEmbs[id]){ delete pEmbs[id]; changed=true; } }
        if(changed) await saveInsightEmbeddings(dirHandle, p, pEmbs);
        // Atualiza state se for o perfil atual
        if(p === userName){
          setInsights(nextIns);
          if(changed) setInsightEmbeddings({...pEmbs});
        }
      }
    }

    // Usa refs para garantir valores atuais (evita closure stale)
    const currentScreen  = screenRef.current;
    const currentSelBook = selBookRef.current;

    const isCurrentBook = currentSelBook?.id === book.id;
    const isLastBook = lastBook?.id === book.id;

    if(isCurrentBook){
      setSelBook(null);
      setBookText("");
      setBookEmbeddings(null);
      setBookMsgs([]);
      setChatSessions([]);
      setOtherSessions({});
      setActiveChatId(null);
      setGeneratingEmbeddings(false);
      setScreen("home");
    }

    if(isCurrentBook || isLastBook){
      setLastBook(null);
      localStorage.removeItem("mynd_lastBook");
    }

    localStorage.removeItem(`mynd_lastChat_${book.id}`);
    pushToast("Livro excluído");
  };

    setLastBook(freshBook);
    localStorage.setItem("mynd_lastBook",freshBook.id);

    setBookMsgs([]);

    setChatMode("auto");

    await bumpStat(freshBook.id);

    const txt=await rf(dirHandle,`${freshBook.id}.txt`);
    setBookText(txt || "");

    // Carregar embeddings salvos (se existirem)
    const embs = await loadEmbeddings(dirHandle, freshBook.id);
    setBookEmbeddings(embs);

    // Reconciliação silenciosa: arquivo existe mas status não reflete isso
    if(embs && embs.length && freshBook.embeddingsStatus !== "done"){
      const fid = freshBook.id;
      setBooks(prev=>{
        if(!prev.find(b=>b.id===fid)) return prev;

      setSelBook(p=>p?{...p,embeddingsStatus:"done"}:p);
    }

    // Verificar se PDF original está disponível
    const deepAvailable = await rf(dirHandle,`${freshBook.id}.pdf`);
    setBookCanUseDeep(!!deepAvailable);

    const sessions=await loadChats(dirHandle,freshBook.id,userName);
    setChatSessions(sessions);

    const others={};
    for(const p of otherProfiles){
      const ss=await loadChats(dirHandle,freshBook.id,p);
      if(ss.length) others[p]=ss;
    }
    setOtherSessions(others);

    // Sempre abre conversa nova ao entrar no livro
    setBookMsgs([]);
    setActiveChatId(null);

    setOpeningBook(false);

    // ── Tentar buscar sinopse pendente silenciosamente ──
    // Só busca se synopsis é null E status não for "done" nem "processing"
    if(!freshBook.synopsis && freshBook.synopsisStatus !== "done" && freshBook.synopsisStatus !== "processing"){
      const fid = freshBook.id;
      setBooks(prev=>prev.map(b=>b.id===fid?{...b,synopsisStatus:"processing"}:b));
      setSelBook(p=>p?{...p,synopsisStatus:"processing"}:p);
      fetchBookSynopsis(apiKey, freshBook.title, freshBook.author)
        .then(async raw => {
          const synopsis = sanitizeSynopsisText(raw);
          setBooks(prev=>{
            if(!prev.find(b=>b.id===fid)) return prev; // livro foi deletado
            const nb=prev.map(b=>b.id===fid?{...b,synopsis,synopsisStatus:"done"}:b);
            persist(nb,cats,wishlist,profiles);
            return nb;
          });
          setSelBook(p=>p?{...p,synopsis,synopsisStatus:"done"}:p);
        })
        .catch(()=>{
          setBooks(prev=>prev.map(b=>b.id===fid?{...b,synopsisStatus:"error"}:b));
          setSelBook(p=>p?{...p,synopsisStatus:"error"}:p);
        });
    }

    // ── Gerar embeddings pendentes silenciosamente ──
    const needsEmbeddings = openaiKey
      && !embs
      && freshBook.embeddingsStatus !== "done"
      && freshBook.embeddingsStatus !== "processing";

    if(needsEmbeddings){
      const fid = freshBook.id;
      setGeneratingEmbeddings(true);
      setBooks(prev=>prev.map(b=>b.id===fid?{...b,embeddingsStatus:"processing"}:b));
      setSelBook(p=>p?{...p,embeddingsStatus:"processing"}:p);
      const bookTextForEmb = await rf(dirHandle, `${fid}.txt`) || "";
      const chunks = splitTextIntoChunks(bookTextForEmb);

      generateAndSaveEmbeddings(fid, chunks, dirHandle, openaiKey, ()=>{})
        .then(async generatedEmbs => {
          setBookEmbeddings(generatedEmbs);
          setGeneratingEmbeddings(false);
          setBooks(prev=>{
            if(!prev.find(b=>b.id===fid)) return prev; // livro foi deletado
            const nb=prev.map(b=>b.id===fid?{...b,embeddingsStatus:"done"}:b);
            persist(nb,cats,wishlist,profiles);
            return nb;
          });
          setSelBook(p=>p?{...p,embeddingsStatus:"done"}:p);
          pushToast("Índice semântico gerado");
        })
        .catch(()=>{
          setGeneratingEmbeddings(false);
          setBooks(prev=>prev.map(b=>b.id===fid?{...b,embeddingsStatus:"error"}:b));
          setSelBook(p=>p?{...p,embeddingsStatus:"error"}:p);

    }
